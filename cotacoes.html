<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cotação Express - Final</title>

    <!-- Tailwind CSS para o Design Premium -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React e Babel para a Lógica Inteligente -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .tech-btn-green {
            box-shadow: 0 8px 15px rgba(255, 202, 5, 0.3);
            transition: all 0.3s ease;
        }

        .tech-btn-green:hover {
            box-shadow: 0 12px 20px rgba(255, 202, 5, 0.5);
            transform: translateY(-2px);
        }

        /* Esconder setas do input number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        /* Classe especial p/ forçar layout de PC no momento do print via html2canvas no mobile */
        .print-mode {
            width: 1024px !important;
            max-width: 1024px !important;
            min-width: 1024px !important;
            position: absolute !important;
            top: 0;
            left: 0;
            z-index: -9999;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- Configurações de Dados ---
        const COBRE_PESO = { "1/4": 0.123, "3/8": 0.193, "1/2": 0.263, "5/8": 0.333, "3/4": 0.40 };
        const COBRE_NOMENCLATURAS = { "1/4": "06,35", "3/8": "09,52", "1/2": "12,70", "5/8": "15,87", "3/4": "19,05" };
        const ISOLAMENTO_PRECO = { "1/4": 1.89, "3/8": 1.99, "1/2": 2.59, "5/8": 3.69, "3/4": 3.89, "7/8": 4.50 }; 
        const ISOLAMENTO_NOMENCLATURAS = { "1/4": "SC 300", "3/8": "SC 300", "1/2": "SC 250", "5/8": "SC 220", "3/4": "SC 180", "7/8": "SC 160" };
        const FITAS = {
            pvc: { n: "FITA PVC S/ADESIVO 100MMX10M BRANCA HULTER", p: 3.90 },
            iso: { n: "FITA ISOLANTE 18MM X 15M ANTICHAMA PRETA DUGOLD", p: 4.90 },
            alu: { n: "FITA ALUMINIZADA 45MM X 45M HULTER", p: 4.95 },
            tape: { n: "FITA TAPE 48MM X 50M BRANCA TEC TAPE", p: 19.90 },
            elastomerica: { n: "FITA EMENDAS ELASTOMERICA 45MMX3MMX10M-HULTER", p: 22.00 }
        };
        const CABOS = {
            "2x1,5": { n: "CABO PP 2X1,5MM 1KV 100M RCM", p: 5.50 },
            "3x1,5": { n: "CABO PP 3X1,5MM 1KV 100M RCM", p: 7.80 },
            "4x1,5": { n: "CABO PP 4X1,5MM 1KV 100M RCM", p: 9.80 },
            "5x1,5": { n: "CABO PP CONTROLE 5X1,5MM 1KV 100M RCM", p: 13.80 },
            "5x2,5": { n: "CABO PP CONTROLE 5X2,5MM 1KV 100M RCM", p: 19.90 },
            "6x1,5": { n: "CABO PP CONTROLE 6X1,5MM 1KV 100M RCM", p: 21.70 }
        };
        const SUPORTES = {
            "400mm": { n: "Suporte Split Hulter 7 à 12.000 BTUs 400mm", p: 29.90 },
            "450mm": { n: "Suporte para Condensadora Barril 7000 a 12000 BTUS 450mm Hulter", p: 39.90 },
            "500mm": { n: "Suporte 50cm para Split 12000 a 24000 BTUs 80 kg 500mm Hulter", p: 49.90 },
            "550mm": { n: "SUPORTE SPLIT 550X500 18 A 36.000 160KG 1,8MM C/ REF", p: 89.90 },
            "600mm": { n: "SUPORTE SPLIT 600x500 18 A 48.000 160KG 1,8MM C/ REF", p: 119.00 },
            "900mm": { n: "Suporte Split Hulter 18 à 60.000 BTUs 900mm x 600mm", p: 189.00 },
            "evap": { n: "Suporte Evaporadora Piso teto Hulter 30 à 80.000 BTUs 600mm x230mm x 200mm", p: 99.00 }
        };
        const CAIXAS = {
            "29": { n: "Caixa de Passagem Split 29cm x 17 Reversível Hulter", p: 13.90 },
            "39": { n: "Caixa de Passagem Split 39cm x 17 Reversível Hulter", p: 18.90 }
        };

        function App() {
            const [input, setInput] = useState('');
            const [valorKgCobre, setValorKgCobre] = useState(155);
            const [itens, setItens] = useState([]);
            const [erros, setErros] = useState([]);
            const [copiado, setCopiado] = useState(false);
            const tableRef = React.useRef(null);
            
            const formatarMoeda = (valor) => {
                return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            const totalGeral = useMemo(() => itens.reduce((acc, item) => acc + item.total, 0), [itens]);

            const processarOrcamento = () => {
                const linhas = input.toLowerCase().split('\n');
                const mapaItens = new Map();
                const novosErros = [];
                let pedirIsolamentoGenerico = false;

                linhas.forEach((linha) => {
                    const l = linha.trim();
                    if (!l) return;
                    let identificado = false;

                    // Extrai a quantidade do início da linha (ex: "2 panquecas" -> 2)
                    let qtdLinha = 1;
                    const matchQtdInicio = l.match(/^(\d+)/);
                    if (matchQtdInicio) qtdLinha = parseInt(matchQtdInicio[1]);

                    // 1. COBRE
                    for (const bitola in COBRE_PESO) {
                        if (l.includes(bitola) && (l.includes('cano') || l.includes('cobre') || l.includes('panq') || l.includes('panc'))) {
                            const mMatch = l.match(/(\d+(?:,\d+)?)\s*(m|metro|metros|mt\b)/i);
                            const panMatch = l.match(/(panq|panc|panqueca)/i);

                            let metros = 0;
                            if (mMatch) metros = parseFloat(mMatch[1].replace(',', '.'));
                            else if (panMatch) metros = qtdLinha * 15;
                            else metros = qtdLinha;

                            if (metros > 0) {
                                const chave = `cobre-${bitola}`;
                                const existente = mapaItens.get(chave);
                                mapaItens.set(chave, {
                                    nome: `CANO COBRE BOB 1/32 ${COBRE_NOMENCLATURAS[bitola]} ${bitola} ${COBRE_PESO[bitola].toFixed(3).replace('.', ',')}`,
                                    qtdNumerica: (existente?.qtdNumerica || 0) + metros,
                                    valorUnit: valorKgCobre,
                                    tipo: 'cobre',
                                    bitola
                                });
                                identificado = true; break;
                            }
                        }
                    }

                    // 2. ISOLANTES
                    if (!identificado) {
                        let achouBitola = false;
                        for (const bitola in ISOLAMENTO_PRECO) {
                            if (l.includes(bitola) && (l.includes('tubo') || l.includes('esponjoso') || l.includes('blindado') || l.includes('isolante') || l.includes('isolamento'))) {
                                let m = l.match(/(\d+(?:,\d+)?)\s*(m|metro|metros|mt\b)/i);
                                let qtd = m ? parseFloat(m[1].replace(',', '.')) : qtdLinha;
                                
                                // Regra: Isolamentos são de 2 em 2 metros (arredonda para cima se for ímpar)
                                if (qtd % 2 !== 0) qtd = Math.ceil(qtd / 2) * 2;

                                const chave = `iso-${bitola}`;
                                const existente = mapaItens.get(chave);
                                mapaItens.set(chave, {
                                    nome: `TUBO BLIND BRANCO INVERTER ${bitola} X 10MM ${ISOLAMENTO_NOMENCLATURAS[bitola]}`,
                                    qtdNumerica: (existente?.qtdNumerica || 0) + qtd,
                                    valorUnit: ISOLAMENTO_PRECO[bitola],
                                    tipo: 'iso'
                                });
                                achouBitola = true;
                                identificado = true; break;
                            }
                        }

                        // Isolamento generico (sem bitola)
                        if (!achouBitola && (l.includes('isolamento') || (l.includes('isolante') && !l.includes('fita')))) {
                            pedirIsolamentoGenerico = true;
                            identificado = true;
                        }
                    }

                    // 3. CABOS PP
                    if (!identificado) {
                        for (const bitola in CABOS) {
                            const lNormal = l.replace(/\s+/g, ' '); // Mantém espaços para não mesclar números
                            const b1 = bitola; // Ex: "5x2,5"
                            const b2 = bitola.replace(',', '.');
                            
                            // Regex que aceita bitola com ou sem espaços (ex: "5x2,5" ou "5 x 2,5")
                            const regexBitola = new RegExp(bitola.replace(',', '[.,]').replace('x', '\\s*x\\s*'), 'i');
                            
                            if (regexBitola.test(l)) {
                                // Para não somar "2,5" com "500", removemos a bitola do texto original USANDO A STRING ORIGINAL para pegar a qtd
                                let textoParaQtd = l.replace(regexBitola, ' ');
                                const mMatch = textoParaQtd.match(/(\d+(?:,\d+)?)\s*(m|metro|metros|mt\b|un\b)/i);
                                
                                let qtd = mMatch ? parseFloat(mMatch[1].replace(',', '.')) : qtdLinha;
                                const chave = `cabo-${bitola}`;
                                const existente = mapaItens.get(chave);
                                mapaItens.set(chave, {
                                    nome: CABOS[bitola].n,
                                    qtdNumerica: (existente?.qtdNumerica || 0) + qtd,
                                    valorUnit: CABOS[bitola].p,
                                    tipo: 'cabo'
                                });
                                identificado = true; break;
                            }
                        }
                    }

                    // 4. SUPORTES E CAIXAS
                    if (!identificado && l.includes('suporte')) {
                        let chaveSup = null;
                        
                        // Transforma "550m" em "550mm" para evitar erros de digitação do cliente
                        let lSup = l.replace(/(\d+)m\b/g, '$1mm'); 
                        
                        for (const key in SUPORTES) {
                            if (lSup.includes(key)) {
                                chaveSup = key;
                                break;
                            }
                        }

                        // Se não encontrou suporte por nome, mas fala em "30" (ex: "Suporte condensadora 30"), usa o 500mm
                        if (!chaveSup && l.match(/\b30\b/)) {
                            chaveSup = '500mm';
                        }

                        if (chaveSup) {
                            const mUn = l.match(/(\d+(?:,\d+)?)\s*(un|u|pç)/i);
                            const qtdSup = mUn ? parseFloat(mUn[1].replace(',', '.')) : qtdLinha;

                            const chave = `sup-${chaveSup}`;
                            const existente = mapaItens.get(chave);
                            mapaItens.set(chave, {
                                nome: SUPORTES[chaveSup].n,
                                qtdNumerica: (existente?.qtdNumerica || 0) + qtdSup,
                                valorUnit: SUPORTES[chaveSup].p,
                                tipo: 'suporte'
                            });
                            identificado = true;
                        }
                    }

                    if (!identificado && l.includes('caixa')) {
                        let chaveCx = null;
                        for (const key in CAIXAS) {
                            if (l.includes(key)) {
                                chaveCx = key;
                                break;
                            }
                        }
                        if (chaveCx) {
                            const chave = `cx-${chaveCx}`;
                            const existente = mapaItens.get(chave);
                            mapaItens.set(chave, {
                                nome: CAIXAS[chaveCx].n,
                                qtdNumerica: (existente?.qtdNumerica || 0) + qtdLinha,
                                valorUnit: CAIXAS[chaveCx].p,
                                tipo: 'caixa'
                            });
                            identificado = true;
                        }
                    }

                    // 5. FITAS
                    if (!identificado) {
                        const mUn = l.match(/(\d+(?:,\d+)?)\s*(un|u|mt|m|pç)/i);
                        const qtdFita = mUn ? parseFloat(mUn[1].replace(',', '.')) : qtdLinha;

                        if (l.includes('pvc')) {
                            const chave = 'fita-pvc';
                            const ex = mapaItens.get(chave);
                            mapaItens.set(chave, { nome: FITAS.pvc.n, qtdNumerica: (ex?.qtdNumerica || 0) + qtdFita, valorUnit: FITAS.pvc.p, tipo: 'fita' });
                            identificado = true;
                        } else if ((l.includes('isolante') || l.includes('fita iso')) && !l.includes('tubo') && !l.includes('isolamento')) {
                            const chave = 'fita-iso';
                            const ex = mapaItens.get(chave);
                            mapaItens.set(chave, { nome: FITAS.iso.n, qtdNumerica: (ex?.qtdNumerica || 0) + qtdFita, valorUnit: FITAS.iso.p, tipo: 'fita' });
                            identificado = true;
                        } else if (l.includes('elastom') || l.includes('emenda')) {
                            const chave = 'fita-elastomerica';
                            const ex = mapaItens.get(chave);
                            mapaItens.set(chave, { nome: FITAS.elastomerica.n, qtdNumerica: (ex?.qtdNumerica || 0) + qtdFita, valorUnit: FITAS.elastomerica.p, tipo: 'fita' });
                            identificado = true;
                        } else if (l.includes('tec tão') || l.includes('tape') || l.includes('silver') || l.includes('tectape')) {
                            let qtdFinalTape = qtdFita;
                            const mMetros = l.match(/(\d+)\s*(m|metro|metros|mt\b)/i);
                            
                            // Se pediu em metros (ex: 200mt de fita), calcula a qtd de rolos necessários (1 rolo = 50m)
                            if (mMetros && !l.includes('un')) {
                                let metros = parseInt(mMetros[1]);
                                qtdFinalTape = Math.ceil(metros / 50);
                            }
                            
                            const chave = 'fita-tape';
                            const ex = mapaItens.get(chave);
                            mapaItens.set(chave, { nome: FITAS.tape.n, qtdNumerica: (ex?.qtdNumerica || 0) + qtdFinalTape, valorUnit: FITAS.tape.p, tipo: 'fita' });
                            identificado = true;
                        }
                    }

                    if (!identificado) novosErros.push(linha);
                });

                // Adiciona isolamento para tudo que for cobre se foi pedido genericamente
                if (pedirIsolamentoGenerico) {
                    mapaItens.forEach((item, chave) => {
                        if (item.tipo === 'cobre') {
                            const bitola = item.bitola;
                            let metros = item.qtdNumerica;
                            
                            // Regra: Isolamentos são de 2 em 2 metros
                            if (metros % 2 !== 0) metros = Math.ceil(metros / 2) * 2;

                            const chaveIso = `iso-${bitola}`;
                            const existente = mapaItens.get(chaveIso);
                            mapaItens.set(chaveIso, {
                                nome: `TUBO BLIND BRANCO INVERTER ${bitola} X 10MM ${ISOLAMENTO_NOMENCLATURAS[bitola]}`,
                                qtdNumerica: (existente?.qtdNumerica || 0) + metros,
                                valorUnit: ISOLAMENTO_PRECO[bitola],
                                tipo: 'iso'
                            });
                        }
                    });
                }

                const itensFinais = [];
                mapaItens.forEach((item, chave) => {
                    let total = 0, qtdTexto = "", unidade = "";
                    if (item.tipo === 'cobre') {
                        const peso = item.qtdNumerica * COBRE_PESO[item.bitola];
                        total = peso * item.valorUnit;
                        qtdTexto = `${peso.toFixed(2).replace('.', ',')} kg (${item.qtdNumerica}m)`;
                        unidade = "kg";
                    } else {
                        total = item.qtdNumerica * item.valorUnit; 
                        
                        if (item.tipo === 'cabo' || item.tipo === 'iso') {
                            unidade = 'm';
                        } else if (item.tipo === 'fita' || item.tipo === 'suporte') {
                            unidade = 'un';
                        } else {
                            unidade = 'pç';
                        }
                        
                        qtdTexto = `${item.qtdNumerica} ${unidade}`;
                    }
                    itensFinais.push({ id: chave, nome: item.nome, qtd: qtdTexto, valorUnit: item.valorUnit, unidade, total });
                });
                setItens(itensFinais); setErros(novosErros);
            };

            const copiarImagem = async () => {
                if (!tableRef.current) return;
                try {
                    // Adiciona uma classe temporária para forçar a largura antes do print
                    tableRef.current.classList.add('print-mode');

                    const canvas = await html2canvas(tableRef.current, {
                        backgroundColor: '#f8f9fa',
                        scale: 2, // High resolution
                        windowWidth: 1024, // Força render como se fosse tela de PC
                        width: 1024, // Fixa a largura do canvas independente do celular
                        onclone: (clonedDoc) => {
                            // Garante que o elemento no clone virtual tenha os tamanhos forçados
                            const clonedElement = clonedDoc.getElementById('resultado-orcamento');
                            if (clonedElement) {
                                clonedElement.style.width = '1024px';
                                clonedElement.style.minWidth = '1024px';
                            }
                        }
                    });

                    tableRef.current.classList.remove('print-mode');
                    canvas.toBlob(async (blob) => {
                        try {
                            await navigator.clipboard.write([
                                new ClipboardItem({ 'image/png': blob })
                            ]);
                            setCopiado(true);
                            setTimeout(() => setCopiado(false), 2000);
                        } catch (err) {
                            // Se a área de transferência falhar, força o download
                            const link = document.createElement('a');
                            link.download = 'cotacao.png';
                            link.href = canvas.toDataURL();
                            link.click();
                        }
                    }, 'image/png');
                } catch (err) {
                    alert('Erro ao gerar imagem.');
                    console.error(err);
                }
            };

            return (
                <div className="min-h-screen text-[#2c2c2c] p-4 sm:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="mb-10 border-b border-slate-200 pb-6">
                            <h1 className="text-[32px] font-black uppercase italic text-[#102E82] tracking-[-1px] mb-2 leading-none">COTAÇÃO EXPRESS</h1>
                            <p className="text-slate-500 text-[11px] font-extrabold uppercase tracking-[1px]">SISTEMA DE ORÇAMENTOS INTELIGENTE.</p>
                        </header>

                        <div className="flex flex-col gap-8">
                            {/* Sessão de Entrada (Topo) */}
                            <div className="space-y-6">
                                <div className="flex items-center justify-between gap-4">
                                    <div className="flex-1">
                                        <h2 className="text-[10px] font-bold uppercase tracking-widest text-slate-600">Lista de Pedido</h2>
                                        <p className="text-[9px] text-slate-400 italic">Itens duplicados são somados automaticamente.</p>
                                    </div>
                                    <div className="bg-slate-50 border border-slate-200 p-2 rounded-xl w-20 h-20 flex flex-col items-center justify-center border-b-2 border-[#102E82]">
                                        <span className="text-[7px] font-bold text-slate-500">KG COBRE</span>
                                        <div className="flex items-center text-sm font-black">
                                            <span className="text-[#102E82] text-[10px] mr-1">R$</span>
                                            <input type="number" value={valorKgCobre} onChange={e => setValorKgCobre(Number(e.target.value))} className="bg-transparent w-full text-center outline-none" />
                                        </div>
                                    </div>
                                    <button onClick={processarOrcamento} className="tech-btn-green bg-[#FFCA05] text-[#102E82] font-black px-8 py-4 rounded-xl uppercase tracking-widest hover:opacity-90 transition-all h-20">
                                        Gerar<br />Orçamento
                                    </button>
                                </div>

                                <textarea
                                    value={input} onChange={e => setInput(e.target.value)}
                                    placeholder="Copie os itens do orçamento e cole a lista aqui..."
                                    className="w-full h-40 bg-white border border-slate-200 shadow-inner rounded-2xl p-6 text-sm outline-none focus:border-[#102E82] focus:shadow-[0_0_15px_rgba(16,46,130,0.1)] transition-all font-medium"
                                />

                                {erros.length > 0 && (
                                    <div className="bg-red-50 border border-red-200 p-4 rounded-xl text-[10px] text-red-400">
                                        <p className="font-bold uppercase mb-1">Não reconhecidos:</p>
                                        {erros.map((e, i) => <div key={i}>• {e}</div>)}
                                    </div>
                                )}
                            </div>

                            {/* Divisória */}
                            {itens.length > 0 && <div className="border-t border-slate-200 my-4"></div>}

                            {/* Sessão de Orçamento (Baixo - Otimizada para Print) */}
                            {itens.length > 0 && (
                                <div className="space-y-4">
                                    <div className="flex justify-end">
                                        <button onClick={copiarImagem} className={`flex items-center gap-2 text-[10px] font-bold py-2 px-6 rounded-lg transition-all ${copiado ? 'bg-[#FFCA05] text-[#102E82] scale-95' : 'bg-white border border-slate-200 shadow-lg hover:border-slate-300 text-[#2c2c2c]'}`}>
                                            <span>{copiado ? "✔ COPIADO COM SUCESSO" : "COPIAR IMAGEM"}</span>
                                        </button>
                                    </div>

                                    <div id="resultado-orcamento" ref={tableRef} className="space-y-6 top-0 p-8 pt-6 pb-6 bg-[#f8f9fa] rounded-3xl border border-slate-200 w-full">
                                        <div className="text-center mb-4">
                                            <h2 className="text-2xl font-black uppercase italic text-[#102E82] tracking-widest">ORÇAMENTO</h2>
                                        </div>

                                        <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-2xl overflow-x-auto">
                                            <table className="w-full text-left text-xs min-w-[600px]">
                                                <thead>
                                                    <tr className="bg-slate-100 text-slate-500 uppercase font-bold text-[9px] tracking-wider">
                                                        <th className="p-5 pl-6">Produto</th>
                                                        <th className="p-5">Qtd</th>
                                                        <th className="p-5 font-bold text-center">Unitário</th>
                                                        <th className="p-5 pr-6 text-right">Total</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-200">
                                                    {itens.map(item => (
                                                        <tr key={item.id} className="hover:bg-slate-100 transition-colors">
                                                            <td className="p-5 pl-6 font-bold text-slate-800">{item.nome}</td>
                                                            <td className="p-5 text-slate-600">
                                                                {item.qtd.split(' (').map((part, i) => (
                                                                    <span key={i} className={i === 1 ? 'block text-[10px] text-slate-500' : ''}>
                                                                        {part.replace(')', '')}
                                                                    </span>
                                                                ))}
                                                            </td>
                                                            <td className="p-5 font-semibold text-center">
                                                                <span className="text-slate-600">R$ {formatarMoeda(item.valorUnit)}</span>
                                                                <span className="block text-[10px] text-slate-400">/ {item.unidade}</span>
                                                            </td>
                                                            <td className="p-5 pr-6 text-right font-black text-[#2c2c2c] text-sm">
                                                                R$ {formatarMoeda(item.total)}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>

                                        <div className="bg-[#FFCA05] p-6 rounded-2xl flex justify-between items-center text-[#102E82] shadow-lg">
                                            <span className="font-bold uppercase text-[10px]">Total Geral</span>
                                            <span className="text-3xl font-black">R$ {formatarMoeda(totalGeral)}</span>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
