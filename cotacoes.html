    <script type="text/babel">
        const { useState, useMemo, useRef, useCallback } = React;

        const COBRE_PESO = { "1/4": 0.123, "3/8": 0.193, "1/2": 0.263, "5/8": 0.333, "3/4": 0.40 };
        const COBRE_NOMENCLATURAS = { "1/4": "06,35", "3/8": "09,52", "1/2": "12,70", "5/8": "15,87", "3/4": "19,05" };
        const ISOLAMENTO_PRECO = { "1/4": 1.89, "3/8": 1.99, "1/2": 2.59, "5/8": 3.69, "3/4": 3.89, "7/8": 4.50 };
        const ISOLAMENTO_NOMENCLATURAS = { "1/4": "SC 300", "3/8": "SC 300", "1/2": "SC 250", "5/8": "SC 220", "3/4": "SC 180", "7/8": "SC 160" };
        const FITAS = {
            pvc_branca:   { n: "FITA PVC S/ADESIVO 100MMX10M BRANCA HULTER", p: 3.90 },
            pvc_preta:    { n: "FITA PVC S/ADESIVO 100MMX10M PRETA HULTER", p: 4.90 },
            iso:          { n: "FITA ISOLANTE 18MM X 15M ANTICHAMA PRETA DUGOLD", p: 4.90 },
            alu:          { n: "FITA ALUMINIZADA 45MM X 45M HULTER", p: 4.95 },
            tape:         { n: "FITA TAPE 48MM X 50M BRANCA TEC TAPE", p: 19.90 },
            elastomerica: { n: "FITA EMENDAS ELASTOMERICA 45MMX3MMX10M-HULTER", p: 22.00 }
        };
        const CABOS = {
            "2x1,5": { n: "CABO PP 2X1,5MM 1KV 100M RCM", p: 5.50 },
            "3x1,5": { n: "CABO PP 3X1,5MM 1KV 100M RCM", p: 7.80 },
            "4x1,5": { n: "CABO PP 4X1,5MM 1KV 100M RCM", p: 9.80 },
            "5x1,5": { n: "CABO PP CONTROLE 5X1,5MM 1KV 100M RCM", p: 13.80 },
            "5x2,5": { n: "CABO PP CONTROLE 5X2,5MM 1KV 100M RCM", p: 19.90 },
            "6x1,5": { n: "CABO PP CONTROLE 6X1,5MM 1KV 100M RCM", p: 21.70 }
        };
        const SUPORTES = {
            "400mm": { n: "Suporte Split Hulter 7 a 12.000 BTUs 400mm", p: 29.90 },
            "450mm": { n: "Suporte para Condensadora Barril 7000 a 12000 BTUS 450mm Hulter", p: 39.90 },
            "500mm": { n: "Suporte 50cm para Split 12000 a 24000 BTUs 80 kg 500mm Hulter", p: 49.90 },
            "550mm": { n: "SUPORTE SPLIT 550X500 18 A 36.000 160KG 1,8MM C/ REF", p: 89.90 },
            "600mm": { n: "SUPORTE SPLIT 600x500 18 A 48.000 160KG 1,8MM C/ REF", p: 119.00 },
            "700mm": { n: "SUPORTE SPLIT 700X600 18 A 48.000 140KG C/ REF BARRIL", p: 179.00 },
            "900mm": { n: "SUPORTE SPLIT 900X600 18 A 60.000 1,8MM 180KG C/ REF", p: 219.00 },
            "evap":  { n: "Suporte Evaporadora Piso teto Hulter 30 a 80.000 BTUs 600mm x230mm x 200mm", p: 99.00 }
        };
        const BTU_SUPORTE = { 9000:"400mm", 12000:"450mm", 18000:"550mm", 24000:"600mm", 30000:"700mm", 36000:"700mm", 48000:"900mm", 60000:"900mm" };
        const CAIXAS = {
            "29": { n: "Caixa de Passagem Split 29cm x 17 Reversivel Hulter", p: 13.90 },
            "39": { n: "Caixa de Passagem Split 39cm x 17 Reversivel Hulter", p: 18.90 }
        };

        const NUMEROS_EXTENSO = {
            "um":1,"uma":1,"dois":2,"duas":2,"dua":2,"dous":2,"tres":3,"tres":3,
            "quatro":4,"cinco":5,"seis":6,"sete":7,"oito":8,"nove":9,
            "dez":10,"onze":11,"doze":12,"treze":13,"quatorze":14,"catorze":14,
            "quinze":15,"vinte":20,"trinta":30
        };

        function extrairQtdInicio(l) {
            const mNum = l.match(/^(\d+(?:[.,]\d+)?)/);
            if (mNum) return parseFloat(mNum[1].replace(',','.'));
            const p = l.split(/\s+/)[0].replace(/[^a-z]/g,'');
            return NUMEROS_EXTENSO[p] || 1;
        }
        function extrairMetros(l) {
            const m = l.match(/(\d+(?:[.,]\d+)?)\s*(?:m(?:etro[s]?)?|mt)\b/i);
            return m ? parseFloat(m[1].replace(',','.')) : null;
        }
        function isPar(l) { return /\bpar(?:es)?\b/i.test(l); }

        function similaridade(a, b) {
            a = a.toLowerCase(); b = b.toLowerCase();
            if (a === b) return 1;
            const longer = a.length > b.length ? a : b;
            const shorter = a.length > b.length ? b : a;
            if (longer.length === 0) return 1;
            const costs = [];
            for (let i = 0; i <= longer.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= shorter.length; j++) {
                    if (i === 0) { costs[j] = j; }
                    else if (j > 0) {
                        let newValue = costs[j-1];
                        if (longer[i-1] !== shorter[j-1]) newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        costs[j-1] = lastValue; lastValue = newValue;
                    }
                }
                if (i > 0) costs[shorter.length] = lastValue;
            }
            return (longer.length - costs[shorter.length]) / longer.length;
        }

        const PALAVRAS_CHAVE = ["panqueca","cobre","cano","esponjoso","isolante","tubo","blindado","pvc","aluminizada","tape","elastomerica","cabo","suporte"];

        function gerarSugestoes(linha) {
            const palavras = linha.toLowerCase().split(/\s+/);
            const sugestoes = new Set();
            for (const palavra of palavras) {
                const p = palavra.replace(/[^a-z0-9/,x]/g,'');
                if (p.length < 3) continue;
                for (const chave of PALAVRAS_CHAVE) {
                    if (similaridade(p, chave) > 0.55) sugestoes.add(chave);
                }
            }
            return [...sugestoes].slice(0,4);
        }

        function parseLinha(l, valorKgCobre) {
            l = l.toLowerCase().trim().replace(/^e\s+/,'');
            if (!l) return null;
            const qtdInicio = extrairQtdInicio(l);
            const qtdFinal = qtdInicio * (isPar(l) ? 2 : 1);

            // COBRE
            for (const bitola in COBRE_PESO) {
                if (!l.includes(bitola)) continue;
                if (/tubo|blind|esponj|espaj|isolam/i.test(l)) continue;
                let metros = 0;
                if (/panq|panc|parq|parc/i.test(l)) {
                    metros = qtdFinal * 15;
                } else {
                    const mM = extrairMetros(l);
                    if (mM) metros = mM;
                    else { const mN = l.match(/(\d+(?:[.,]\d+)?)/); metros = mN ? parseFloat(mN[1].replace(',','.')) : qtdFinal; }
                }
                if (metros > 0) return { tipo:'cobre', bitola, metros, valorUnit: valorKgCobre };
            }

            // ISOLAMENTO
            if (/tubo|iso(?:lante|lamento|lado)?|blind(?:ado)?|esponj|espaj|espa[cç]/i.test(l)) {
                for (const bitola in ISOLAMENTO_PRECO) {
                    if (!l.includes(bitola)) continue;
                    const mM = extrairMetros(l);
                    let qtd = mM !== null ? mM : qtdFinal;
                    if (qtd % 2 !== 0) qtd = Math.ceil(qtd/2)*2;
                    return { tipo:'iso', bitola, qtd, valorUnit: ISOLAMENTO_PRECO[bitola] };
                }
                return { tipo:'iso_generico' };
            }

            // CABOS
            if (/cabo|pp\b|fio\b|\d\s*(?:x|via[s]?\s*(?:por\s*)?)\s*\d/i.test(l)) {
                for (const bitola in CABOS) {
                    const [fios, secao] = bitola.split('x');
                    const regex = new RegExp(fios+'\\s*(?:x|via[s]?\\s*(?:por\\s*)?|\\*)\\s*'+secao.replace(',','[.,]'),'i');
                    if (regex.test(l)) {
                        const sem = l.replace(regex,' ');
                        const mM = sem.match(/(\d+(?:[.,]\d+)?)\s*(?:m(?:etro[s]?)?|mt|un?)\b/i);
                        const qtd = mM ? parseFloat(mM[1].replace(',','.')) : qtdFinal;
                        return { tipo:'cabo', bitola, qtd, valorUnit: CABOS[bitola].p, nome: CABOS[bitola].n };
                    }
                }
            }

            // SUPORTES
            if (/suporte|sup\b/i.test(l)) {
                if (/piso.?teto|evap(?:oradora)?|parede/i.test(l)) return { tipo:'suporte', chave:'evap', qtd:qtdFinal };
                if (/m[a\u00e3]o\s*france[sz]a/i.test(l)) return { tipo:'suporte', chave:'900mm', qtd:qtdFinal };
                const mBtu = l.match(/(\d{2,6})\s*(?:btus?|quadrado[s]?|quad|mil\b)?/i);
                if (mBtu) {
                    let btu = parseInt(mBtu[1]);
                    if (btu < 100) btu = btu * 1000;
                    const chaveSup = BTU_SUPORTE[btu] || (btu<=9000?"400mm":btu<=12000?"450mm":btu<=18000?"550mm":btu<=24000?"600mm":btu<=36000?"700mm":"900mm");
                    return { tipo:'suporte', chave:chaveSup, qtd:qtdFinal };
                }
                let lSup = l.replace(/(\d+)m\b/g,'$1mm');
                for (const key of ["900mm","700mm","600mm","550mm","500mm","450mm","400mm"]) {
                    if (lSup.includes(key)) return { tipo:'suporte', chave:key, qtd:qtdFinal };
                }
            }

            // CAIXAS
            if (/caixa/i.test(l)) {
                for (const key of ["39","29"]) { if (l.includes(key)) return { tipo:'caixa', chave:key, qtd:qtdFinal }; }
            }

            // FITAS
            {
                const mUn = l.match(/(\d+(?:[.,]\d+)?)/);
                const qtdFita = mUn ? parseFloat(mUn[1].replace(',','.')) : qtdFinal;
                if (/pp\s*alum|alum.*pp|aluminizada/i.test(l)) return { tipo:'fita', chave:'alu', qtd:qtdFita };
                if (/elastom|emenda/i.test(l)) return { tipo:'fita', chave:'elastomerica', qtd:qtdFita };
                if (/tec\s*ta[op]e?|tape|silver/i.test(l)) {
                    const mM2 = l.match(/(\d+)\s*(?:m|metro|mt)\b/i);
                    let qtdT = qtdFita;
                    if (mM2 && !l.includes('un')) qtdT = Math.ceil(parseInt(mM2[1])/50);
                    return { tipo:'fita', chave:'tape', qtd:qtdT };
                }
                if (/pvc/i.test(l)) return { tipo:'fita', chave:/pret[ao]/i.test(l)?'pvc_preta':'pvc_branca', qtd:qtdFita };
                if (/(fita\s*iso|isolante)/i.test(l) && !/tubo|isolamento/i.test(l)) return { tipo:'fita', chave:'iso', qtd:qtdFita };
            }

            return null;
        }

        function preprocessarLinhas(linhas) {
            const resultado = [];
            for (let i = 0; i < linhas.length; i++) {
                const l = linhas[i].trim();
                if (!l) continue;
                if (resultado.length > 0) {
                    const prev = resultado[resultado.length-1].toLowerCase();
                    if (/^\d+\s*(?:via[s]?\s*(?:por\s*)?\d|x\s*\d)/i.test(l) && /cabo|pp\b/i.test(prev)) {
                        resultado[resultado.length-1] += ' ' + l; continue;
                    }
                    if (/^(?:pra|para|de)\s+\d/i.test(l) && /suporte/i.test(prev) && !/\d{4,}|mm|evap|piso|francesa/i.test(prev)) {
                        resultado[resultado.length-1] += ' ' + l; continue;
                    }
                }
                resultado.push(l);
            }
            return resultado;
        }

        function processarLinhas(linhas, valorKgCobre) {
            const linhasProc = preprocessarLinhas(linhas);
            const mapaItens = new Map();
            const erros = [];
            const add = (chave, nome, qtdNum, valorUnit, tipo, extra={}) => {
                const ex = mapaItens.get(chave);
                mapaItens.set(chave, { nome, qtdNumerica:(ex?.qtdNumerica||0)+qtdNum, valorUnit, tipo, ...extra });
            };
            linhasProc.forEach(linha => {
                const r = parseLinha(linha, valorKgCobre);
                if (!r || r.tipo==='iso_generico') { if (!r) erros.push(linha); return; }
                switch(r.tipo) {
                    case 'cobre':
                        add('cobre-'+r.bitola, 'CANO COBRE BOB 1/32 '+COBRE_NOMENCLATURAS[r.bitola]+' '+r.bitola+' '+COBRE_PESO[r.bitola].toFixed(3).replace('.',','), r.metros, r.valorUnit, 'cobre', {bitola:r.bitola}); break;
                    case 'iso':
                        add('iso-'+r.bitola, 'TUBO BLIND BRANCO INVERTER '+r.bitola+' X 10MM '+ISOLAMENTO_NOMENCLATURAS[r.bitola], r.qtd, r.valorUnit, 'iso'); break;
                    case 'cabo':
                        add('cabo-'+r.bitola, r.nome, r.qtd, r.valorUnit, 'cabo'); break;
                    case 'suporte':
                        add('sup-'+r.chave, SUPORTES[r.chave].n, r.qtd, SUPORTES[r.chave].p, 'suporte'); break;
                    case 'caixa':
                        add('cx-'+r.chave, CAIXAS[r.chave].n, r.qtd, CAIXAS[r.chave].p, 'caixa'); break;
                    case 'fita':
                        add('fita-'+r.chave, FITAS[r.chave].n, r.qtd, FITAS[r.chave].p, 'fita'); break;
                }
            });
            const itensFinais = [];
            mapaItens.forEach((item, chave) => {
                let total=0, qtdTexto="", unidade="";
                if (item.tipo==='cobre') {
                    const peso = item.qtdNumerica * COBRE_PESO[item.bitola];
                    total = peso * item.valorUnit;
                    qtdTexto = peso.toFixed(2).replace('.',',')+' kg ('+item.qtdNumerica+'m)';
                    unidade = "kg";
                } else {
                    total = item.qtdNumerica * item.valorUnit;
                    unidade = (item.tipo==='cabo'||item.tipo==='iso') ? 'm' : 'un';
                    qtdTexto = item.qtdNumerica+' '+unidade;
                }
                itensFinais.push({ id:chave, nome:item.nome, qtd:qtdTexto, valorUnit:item.valorUnit, unidade, total });
            });
            return { itens:itensFinais, erros };
        }

        function ErroItem({ linha, onCorrigir }) {
            const [aberto, setAberto] = useState(false);
            const [texto, setTexto] = useState(linha);
            const sugestoes = useMemo(() => gerarSugestoes(linha), [linha]);
            const aplicarSugestao = (s) => {
                const novas = texto.split(/\s+/).map(p => {
                    const pL = p.replace(/[^a-z0-9/,x]/g,'');
                    return (pL.length>=3 && similaridade(pL,s)>0.55) ? s : p;
                });
                setTexto(novas.join(' '));
            };
            return (
                <div className={`erro-corrigir border rounded-lg p-3 ${aberto?'bg-red-50 border-red-300':'bg-red-50 border-red-200'}`}>
                    <div className="flex items-center justify-between gap-2 cursor-pointer" onClick={() => setAberto(!aberto)}>
                        <span className="text-red-500 text-[11px] font-medium">• {linha}</span>
                        <span className="text-[#102E82] text-[9px] font-black uppercase tracking-wider shrink-0">{aberto?'▲ fechar':'✏ corrigir'}</span>
                    </div>
                    {aberto && (
                        <div className="mt-3 space-y-2">
                            {sugestoes.length > 0 && (
                                <div>
                                    <p className="text-[9px] text-slate-400 uppercase tracking-wider mb-1">Sugestões:</p>
                                    <div className="flex flex-wrap gap-1">
                                        {sugestoes.map(s => (
                                            <button key={s} onClick={() => aplicarSugestao(s)} className="sugestao-pill text-[10px] px-2 py-1 rounded-md bg-white/10 text-[#102E82] font-bold border border-slate-200">{s}</button>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div className="flex gap-2">
                                <input value={texto} onChange={e => setTexto(e.target.value)} className="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-[#102E82]" />
                                <button onClick={() => onCorrigir(linha, texto)} className="bg-[#FFCA05] text-[#102E82] font-black text-[10px] px-4 py-2 rounded-lg uppercase">OK</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [input, setInput] = useState('');
            const [valorKgCobre, setValorKgCobre] = useState(155);
            const [itens, setItens] = useState([]);
            const [erros, setErros] = useState([]);
            const [copiado, setCopiado] = useState(false);
            const [linhasOriginais, setLinhasOriginais] = useState([]);
            const tableRef = useRef(null);

            const formatarMoeda = (v) => v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
            const totalGeral = useMemo(() => itens.reduce((acc,i) => acc+i.total, 0), [itens]);

            const processarOrcamento = useCallback((linhasOverride=null) => {
                const linhas = (linhasOverride||input).split('\n').filter(l=>l.trim());
                setLinhasOriginais(linhas);
                const { itens:novosItens, erros:novosErros } = processarLinhas(linhas, valorKgCobre);
                setItens(novosItens); setErros(novosErros);
            }, [input, valorKgCobre]);

            const corrigirErro = useCallback((linhaOriginal, linhaCorrigida) => {
                const novasLinhas = linhasOriginais.map(l => l===linhaOriginal ? linhaCorrigida : l);
                setLinhasOriginais(novasLinhas);
                const { itens:novosItens, erros:novosErros } = processarLinhas(novasLinhas, valorKgCobre);
                setItens(novosItens); setErros(novosErros);
            }, [linhasOriginais, valorKgCobre]);

            const copiarImagem = async () => {
                if (!tableRef.current) return;
                try {
                    tableRef.current.classList.add('print-mode');
                    const canvas = await html2canvas(tableRef.current, {
                        backgroundColor:'#f8f9fa', scale:2, windowWidth:1024, width:1024,
                        onclone:(clonedDoc) => {
                            const el = clonedDoc.getElementById('resultado-orcamento');
                            if (el) { el.style.width='1024px'; el.style.minWidth='1024px'; }
                        }
                    });
                    tableRef.current.classList.remove('print-mode');
                    canvas.toBlob(async (blob) => {
                        try {
                            await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
                            setCopiado(true); setTimeout(()=>setCopiado(false),2000);
                        } catch {
                            const link = document.createElement('a');
                            link.download='cotacao.png'; link.href=canvas.toDataURL(); link.click();
                        }
                    },'image/png');
                } catch(err) { alert('Erro ao gerar imagem.'); }
            };

            return (
                <div className="min-h-screen text-white p-4 sm:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="mb-10 border-b border-slate-200 pb-6">
                            <h1 className="text-[32px] font-black uppercase italic text-[#102E82] tracking-[-1px] mb-2 leading-none">COTAÇÃO EXPRESS</h1>
                            <p className="text-slate-500 text-[11px] font-extrabold uppercase tracking-[1px]">SISTEMA DE ORÇAMENTOS INTELIGENTE.</p>
                        </header>
                        <div className="flex flex-col gap-8">
                            <div className="space-y-6">
                                <div className="flex items-center justify-between gap-4">
                                    <div className="flex-1">
                                        <h2 className="text-[10px] font-bold uppercase tracking-widest text-slate-200">Lista de Pedido</h2>
                                        <p className="text-[9px] text-slate-400 italic">Itens duplicados são somados automaticamente.</p>
                                    </div>
                                    <div className="bg-[#141414]/60 backdrop-blur-md border border-white/10 p-2 rounded-xl w-20 h-20 flex flex-col items-center justify-center border-b-2 border-[#102E82]">
                                        <span className="text-[7px] font-bold text-slate-500">KG COBRE</span>
                                        <div className="flex items-center text-sm font-black">
                                            <span className="text-[#102E82] text-[10px] mr-1">R$</span>
                                            <input type="number" value={valorKgCobre} onChange={e=>setValorKgCobre(Number(e.target.value))} className="bg-transparent w-full text-center outline-none" />
                                        </div>
                                    </div>
                                    <button onClick={()=>processarOrcamento()} className="tech-btn-green bg-[#FFCA05] text-[#102E82] font-black px-8 py-4 rounded-xl uppercase tracking-widest hover:opacity-90 transition-all h-20">
                                        Gerar<br/>Orçamento
                                    </button>
                                </div>
                                <textarea value={input} onChange={e=>setInput(e.target.value)}
                                    placeholder="Copie os itens do orçamento e cole a lista aqui..."
                                    className="w-full h-40 bg-[#141414]/60 backdrop-blur-md border border-white/10 shadow-lg rounded-2xl p-6 text-sm text-white outline-none focus:border-[#102E82] focus:shadow-[0_0_15px_rgba(16,46,130,0.1)] transition-all font-medium"
                                    style={{resize:'none'}} />
                                {erros.length > 0 && (
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-bold uppercase text-slate-500 tracking-wider">Não reconhecidos — clique para corrigir:</p>
                                        {erros.map((e,i) => <ErroItem key={i} linha={e} onCorrigir={corrigirErro} />)}
                                    </div>
                                )}
                            </div>
                            {itens.length > 0 && <div className="border-t border-slate-200 my-4"></div>}
                            {itens.length > 0 && (
                                <div className="space-y-4">
                                    <div className="flex justify-end">
                                        <button onClick={copiarImagem} className={`flex items-center gap-2 text-[10px] font-bold py-2 px-6 rounded-lg transition-all ${copiado?'bg-[#FFCA05] text-[#102E82] scale-95':'bg-[#141414]/60 border border-slate-200 shadow-lg hover:border-slate-300 text-white'}`}>
                                            <span>{copiado?"✔ COPIADO COM SUCESSO":"COPIAR IMAGEM"}</span>
                                        </button>
                                    </div>
                                    <div id="resultado-orcamento" ref={tableRef} className="space-y-6 top-0 p-8 pt-6 pb-6 bg-[#141414]/60 backdrop-blur-md rounded-3xl border border-slate-200 w-full">
                                        <div className="text-center mb-4">
                                            <h2 className="text-2xl font-black uppercase italic text-[#102E82] tracking-widest">ORÇAMENTO</h2>
                                        </div>
                                        <div className="bg-[#141414]/40 border border-white/10 rounded-2xl overflow-hidden shadow-2xl overflow-x-auto text-white">
                                            <table className="w-full text-left text-xs min-w-[600px]">
                                                <thead>
                                                    <tr className="bg-[#141414]/60/5 text-slate-300 uppercase font-bold text-[9px] tracking-wider">
                                                        <th className="p-5 pl-6">Produto</th>
                                                        <th className="p-5">Qtd</th>
                                                        <th className="p-5 font-bold text-center">Unitário</th>
                                                        <th className="p-5 pr-6 text-right">Total</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-200">
                                                    {itens.map(item => (
                                                        <tr key={item.id} className="hover:bg-[#141414]/60/5 transition-colors">
                                                            <td className="p-5 pl-6 font-bold text-white">{item.nome}</td>
                                                            <td className="p-5 text-slate-200">
                                                                {item.qtd.split(' (').map((part,i) => (
                                                                    <span key={i} className={i===1?'block text-[10px] text-slate-500':''}>
                                                                        {part.replace(')','')}</span>
                                                                ))}
                                                            </td>
                                                            <td className="p-5 font-semibold text-center">
                                                                <span className="text-slate-200">R$ {formatarMoeda(item.valorUnit)}</span>
                                                                <span className="block text-[10px] text-slate-400">/ {item.unidade}</span>
                                                            </td>
                                                            <td className="p-5 pr-6 text-right font-black text-white text-sm">R$ {formatarMoeda(item.total)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                        <div className="bg-[#FFCA05] p-6 rounded-2xl flex justify-between items-center text-[#102E82] shadow-lg">
                                            <span className="font-bold uppercase text-[10px]">Total Geral</span>
                                            <span className="text-3xl font-black">R$ {formatarMoeda(totalGeral)}</span>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
