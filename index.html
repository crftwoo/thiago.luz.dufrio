<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferramentas Thiago Luz - Dufrio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --dufrio-azul: #102E82;
      --dufrio-azul-hover: #0a1f5c;
      --dufrio-azul-claro: #2BAAE2;
      --bg-slate: #f4f7fe;
      --surface: #ffffff;
      --text-main: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

    body {
      background-color: var(--bg-slate);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === CABEÇALHO DO IFRAME (Oculto no menu) === */
    .header {
      width: 100%;
      background: var(--surface);
      padding: 16px 32px;
      display: none; /* Só aparece quando abre ferramenta */
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      z-index: 10;
    }

    .btn-voltar {
      background: var(--bg-slate);
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      color: var(--dufrio-azul);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-voltar:hover {
      background: #e2e8f0;
      transform: translateX(-4px);
    }

    .iframe-title {
      font-weight: 800;
      color: var(--dufrio-azul);
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    /* === MENU PRINCIPAL CENTRALIZADO === */
    .menu {
      width: 100%;
      max-width: 1100px;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .menu-title-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      margin-bottom: 60px;
      flex-wrap: wrap;
    }

    .title-group {
      display: flex;
      flex-direction: column;
      text-align: left; /* Títulos alinhados à esquerda do bloco interno */
    }

    .ferramentas-title {
      font-size: 42px;
      font-weight: 900;
      color: var(--dufrio-azul);
      letter-spacing: -1.5px;
      text-transform: uppercase;
      line-height: 1;
    }

    .ferramentas-subtitle {
      font-size: 18px;
      font-weight: 800;
      color: var(--dufrio-azul-claro);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .menu-logo {
      height: 60px;
      object-fit: contain;
    }

    /* === TOOLS GRID CENTRALIZADO E ENVOLVENTE === */
    .menu-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      width: 100%;
    }

    .dashboard-card {
      /* Baseado no layout 3x por linha - responsivo */
      width: calc(33.333% - 16px);
      min-width: 300px;
      max-width: 350px;
      background: var(--surface);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(112, 144, 176, 0.08);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-align: left;
    }

    .dashboard-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--card-color, var(--dufrio-azul));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .dashboard-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(112, 144, 176, 0.12);
      border-color: var(--card-color);
    }

    .dashboard-card:hover::before {
      transform: scaleX(1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .card-icon-wrapper {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card-bg-light, #f1f5f9);
      color: var(--card-color, var(--dufrio-azul));
      transition: transform 0.3s ease;
    }

    .card-icon-wrapper svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2;
    }

    .dashboard-card:hover .card-icon-wrapper {
      transform: scale(1.1);
    }

    .card-body h3 {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    .card-body p {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      line-height: 1.4;
    }

    /* === TOOLTIP & ATUALIZAÇÃO (RODAPÉ) === */
    .footer-area {
      margin-top: 60px;
      text-align: center;
      padding-bottom: 40px;
    }

    #lastUpdate {
      font-size: 12px !important;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      font-weight: 600;
      cursor: help;
      display: inline-block;
    }

    .tooltip {
      position: relative;
      display: inline-block;
    }

    .tooltiptext {
      visibility: hidden;
      width: 380px;
      background-color: var(--surface);
      color: var(--text-main);
      text-align: center;
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      position: absolute;
      z-index: 100;
      bottom: 140%;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: all 0.3s ease;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      pointer-events: none;
    }

    .tooltiptext strong {
      display: block;
      color: var(--dufrio-azul);
      margin-bottom: 8px;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .tooltip:hover .tooltiptext {
      visibility: visible;
      opacity: 1;
      bottom: 160%;
    }

    .tooltiptext::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -8px;
      border-width: 8px;
      border-style: solid;
      border-color: var(--surface) transparent transparent transparent;
    }

    .creation-date {
      font-size: 10px;
      color: var(--text-muted, #94a3b8);
      margin-top: 12px;
      letter-spacing: 0.5px;
      opacity: 0.8;
      font-weight: 500;
    }

    /* --- I-FRAME CONTENT --- */
    .content {
      width: 100%;
      height: 100vh;
      display: none;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      flex: 1;
      border: none;
      background: var(--surface);
    }
    
    @media (max-width: 768px) {
      .menu-title-container {
        flex-direction: column-reverse; /* Logo em cima no celular ou embaixo */
        gap: 20px;
      }
      .title-group {
        text-align: center;
      }
      .ferramentas-title {
        font-size: 32px;
      }
      .dashboard-card {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- CABEÇALHO (Apenas na view da Ferramenta) -->
  <header class="header" id="mainHeader">
    <button class="btn-voltar" onclick="fecharFerramenta()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
      MENU
    </button>
    <span class="iframe-title" id="iframeTitle">Módulo</span>
    <div style="width:100px;"></div> <!-- spacer -->
  </header>

  <!-- MENU PRINCIPAL CENTRALIZADO -->
  <main class="menu" id="menu">
    <div class="menu-title-container">
      <div class="title-group">
        <h1 class="ferramentas-title">Ferramentas</h1>
        <div class="ferramentas-subtitle">Thiago Luz</div>
      </div>
      <!-- Logo da Dufrio Original Sem Inverter -->
      <img src="https://www.dufrio.com.br/media/logo/websites/1/Logo_Dufrio_3_1_.webp" alt="Dufrio" class="menu-logo">
    </div>

    <!-- GRID DE CARDS (DASHBOARD) -->
    <div class="menu-grid" id="menuGrid"></div>

    <!-- RODAPÉ DE SISTEMA COM TOOLTIP -->
    <div class="footer-area">
      <div id="lastUpdate" class="tooltip">
        <span id="updateText">Verificando atualizações...</span>
        <div class="tooltiptext" id="updateTooltip">
          <strong>Histórico de Log</strong>
          <span id="updateMessage">Carregando detalhes...</span>
        </div>
      </div>
      <div class="creation-date">
        Criado em 16/09/2024
      </div>
    </div>
  </main>

  <!-- ÁREA DO IFRAME -->
  <div class="content" id="content">
    <iframe id="frame"></iframe>
  </div>

  <!-- SCRIPT -->
  <script>
    // SVGs dos ícones originais
    const svgComparar = `<svg viewBox="0 0 24 24" fill="none"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>`;
    const svgPrecificar = `<svg viewBox="0 0 24 24" fill="none"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line><line x1="6" y1="18" x2="18" y2="6"></line></svg>`;
    const svgCotar = `<svg viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`;
    const svgFiltro = `<svg viewBox="0 0 24 24" fill="none"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>`;
    const svgCorte = `<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>`;
    const svgDownload = `<svg viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`;

    // Arrays de Ferramentas Premium
    const ferramentas = [
      { nome: "Comparador de Ar", desc: "Análise de preços em tempo real com concorrência", arquivo: "comparador-ar.html", icone: svgComparar, color: "#102E82", bg: "#eff6ff" },
      { nome: "Precificação (Site)", desc: "Calculadora executiva de margens e custos", arquivo: "precificacao-ar.html", icone: svgPrecificar, color: "#2BAAE2", bg: "#e0f2fe" },
      { nome: "Plano de Corte", desc: "Otimização de tubulação e direcionamento", arquivo: "plano-corte.html", icone: svgCorte, color: "#ea580c", bg: "#fff7ed" },
      { nome: "Cotação Express", desc: "Agilidade e assertividade p/ orçamentos", arquivo: "cotacoes.html", icone: svgCotar, color: "#2563eb", bg: "#eff6ff" },
      { nome: "Extração de Itens", desc: "Extração robusta e estruturada de dados", arquivo: "itens-quantidade.html", icone: svgFiltro, color: "#d946ef", bg: "#fdf4ff" },
      { nome: "Baixar Extensão", desc: "Instalador do módulo Google Chrome", arquivo: "https://github.com/crftwoo/thiago.luz.dufrio/archive/refs/heads/main.zip", icone: svgDownload, color: "#475569", bg: "#f8fafc", isDownload: true }
    ];

    const menuGrid = document.getElementById("menuGrid");
    const menu = document.getElementById("menu");
    const content = document.getElementById("content");
    const frame = document.getElementById("frame");
    const mainHeader = document.getElementById("mainHeader");
    const iframeTitle = document.getElementById("iframeTitle");

    // Lógica para desenhar os Cards Neumórficos no Grid Central
    function renderizarCards() {
      menuGrid.innerHTML = '';
      ferramentas.forEach((f, index) => {
        const cardHtml = `
          <div class="dashboard-card" style="--card-color: ${f.color}; --card-bg-light: ${f.bg};" onclick="abrirFerramenta(${index})">
            <div class="card-header">
              <div class="card-icon-wrapper">${f.icone}</div>
            </div>
            <div class="card-body">
              <h3>${f.nome}</h3>
              <p>${f.desc}</p>
            </div>
          </div>
        `;
        menuGrid.insertAdjacentHTML('beforeend', cardHtml);
      });
    }

    // Abertura com suavidade
    window.abrirFerramenta = function(index) {
      const f = ferramentas[index];
      if (f.isDownload) {
        if (confirm(`Deseja baixar os arquivos da extensão?`)) {
          const link = document.createElement("a");
          link.href = f.arquivo;
          link.download = "extensao-dufrio.zip";
          document.body.appendChild(link);
          link.click();
          link.remove();
        }
        return;
      }
      
      // Abre o ambiente de Iframe
      menu.style.display = "none";
      content.style.display = "flex";
      mainHeader.style.display = "flex";
      iframeTitle.textContent = f.nome;
      frame.src = f.arquivo + "?v=" + new Date().getTime();
    };

    // Fechar Ferramenta
    window.fecharFerramenta = function() {
      frame.src = "";
      content.style.display = "none";
      mainHeader.style.display = "none";
      menu.style.display = "flex";
    };

    renderizarCards();

    // Sincronização Server-side Fake (API GitHub real puxando o update)
    fetch("https://api.github.com/repos/crftwoo/thiago.luz.dufrio/commits/main?v=" + new Date().getTime())
      .then(response => response.json())
      .then(data => {
        if (data && data.commit && data.commit.author && data.commit.author.date) {
          const date = new Date(data.commit.author.date);
          const formattedDate = date.toLocaleDateString("pt-BR", { day: '2-digit', month: '2-digit', year: 'numeric' });
          const formattedTime = date.toLocaleTimeString("pt-BR", { hour: '2-digit', minute: '2-digit' });
          
          document.getElementById("updateText").textContent = `⚡️ Última atualização: ${formattedDate} às ${formattedTime}`;
          document.getElementById("updateMessage").textContent = data.commit.message;
        }
      }).catch(err => {
        document.getElementById("updateText").textContent = "⚡️ Última atualização: Indisponível";
      });
  </script>
</body>
</html>
