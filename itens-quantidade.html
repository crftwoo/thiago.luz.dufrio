<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filtro de Códigos</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #4facfe;
      --border: rgba(255, 255, 255, 0.08);
      --bg-color: transparent;
      --card-bg: rgba(20, 20, 20, 0.6);
      --text-primary: #2c2c2c;
      --text-secondary: #888888;
            --text-main: #ffffff;
    }

    body {
            background: #050505 !important;
      color: var(--text-primary);
      font-family: 'Outfit', 'Inter', sans-serif;
      padding: 40px 20px;
    }

    .container { position: relative; z-index: 10; 
      max-width: 1000px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 { color: var(--text-main); 
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -1px;
      text-transform: uppercase;
      font-style: italic;
      color: var(--green);
    }

    .sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    textarea {
      width: 100%;
      height: 280px;
      background: var(--card-bg);
            backdrop-filter: blur(10px);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 24px;
      font-size: 14px;
      border-radius: 16px;
      font-family: 'Outfit', 'Inter', sans-serif;
      resize: vertical;
      transition: all 0.3s ease;
      outline: none;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02);
    }

    textarea:focus {
      border-color: rgba(16, 46, 130, 0.2);
      box-shadow: 0 0 0 1px var(--green);
    }

    textarea::placeholder {
      color: #3f3f46;
    }

    .button-group {
      display: flex;
      gap: 16px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      padding: 16px 32px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      background: var(--card-bg);
            backdrop-filter: blur(10px);
      color: var(--text-primary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Outfit', 'Inter', sans-serif;
      text-transform: uppercase;
    }

    button:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
      transform: translateY(-2px);
    }

    .btn {
      background: var(--green);
      color: #ffffff;
      border-color: var(--green);
    }

    .btn:hover {
      background: #2BAAE2;
      border-color: #2BAAE2;
      box-shadow: 0 4px 15px rgba(16, 46, 130, 0.15);
    }

    .result {
      margin-top: 32px;
      background: var(--card-bg);
            backdrop-filter: blur(10px);
      padding: 24px;
      border-radius: 16px;
      min-height: 120px;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.6;
      border: 1px solid var(--border);
      color: var(--green);
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .result:empty {
      display: none;
    }

    .count {
      margin-top: 16px;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      body {
        padding: 24px 16px;
      }

      h1 { color: var(--text-main); 
        font-size: 28px;
      }

      .button-group {
        flex-direction: column;
        gap: 12px;
      }

      button {
        width: 100%;
        padding: 20px;
      }

      textarea {
        height: 200px;
      }
    }
  </style>
</head>

<body>
    <div style="position:fixed; inset:0; background: #050505 !important; z-index:-2; pointer-events:none;"></div>
    <style>
      @keyframes auroraAnim {
        0% { transform: scale(1) translate(0, 0); }
        100% { transform: scale(1.3) translate(50px, -50px); }
      }
    </style>
    <div class="aurora" style="position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(120px);z-index:-1;opacity:0.25;background:#3b82f6;top:-10%;left:-10%;animation:auroraAnim 15s infinite alternate ease-in-out;pointer-events:none;"></div>
    <div class="aurora" style="position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(120px);z-index:-1;opacity:0.25;background:#8b5cf6;bottom:-10%;right:-5%;animation:auroraAnim 20s infinite alternate ease-in-out;pointer-events:none;"></div>


<!-- BOTAO VOLTAR FLUTUANTE GLOBAL -->
<style>
.btn-voltar-global { position: fixed; top: 15px; left: 15px; background: rgba(20,20,20,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 4px 10px; border-radius: 30px; text-decoration: none; font-weight: 800; font-size: 9px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 999999; display: flex; align-items: center; gap: 4px; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-voltar-global:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
  .btn-voltar-global svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 3; fill: none; }
  body > div.container:first-of-type, body > main, body > aside .header, body > .header-app { margin-top: 40px !important; }
</style>
<a href="index.html" class="btn-voltar-global">
  <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
  Menu Principal
</a>

  <div class="container">

    <h1>Filtro de Códigos</h1>
    <div class="sub">Cole sua lista e extraia apenas os códigos com quantidade.</div>

    <textarea id="entrada" placeholder="Cole aqui sua lista..."></textarea>

    <div class="button-group">
      <button class="btn" onclick="filtrar()">FILTRAR CÓDIGOS</button>
      <button id="btnCopiar" class="btn" onclick="copiar()">COPIAR</button>
      <button class="btn" onclick="limpar()">LIMPAR</button>
    </div>

    <div class="result" id="resultado"></div>
    <div class="count" id="contagem"></div>

  </div>

  <script>

    let codigosFinal = [];

    function pegarNumeroFinal(linha) {
      let nums = linha.match(/[\d\.,]+/g);
      if (!nums) return 0;

      let ultimo = nums[nums.length - 1]
        .replace(/\./g, '')
        .replace(',', '.');

      return parseFloat(ultimo) || 0;
    }

    function pegarCodigo(linha) {
      let match = linha.match(/\d+/);
      return match ? match[0] : null;
    }

    function filtrar() {

      let texto = document.getElementById("entrada").value;
      let linhas = texto.split(/\n+/);

      let set = new Set();

      linhas.forEach(linha => {
        linha = linha.trim();
        if (!linha) return;

        let qtd = pegarNumeroFinal(linha);
        if (qtd <= 0) return;

        let cod = pegarCodigo(linha);
        if (cod) set.add(cod);
      });

      codigosFinal = Array.from(set);

      document.getElementById("resultado").textContent =
        codigosFinal.join("\n");

      document.getElementById("contagem").textContent =
        "Quantidade de códigos: " + codigosFinal.length;
    }

    function copiar() {

      if (codigosFinal.length === 0) return;

      navigator.clipboard.writeText(codigosFinal.join("\n"));

      let btn = document.getElementById("btnCopiar");
      btn.textContent = "COPIADO ✓";

      setTimeout(() => {
        btn.textContent = "COPIAR";
      }, 2000);
    }

    function limpar() {
      document.getElementById("entrada").value = "";
      document.getElementById("resultado").textContent = "";
      document.getElementById("contagem").textContent = "";
    }

  </script>

</body>

</html>
