  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;800;900&display=swap');

    * {
      box-sizing: border-box;
    }

    :root {
      --green: #4facfe;
      --border: rgba(255, 255, 255, 0.08);
      --bg-color: transparent;
      --card-bg: rgba(20, 20, 20, 0.6);
      --text-secondary: #888888;
      --text-main: #ffffff;
    }

    body {
      font-family: 'Outfit', 'Inter', sans-serif;
      background: #050505 !important;
      color: var(--text-main);
      padding: 40px 20px;
      margin: 0;
    }

    .container { position: relative; z-index: 10; 
      max-width: 1000px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 { color: var(--text-main); 
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -1px;
      text-transform: uppercase;
      font-style: italic;
      color: var(--green);
    }

    .sub-title {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    h3 { color: var(--text-main); 
      font-weight: 800;
      margin-top: 0;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 11px;
      color: var(--green);
    }

    textarea {
      background: #050505 !important;
      color: var(--text-main);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      font-family: 'Outfit', 'Inter', sans-serif;
      font-size: 14px;
      box-sizing: border-box;
      resize: vertical;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02);
    }

    textarea:focus {
      border-color: rgba(16, 46, 130, 0.2);
      box-shadow: 0 0 0 1px var(--green);
    }

    .box {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 32px;
      margin-top: 24px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    button {
      margin-top: 16px;
      padding: 16px 32px;
      background: #050505 !important;
      color: var(--text-main);
      border: 1px solid var(--border);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Outfit', 'Inter', sans-serif;
    }

    button:hover {
      background: var(--green);
      color: #ffffff;
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(16, 46, 130, 0.15);
    }

    .decision {
      margin-top: 24px;
      padding: 32px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      margin-top: 16px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 16px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
    }

    th {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 11px;
    }

    .copybox {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      padding: 32px;
      margin-top: 32px;
      border-radius: 20px;
    }

    select, input {
      background: #050505 !important;
      color: var(--text-main);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-family: 'Outfit', 'Inter', sans-serif;
      font-weight: 600;
      font-size: 11px;
      outline: none;
      width: 100%;
      text-align: center;
    }

    .hidden { display: none !important; }

    .table-responsive {
      width: 100%;
      overflow-x: auto;
      margin-top: 20px;
      border-radius: 12px;
    }
    
    .sub {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 800;
    }
  </style>
</head>

  <div class="container">
    <h1>Plano de Corte – Painéis</h1>
    <div class="sub-title">Otimize os cortes de painéis PIR/EPS para minimizar o desperdício de material.</div>

    <div class="box">
      <h3>Solicitação do cliente</h3>
      <textarea id="raw" rows="6" style="width:100%;" placeholder="Cole aqui o texto do cliente..."></textarea><br>
      <button onclick="interpretar()">Interpretar</button>
    </div>

    <div class="box hidden" id="editor">
      <h3>Demanda interpretada (editável)</h3>
      <div class="table-responsive">
        <table id="editTable">
          <tr>
            <th>Qtd</th>
            <th>Comprimento (m)</th>
            <th>Tipo</th>
            <th>Espessura</th>
          </tr>
        </table>
      </div>
      <button onclick="confirmar()">OK</button>
    </div>

    <div class="box hidden" id="boxDemanda">
      <h3>Demanda</h3>
      <textarea id="input" rows="8" style="width:100%;" readonly></textarea><br>
      <button onclick="processar()">Calcular</button>
    </div>

    <div id="decisao" class="hidden"></div>
    <div id="resultado" class="hidden"></div>
    <div id="resumo" class="hidden"></div>
  </div>

  <script>
    const ESPESSURAS = {
      PIR: ["70mm", "100mm", "120mm", "150mm"],
      EPS: ["50mm", "100mm", "150mm", "200mm"]
    };

    const PAINEL_PADRAO = 12.05;
    const PAINEIS_ALT = [2.4, 3, 4, 6];
    const LIMITE_SOBRA = 1.5;

    let grupos = {}, planos = {}, ordem = [], decisoes = {}, idx = 0;

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const dados = urlParams.get('dados');
      if (dados) {
        document.getElementById('raw').value = dados;
        interpretar();
      }
    });

    function interpretar() {
      let linhas = raw.value.split(/\n+/).map(l => l.trim()).filter(l => l);
      let table = document.getElementById("editTable");
      table.innerHTML = "<tr><th>Qtd</th><th>Comprimento (m)</th><th>Tipo</th><th>Espessura</th></tr>";

      let tiposEncontrados = new Set();
      let espEncontradas = new Set();

      linhas.forEach(l => {
        let ll = l.toLowerCase();
        if (ll.includes("pir")) tiposEncontrados.add("PIR");
        if (ll.includes("eps")) tiposEncontrados.add("EPS");
        let em = ll.match(/(\d+)\s*mm/);
        if (em) espEncontradas.add(em[1] + "mm");
      });

      let globalTipo = tiposEncontrados.size === 1 ? [...tiposEncontrados][0] : "";
      let globalEsp = espEncontradas.size === 1 ? [...espEncontradas][0] : "";

      linhas.forEach(l => {
        let ll = l.toLowerCase();
        let ctxTipo = ll.includes("pir") ? "PIR" : (ll.includes("eps") ? "EPS" : globalTipo);
        let em = ll.match(/(\d+)\s*mm/);
        let ctxEsp = em ? em[1] + "mm" : globalEsp;

        let qtdMatch = ll.match(/^(\d+)/) || ll.match(/(\d+)\s*(?:placa|painel|peça|pç|unidades)/i);
        let qtd = qtdMatch ? fmtQtd(qtdMatch[1]) : "";

        let compMatch = ll.match(/(\d+[\.,]\d+)(?:\s*m)?|(\d+)\s*m(?!\w)/i);
        let comp = "";
        if (compMatch) {
            let numRaw = compMatch[1] || compMatch[2];
            let numFloat = parseFloat(numRaw.replace(',', '.'));
            comp = numFloat.toFixed(2).replace('.', ',');
        }

        if (!qtd && !comp) return;

        let tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input value="${qtd}" size="3"></td>
          <td><input value="${comp}" size="4"></td>
          <td>
            <select onchange="ajustarEsp(this)">
              <option value=""></option>
              <option ${ctxTipo === "PIR" ? "selected" : ""}>PIR</option>
              <option ${ctxTipo === "EPS" ? "selected" : ""}>EPS</option>
            </select>
          </td>
          <td>
            <select>
              ${(ctxTipo ? ESPESSURAS[ctxTipo] : []).map(e => `<option ${e === ctxEsp ? "selected" : ""}>${e}</option>`).join("")}
            </select>
          </td>`;
        table.appendChild(tr);
      });

      editor.classList.remove("hidden");
      setTimeout(() => document.getElementById("editor").scrollIntoView({ behavior: "smooth", block: "start" }), 100);
    }

    function ajustarEsp(sel) {
      let tipo = sel.value;
      let espSel = sel.parentElement.nextElementSibling.querySelector("select");
      espSel.innerHTML = "";
      if (!tipo) return;
      ESPESSURAS[tipo].forEach(e => {
        let o = document.createElement("option");
        o.textContent = e;
        espSel.appendChild(o);
      });
    }

    function confirmar() {
      let out = "";
      document.querySelectorAll("#editTable tr").forEach((tr, i) => {
        if (i === 0) return;
        let tds = tr.querySelectorAll("td");
        let qtd = tds[0].querySelector("input").value;
        let comp = tds[1].querySelector("input").value;
        let tipo = tds[2].querySelector("select").value;
        let esp = tds[3].querySelector("select").value;
        if (qtd && comp && tipo && esp) {
          out += `${qtd} PAINEL | ${comp} | ${tipo} | ${esp}\n`;
        }
      });
      input.value = out.trim();
      editor.classList.add("hidden"); 
      let docDemanda = document.getElementById("boxDemanda");
      docDemanda.classList.remove("hidden");
      setTimeout(() => docDemanda.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
    }

    function otimizar(pecas, tamanhoPadrao) {
      let disponiveis = [...pecas].sort((a, b) => b - a);
      let paineis = [];
      let cap = Math.round(tamanhoPadrao * 100);

      while (disponiveis.length > 0) {
        let n = disponiveis.length;
        let pesos = disponiveis.map(p => Math.round(p * 100));
        let dp = new Int32Array(cap + 1);
        let track = Array.from({ length: n }, () => new Uint8Array(cap + 1));

        for (let i = 0; i < n; i++) {
          let p = pesos[i];
          for (let w = cap; w >= p; w--) {
            if (dp[w - p] + p > dp[w]) {
              dp[w] = dp[w - p] + p;
              track[i][w] = 1;
            }
          }
        }

        let bestW = 0;
        for (let w = 0; w <= cap; w++) if (dp[w] > dp[bestW]) bestW = w;

        let currW = bestW, indices = [];
        for (let i = n - 1; i >= 0; i--) {
          if (track[i][currW]) { indices.push(i); currW -= pesos[i]; }
        }

        let painelAtual = [];
        indices.sort((a, b) => b - a).forEach(idx => {
          painelAtual.push(disponiveis[idx]);
          disponiveis.splice(idx, 1);
        });
        paineis.push(painelAtual);
      }
      return paineis;
    }

    function processar() {
      document.getElementById("decisao").classList.remove("hidden"); 
      document.getElementById("resultado").classList.remove("hidden"); 
      document.getElementById("resumo").classList.remove("hidden");
      grupos = {}; planos = {}; ordem = []; decisoes = {}; idx = 0;
      decisao.innerHTML = ""; resultado.innerHTML = ""; resumo.innerHTML = "";
      
      input.value.split("\n").forEach(l => {
        let m = l.match(/(\d+)\s*PAINEL.*?(\d+[\.,]\d+).*?(PIR|EPS).*?(\d+mm)/i);
        if (m) {
          let qtd = parseInt(m[1]), tam = parseFloat(m[2].replace(",", ".")), chave = m[3].toUpperCase() + " " + m[4];
          if (!grupos[chave]) grupos[chave] = [];
          for (let i = 0; i < qtd; i++) grupos[chave].push(tam);
        }
      });

      Object.keys(grupos).forEach(chave => {
        let tamanhoPainel = chave === "EPS 50mm" ? 6.00 : 12.05;
        let paineis = otimizar(grupos[chave], tamanhoPainel);
        let ultimo = paineis.pop();
        let somaUltimo = ultimo.reduce((s, v) => s + v, 0);
        planos[chave] = { base: paineis, ultimo: ultimo };
        
        let temAlt = false, tipoDec = "", decAlt = null;
        if (chave !== "EPS 50mm") {
            let altAgrupar = PAINEIS_ALT.find(p => p >= somaUltimo);
            if (altAgrupar) { temAlt = true; tipoDec = "AGRUPAR"; decAlt = altAgrupar; }
            else {
                let matSep = 0, altsPeca = [], todasOk = true;
                ultimo.forEach(peca => {
                    let aP = PAINEIS_ALT.find(p => p >= peca);
                    if (aP) { matSep += aP; altsPeca.push(aP); } else todasOk = false;
                });
                if (todasOk && matSep < tamanhoPainel) { temAlt = true; tipoDec = "SEPARAR"; decAlt = altsPeca; }
            }
        }
        planos[chave].tipoDecisao = tipoDec; planos[chave].decisaoAlt = decAlt;
        if ((tamanhoPainel - somaUltimo) > LIMITE_SOBRA && temAlt) ordem.push(chave);
        else decisoes[chave] = "PADRAO";
      });

      if (ordem.length) mostrarPergunta(); else { aplicarDecisoes(); mostrarTudo(); }
    }

    function mostrarPergunta() {
      let chave = ordem[idx], p = planos[chave], soma = p.ultimo.reduce((s, v) => s + v, 0), txtAlt = "";
      if (p.tipoDecisao === "SEPARAR") {
          let cont = {}; p.decisaoAlt.forEach(v => cont[v] = (cont[v] || 0) + 1);
          txtAlt = "Separar: [" + Object.keys(cont).map(k => `${cont[k]} de ${Number(k).toFixed(2).replace('.',',')}m`).join(" + ") + "]";
      } else txtAlt = `1 Painel de ${p.decisaoAlt.toFixed(2).replace('.',',')} m`;

      decisao.innerHTML = `<div class="decision"><h3>Decisão – ${chave}</h3>
        <button onclick="decidir('PADRAO')">Painel 12,05 m (sobra ${(12.05-soma).toFixed(2).replace('.',',')} m)</button><br><br>
        <button onclick="decidir('ALT')">${txtAlt}</button></div>`;
      setTimeout(() => document.getElementById("decisao").scrollIntoView({ behavior: "smooth", block: "center" }), 100);
    }

    function decidir(op) {
      decisoes[ordem[idx]] = op; idx++;
      if (idx < ordem.length) mostrarPergunta(); else { aplicarDecisoes(); decisao.innerHTML = ""; mostrarTudo(); }
    }

    function aplicarDecisoes() {
      Object.keys(planos).forEach(chave => {
        let p = planos[chave];
        if (decisoes[chave] === "PADRAO") p.base.push(p.ultimo);
        else if (p.tipoDecisao === "SEPARAR") p.ultimo.forEach((c, i) => { let a = [c]; a.tamAlt = p.decisaoAlt[i]; p.base.push(a); });
        else { p.ultimo.tamAlt = p.decisaoAlt; p.base.push(p.ultimo); }
      });
    }

    function mostrarTudo() {
      let out = "", resumoTxt = "Demanda a atender:\n" + input.value.trim() + "\n\nCortes com melhor aproveitamento:\n";
      
      Object.keys(planos).forEach(chave => {
        let tamanhoPadrao = chave === "EPS 50mm" ? 6.00 : 12.05;
        out += `<h3 style="text-align:center;margin-top:32px;">Plano de corte – ${chave}</h3>`;
        let paineis = planos[chave].base, max = Math.max(...paineis.map(p => p.length)), cont = {};
        
        out += `<div class="table-responsive"><table><tr><th rowspan="2">Painel</th><th colspan="${max}">Cortes (m)</th><th rowspan="2">Sobra</th></tr><tr>`;
        for (let i = 1; i <= max; i++) out += `<th>Corte ${i}</th>`;
        out += "</tr>";
        
        paineis.forEach((p, i) => {
          let tam = p.tamAlt || tamanhoPadrao; cont[tam] = (cont[tam] || 0) + 1;
          let usado = p.reduce((s, v) => s + v, 0);
          out += `<tr><td>Painel ${i+1}<br><span class="sub">${tam.toFixed(2).replace('.',',')} m</span></td>`;
          for (let c = 0; c < max; c++) out += `<td>${p[c] ? p[c].toFixed(2).replace('.',',') : ""}</td>`;
          out += `<td>${(tam - usado).toFixed(2).replace('.',',')}</td></tr>`;
        });
        out += "</table></div>";

        Object.keys(cont)
          .sort((a, b) => Number(b) - Number(a)) 
          .forEach(t => {
            resumoTxt += `${cont[t]} pçs – Painel ${chave.split(" ")[0]} ${chave.split(" ")[1]} de ${Number(t).toFixed(2).replace('.',',')} m\n`;
          });
      });

      resultado.innerHTML = out;
      
      let linhasResumo = resumoTxt.split('\n').length;
      let alturaDinamica = (linhasResumo * 20) + 60; 

      resumo.innerHTML = `<div class="copybox">
        <h3>Resumo para envio</h3>
        <textarea id="txtResumo" style="height:${alturaDinamica}px; overflow:hidden; width:100%;">${resumoTxt.trim()}</textarea>
        <br><button onclick="navigator.clipboard.writeText(txtResumo.value)">Copiar</button>
      </div>`;
      
      setTimeout(() => document.getElementById("resultado").scrollIntoView({ behavior: "smooth", block: "start" }), 100);
    }

    function fmtQtd(v) { let n = parseInt(v, 10); return isNaN(n) ? "" : (n < 10 ? "0" + n : String(n)); }
  </script>
</body>
</html>
