<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Preços ao Vivo – Dufrio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050505;
      --card-bg: rgba(18,18,18,0.75);
      --card-border: rgba(255,255,255,0.07);
      --green: #00e676;
      --blue: #4b9ce3;
      --text: #f0f0f0;
      --muted: #666;
      --radius: 16px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Aurora BG */
    .aurora { position: fixed; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none; opacity: 0.2; animation: auroraAnim 18s infinite alternate ease-in-out; }
    .a1 { width: 600px; height: 600px; background: #3b82f6; top: -10%; left: -10%; }
    .a2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -10%; right: -5%; animation-duration: 22s; }
    @keyframes auroraAnim { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.3) translate(40px,-40px); } }

    /* Botão voltar */
    .btn-back { position: fixed; top: 16px; left: 16px; z-index: 999; background: rgba(20,20,20,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 6px 14px; border-radius: 30px; text-decoration: none; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.1); }
    .btn-back svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 3; fill: none; }

    /* Layout */
    .container { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 80px 32px 60px; }

    /* Header */
    .page-header { text-align: center; margin-bottom: 52px; }
    .page-header h1 { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; background: linear-gradient(135deg, #fff 40%, #4b9ce3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .page-header p { color: var(--muted); font-size: 14px; }
    .live-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-right: 6px; animation: pulse 1.8s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,230,118,0.5); } 50% { opacity:0.7; box-shadow: 0 0 0 6px rgba(0,230,118,0); } }

    /* Estado de carregamento */
    #loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 80px 20px; color: var(--muted); }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(75,156,227,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Estado vazio */
    #empty-state { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 80px 20px; text-align: center; color: var(--muted); }
    #empty-state svg { opacity: 0.25; }
    #empty-state h3 { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.4); }
    #empty-state p { font-size: 13px; max-width: 380px; line-height: 1.6; }

    /* Seção por loja */
    .store-section { margin-bottom: 52px; }
    .store-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .store-logo-wrap { height: 28px; display: flex; align-items: center; }
    .store-logo-wrap img { height: 28px; max-width: 110px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.85; }
    .store-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); }
    .store-count { margin-left: auto; font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 3px 10px; border-radius: 20px; }

    /* Grid de cards */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

    /* Card de produto */
    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(12px);
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      cursor: default;
    }
    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(75,156,227,0.25);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }

    /* Imagem do produto */
    .product-img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .product-img-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 12px;
      transition: transform 0.3s ease;
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.04); }

    /* Info */
    .product-info { padding: 16px; }
    .product-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      color: #e8e8e8;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-prices { display: flex; flex-direction: column; gap: 5px; }
    .price-spot {
      font-size: 15px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -0.3px;
    }
    .price-install {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }

    /* Botão de atualizar */
    .refresh-bar { display: flex; justify-content: center; margin-bottom: 36px; }
    .btn-refresh {
      background: transparent;
      border: 1px solid rgba(75,156,227,0.35);
      color: var(--blue);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 22px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-refresh:hover { background: rgba(75,156,227,0.12); border-color: var(--blue); }
    .btn-refresh.loading { opacity: 0.5; pointer-events: none; }

    /* Contador total */
    .total-bar { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 40px; }

    @media (max-width: 600px) {
      .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .page-header h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <div class="a1 aurora"></div>
  <div class="a2 aurora"></div>

  <a href="index.html" class="btn-back">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Menu Principal
  </a>

  <div class="container">
    <div class="page-header">
      <h1><span class="live-dot"></span>Preços ao Vivo</h1>
      <p>Produtos das abas abertas nas lojas, capturados pela extensão em tempo real</p>
    </div>

    <div class="refresh-bar">
      <button class="btn-refresh" id="btn-refresh" onclick="carregarDados()">
        🔄 Atualizar da Extensão
      </button>
    </div>

    <div id="loading-state">
      <div class="spinner"></div>
      <span>Lendo dados das extensões...</span>
    </div>

    <div id="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h18v18H3z" rx="2"/><path d="M8 12h8M12 8v8"/></svg>
      <h3>Nenhum produto encontrado</h3>
      <p>Abra abas de pesquisa nas lojas (Dufrio, Leveros, Central Ar...) com a extensão ativa e volte aqui.</p>
    </div>

    <div id="total-bar" class="total-bar" style="display:none;"></div>
    <div id="results"></div>
  </div>

  <script>
    const STORE_LOGOS = {
      "dufrio":        "img/logo_dufrio.jpg",
      "leveros":       "img/logo_leveros.svg",
      "central ar":    "img/logo_centralar.png",
      "frigelar":      "img/logo_frigelar.svg",
      "friopeças":     "img/logo_friopecas.png",
      "poloar":        "img/logo_poloar.png",
      "str":           "img/logo_str.svg",
      "webcontinental":"img/logo_webcontinental.png",
      "clima rio":     "img/logo_climario.svg"
    };

    const STORE_ORDER = ["Dufrio","Leveros","Central Ar","Frigelar","Friopeças","Poloar","STR","Webcontinental","Clima Rio"];

    function getLogoPath(storeName) {
      const key = storeName.toLowerCase();
      for (const [k, v] of Object.entries(STORE_LOGOS)) {
        if (key.includes(k)) return v;
      }
      return null;
    }

    function parseSpotPrice(str) {
      if (!str) return Infinity;
      const m = str.match(/R\$\s*([\d.,]+)/);
      if (m) return parseFloat(m[1].replace(/\./g,'').replace(',','.')) || Infinity;
      return Infinity;
    }

    function renderStore(storeName, products) {
      const section = document.createElement('div');
      section.className = 'store-section';

      const logoPath = getLogoPath(storeName);
      const logoHtml = logoPath
        ? `<div class="store-logo-wrap"><img src="${logoPath}" alt="${storeName}" onerror="this.style.display='none'"></div>`
        : '';

      section.innerHTML = `
        <div class="store-header">
          ${logoHtml}
          <span class="store-name">${storeName}</span>
          <span class="store-count">${products.length} produto${products.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="products-grid" id="grid-${storeName.replace(/\s/g,'-')}"></div>
      `;

      const grid = section.querySelector('.products-grid');
      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-img-wrap">
            <img src="${p.image || ''}" alt="${p.title || ''}" onerror="this.src='https://via.placeholder.com/180x140?text=Sem+Foto'">
          </div>
          <div class="product-info">
            <div class="product-title">${p.title || '—'}</div>
            <div class="product-prices">
              <div class="price-spot">💰 ${p.spot || '—'}</div>
              <div class="price-install">💳 ${p.install || '—'}</div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      return section;
    }

    let fetchId = null;

    function carregarDados() {
      const btn = document.getElementById('btn-refresh');
      const loading = document.getElementById('loading-state');
      const empty = document.getElementById('empty-state');
      const results = document.getElementById('results');
      const totalBar = document.getElementById('total-bar');

      btn.classList.add('loading');
      loading.style.display = 'flex';
      empty.style.display = 'none';
      results.innerHTML = '';
      totalBar.style.display = 'none';

      // ID único para este fetch
      fetchId = Date.now();
      const myId = fetchId;
      let coletado = {};

      const coletar = (event) => {
        if (event.source !== window || !event.data || event.data.type !== 'TWO_RETURN_COMPARADOR_DATA') return;
        if (event.data.fetchId !== myId) return;
        const d = event.data.data;
        if (!d) return;
        Object.entries(d).forEach(([k, v]) => {
          if (k !== 'metadata_title' && Array.isArray(v) && v.length > 0) {
            coletado[k] = v;
          }
        });
      };
      window.addEventListener('message', coletar);

      window.postMessage({ type: 'TWO_GET_COMPARADOR_DATA', fetchId: myId }, '*');

      setTimeout(() => {
        window.removeEventListener('message', coletar);
        loading.style.display = 'none';
        btn.classList.remove('loading');

        if (Object.keys(coletado).length === 0) {
          empty.style.display = 'flex';
          return;
        }

        // Ordena por ordem de lojas definida
        const sortedStores = Object.keys(coletado).sort((a, b) => {
          const ia = STORE_ORDER.indexOf(a);
          const ib = STORE_ORDER.indexOf(b);
          return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
        });

        let totalProdutos = 0;
        sortedStores.forEach(storeName => {
          const products = coletado[storeName].slice().sort((a,b) => parseSpotPrice(a.spot) - parseSpotPrice(b.spot));
          totalProdutos += products.length;
          results.appendChild(renderStore(storeName, products));
        });

        totalBar.style.display = 'block';
        totalBar.textContent = `${totalProdutos} produto${totalProdutos !== 1 ? 's' : ''} encontrado${totalProdutos !== 1 ? 's' : ''} em ${sortedStores.length} loja${sortedStores.length !== 1 ? 's' : ''}`;
      }, 700);
    }

    // Carrega automaticamente ao entrar
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(carregarDados, 200);
    });

    // Atualiza em tempo real quando a extensão raspar uma nova aba (onChanged do bridge)
    window.addEventListener('message', (event) => {
      if (event.source !== window || !event.data || event.data.type !== 'TWO_RETURN_COMPARADOR_DATA') return;
      if (event.data.fetchId) return; // Ignora respostas de fetch manual (tratadas acima)
      const d = event.data.data;
      if (!d) return;
      let hasProducts = false;
      Object.entries(d).forEach(([k,v]) => { if (k !== 'metadata_title' && Array.isArray(v) && v.length > 0) hasProducts = true; });
      if (hasProducts) carregarDados();
    });
  </script>
</body>
</html>
