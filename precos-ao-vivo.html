<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Preços ao Vivo – Dufrio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050505;
      --card-bg: rgba(16,16,16,0.8);
      --card-border: rgba(255,255,255,0.07);
      --green: #00e676;
      --blue: #4b9ce3;
      --text: #f0f0f0;
      --muted: #555;
      --radius: 14px;
    }

    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* Aurora */
    .aurora { position: fixed; border-radius: 50%; filter: blur(130px); z-index: 0; pointer-events: none; opacity: 0.18; animation: auroraAnim 18s infinite alternate ease-in-out; }
    .a1 { width: 700px; height: 700px; background: #3b82f6; top: -15%; left: -10%; }
    .a2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -10%; right: -5%; animation-duration: 24s; }
    @keyframes auroraAnim { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.3) translate(40px,-40px); } }

    /* Voltar */
    .btn-back { position: fixed; top: 16px; left: 16px; z-index: 999; background: rgba(20,20,20,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 6px 14px; border-radius: 30px; text-decoration: none; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.1); }
    .btn-back svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 3; fill: none; }

    /* Container */
    .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 80px 28px 80px; }

    /* Header */
    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 { font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; background: linear-gradient(135deg, #fff 40%, #4b9ce3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .page-header p { color: var(--muted); font-size: 13px; }
    .live-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-right: 6px; animation: pulse 1.8s infinite; vertical-align: middle; }
    @keyframes pulse { 0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,230,118,0.5); } 50% { opacity:0.7; box-shadow: 0 0 0 6px rgba(0,230,118,0); } }

    /* Barra topo */
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .total-count { font-size: 12px; color: var(--muted); }
    .total-count strong { color: rgba(255,255,255,0.5); }
    .btn-refresh { background: transparent; border: 1px solid rgba(75,156,227,0.3); color: var(--blue); font-family: 'Outfit',sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 7px 18px; border-radius: 30px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .btn-refresh:hover { background: rgba(75,156,227,0.1); border-color: var(--blue); }
    .btn-refresh.loading { opacity: 0.4; pointer-events: none; }

    /* Estados */
    #loading-state { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 100px 20px; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(75,156,227,0.15); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #empty-state { display: none; flex-direction: column; align-items: center; gap: 14px; padding: 100px 20px; text-align: center; }
    #empty-state h3 { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.3); }
    #empty-state p { font-size: 12px; color: var(--muted); max-width: 340px; line-height: 1.7; }

    /* Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* Card */
    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-3px);
      border-color: rgba(75,156,227,0.2);
      box-shadow: 0 12px 32px rgba(0,0,0,0.55);
    }

    /* Badge da loja */
    .store-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.75);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 8px;
      border-radius: 20px;
      cursor: default;
      white-space: nowrap;
    }



    /* Imagem */
    .product-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,0.025);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .product-img-wrap::after {
      content: '📋 Copiar';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7);
      color: rgba(255,255,255,0.8);
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      padding: 6px;
      transform: translateY(100%);
      transition: transform 0.2s ease;
    }
    .product-img-wrap:hover::after { transform: translateY(0); }
    .product-img-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 10px;
      transition: transform 0.3s ease;
    }
    .product-img-wrap:hover img { transform: scale(1.05); }
    .product-img-wrap.copied::after { content: '✔ Copiado!'; background: rgba(0,230,118,0.7); transform: translateY(0); }

    /* Info clicável */
    .product-info {
      padding: 12px 14px 14px;
      flex: 1;
      cursor: pointer;
      transition: background 0.15s;
      border-top: 1px solid rgba(255,255,255,0.04);
      position: relative;
    }
    .product-info:hover { background: rgba(255,255,255,0.03); }
    .product-info::after {
      content: '📋';
      position: absolute;
      top: 10px; right: 12px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .product-info:hover::after { opacity: 0.5; }
    .product-info.copied { background: rgba(0,230,118,0.07); }

    .product-title {
      font-size: 11.5px;
      font-weight: 600;
      line-height: 1.5;
      color: #d8d8d8;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .price-spot { font-size: 14px; font-weight: 800; color: var(--green); letter-spacing: -0.3px; margin-bottom: 3px; }
    .price-install { font-size: 10px; color: var(--muted); }

    @media (max-width: 600px) {
      .products-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .page-header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="a1 aurora"></div>
  <div class="a2 aurora"></div>

  <a href="index.html" class="btn-back">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Menu
  </a>

  <div class="container">
    <div class="page-header">
      <h1><span class="live-dot"></span>Preços ao Vivo</h1>
      <p>Produtos das abas abertas, ordenados do mais barato ao mais caro</p>
    </div>

    <div class="top-bar">
      <div class="total-count" id="total-count"></div>
      <button class="btn-refresh" id="btn-refresh" onclick="carregarDados()">🔄 Atualizar</button>
    </div>

    <div id="loading-state">
      <div class="spinner"></div>
      <span style="font-size:13px;color:#444;">Lendo extensões...</span>
    </div>

    <div id="empty-state">
      <h3>Nenhum produto encontrado</h3>
      <p>Abra abas de pesquisa nas lojas com a extensão ativa. Os produtos aparecem aqui automaticamente.</p>
    </div>

    <div class="products-grid" id="results" style="display:none;"></div>
  </div>

  <script>
    function parseSpotPrice(str) {
      if (!str) return Infinity;
      const m = str.match(/R\$\s*([\d.,]+)/);
      if (m) return parseFloat(m[1].replace(/\./g,'').replace(',','.')) || Infinity;
      return Infinity;
    }

    function formatTextToCopy(p) {
      const cycle = (p.title||'').toLowerCase().includes('quente') ? '🔥❄️' : '❄️';
      return `${cycle} ${p.title}\n💰 ${p.spot}\n💳 ${p.install}`;
    }

    function copyImage(imgEl, wrapEl) {
      if (!imgEl.src || imgEl.src.includes('placeholder')) return;
      const canvas = document.createElement('canvas');
      canvas.width = imgEl.naturalWidth || imgEl.width;
      canvas.height = imgEl.naturalHeight || imgEl.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      try {
        ctx.drawImage(imgEl, 0, 0);
        canvas.toBlob(blob => {
          if (!blob) return;
          navigator.clipboard.write([new ClipboardItem({'image/png': blob})]).then(() => {
            wrapEl.classList.add('copied');
            setTimeout(() => wrapEl.classList.remove('copied'), 1200);
          }).catch(() => {});
        }, 'image/png');
      } catch(e) {}
    }

    function copyText(text, infoEl) {
      navigator.clipboard.writeText(text).then(() => {
        infoEl.classList.add('copied');
        setTimeout(() => infoEl.classList.remove('copied'), 1000);
      }).catch(() => {});
    }

    function createCard(p, rank) {
      const card = document.createElement('div');
      card.className = 'product-card';

      // Badge loja
      const badge = document.createElement('div');
      badge.className = 'store-badge';
      badge.textContent = p.store;
      card.appendChild(badge);

      // Imagem
      const imgWrap = document.createElement('div');
      imgWrap.className = 'product-img-wrap';
      const img = new Image();
      img.src = p.image || '';
      img.alt = p.title || '';
      
      // Central Ar bloqueia se usarmos crossOrigin
      if (p.store !== 'Central Ar') {
        img.crossOrigin = 'anonymous';
      }

      img.onerror = () => { img.src = 'https://via.placeholder.com/200x200?text=Sem+Foto'; img.crossOrigin = ''; };
      imgWrap.appendChild(img);
      imgWrap.onclick = () => copyImage(img, imgWrap);
      card.appendChild(imgWrap);

      // Info
      const info = document.createElement('div');
      info.className = 'product-info';
      info.innerHTML = `
        <div class="product-title">${p.title || '—'}</div>
        <div class="price-spot">💰 ${p.spot || '—'}</div>
        <div class="price-install">💳 ${p.install || '—'}</div>
      `;
      const textCopy = formatTextToCopy(p);
      info.onclick = () => copyText(textCopy, info);
      card.appendChild(info);

      return card;
    }

    let fetchId = null;

    function carregarDados() {
      const btn = document.getElementById('btn-refresh');
      const loading = document.getElementById('loading-state');
      const empty = document.getElementById('empty-state');
      const results = document.getElementById('results');
      const totalCount = document.getElementById('total-count');

      btn.classList.add('loading');
      loading.style.display = 'flex';
      empty.style.display = 'none';
      results.style.display = 'none';
      results.innerHTML = '';
      totalCount.textContent = '';

      // 1. Limpa o storage antigo
      window.postMessage({ type: 'TWO_CLEAR_COMPARADOR_DATA' }, '*');
      
      // 2. Solicita nova coleta das abas abertas
      window.postMessage({ type: 'TWO_PULL_TABS' }, '*');

      fetchId = Date.now();
      const myId = fetchId;
      let coletado = {};

      const coletar = (event) => {
        if (event.source !== window || !event.data || event.data.type !== 'TWO_RETURN_COMPARADOR_DATA') return;
        const d = event.data.data;
        if (!d) return;
        Object.entries(d).forEach(([k, v]) => {
          if (k !== 'metadata_title' && Array.isArray(v) && v.length > 0) coletado[k] = v;
        });
      };
      window.addEventListener('message', coletar);

      // Aguarda as abas responderem (1.5s)
      setTimeout(() => {
        window.removeEventListener('message', coletar);
        loading.style.display = 'none';
        btn.classList.remove('loading');

        if (Object.keys(coletado).length === 0) {
          empty.style.display = 'flex';
          return;
        }

        // Junta TODOS os produtos de TODAS as lojas numa lista única
        const allProducts = [];
        Object.entries(coletado).forEach(([storeName, products]) => {
          products.forEach(p => allProducts.push({ ...p, store: storeName }));
        });

        // Ordena do mais barato ao mais caro
        allProducts.sort((a, b) => parseSpotPrice(a.spot) - parseSpotPrice(b.spot));

        allProducts.forEach((p, i) => results.appendChild(createCard(p, i + 1)));

        results.style.display = 'grid';
        const lojas = Object.keys(coletado).length;
        totalCount.innerHTML = `<strong>${allProducts.length}</strong> produto${allProducts.length !== 1 ? 's' : ''} de <strong>${lojas}</strong> loja${lojas !== 1 ? 's' : ''}`;
      }, 700);
    }

    window.addEventListener('DOMContentLoaded', () => setTimeout(carregarDados, 200));
  </script>
</body>
</html>
