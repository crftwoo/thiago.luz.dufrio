<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Scraper de Ar Condicionado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #050505; --card-bg: rgba(18,18,28,0.85); --card-border: rgba(255,255,255,0.08); --green: #00e676; --blue: #4facfe; --text: #ffffff; --muted: #7a7a9a; --radius: 16px; }
    body { font-family: "Outfit", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .aurora { position: fixed; border-radius: 50%; filter: blur(130px); z-index: 0; pointer-events: none; opacity: 0.22; animation: auroraAnim 18s infinite alternate ease-in-out; }
    .a1 { width: 700px; height: 700px; background: #3b82f6; top: -15%; left: -15%; }
    .a2 { width: 600px; height: 600px; background: #7c3aed; bottom: -15%; right: -10%; animation-duration: 24s; }
    @keyframes auroraAnim { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.4) translate(60px,-60px); } }

    .btn-back { position: fixed; top: 16px; left: 16px; z-index: 999; background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 6px 14px; border-radius: 30px; text-decoration: none; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .btn-back svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.5; fill: none; }

    .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 70px 24px 100px; text-align: center; }
    .page-header { margin-bottom: 48px; }
    .page-header h1 { font-size: 34px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; font-style: italic; background: linear-gradient(135deg, #4facfe, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .page-header p { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--card-border); padding-bottom: 28px; }

    .step-section { display: none; flex-direction: column; align-items: center; gap: 20px; animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards; margin-top: 8px; }
    .step-section.active { display: flex; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    h2 { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; margin-top: 20px; }

    .options-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; width: 100%; }
    .option-btn { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--card-border); padding: 14px 28px; border-radius: 12px; cursor: pointer; transition: all 0.2s; color: var(--text); font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .option-btn:hover { border-color: #4facfe55; background: rgba(79,172,254,0.08); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,172,254,0.1); }
    .tipo-btn { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px 20px; width: 190px; }
    .tipo-btn img { width: 150px; transition: transform 0.3s; filter: drop-shadow(0 0 14px rgba(79,172,254,0.35)); mix-blend-mode: screen; }
    .tipo-btn:hover img { transform: scale(1.06); filter: drop-shadow(0 0 20px rgba(79,172,254,0.6)); }

    .option-btn.selected { background: rgba(79,172,254,0.15); border-color: rgba(79,172,254,0.6); box-shadow: 0 0 20px rgba(79,172,254,0.25); color: #fff; }
    .tipo-btn.selected img { transform: scale(1.06); filter: drop-shadow(0 0 25px rgba(79,172,254,0.7)); }

    #loading-results { display: none; flex-direction: column; align-items: center; gap: 14px; padding: 50px; margin-top: 20px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(79,172,254,0.15); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--blue); }
    @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    .loading-sheet { color: var(--blue); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; animation: pulse 1.5s infinite; text-align: center; width: 100%; padding: 40px 0; }

    /* GRID DE PRODUTOS */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 28px; width: 100%; }

    /* CARD */
    .product-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; backdrop-filter: blur(16px); display: flex; flex-direction: column; transition: all 0.25s; position: relative; }
    .product-card:hover { border-color: rgba(79,172,254,0.3); transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,172,254,0.1); }

    /* LOJA BADGE */
    .store-badge { position: absolute; top: 12px; left: 12px; z-index: 3; background: rgba(18,18,28,0.9); border: 1px solid rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 20px; font-size: 9px; font-weight: 900; color: white; letter-spacing: 1.5px; text-transform: uppercase; backdrop-filter: blur(8px); }
    .store-badge.store-dufrio { background: linear-gradient(135deg, rgba(16,30,100,0.95), rgba(79,172,254,0.2)); border-color: rgba(79,172,254,0.3); }
    .store-badge.store-frigelar { background: linear-gradient(135deg, rgba(0,89,36,0.95), rgba(0,230,118,0.2)); border-color: rgba(0,230,118,0.3); }
    .store-badge.store-leveros { background: linear-gradient(135deg, #ff6b00, #ff9e00); border-color: #ff9e00; }
    .store-badge.store-webcontinental { background: linear-gradient(135deg, rgba(8,75,135,0.95), rgba(34,211,238,0.25)); border-color: rgba(34,211,238,0.4); }
    .store-badge.store-webcontinental { background: linear-gradient(135deg, #0056b3, #00aaff); border-color: #00aaff; }

    /* FOTO */
    .product-img-wrap { width: 100%; aspect-ratio: 1.1/1; background: #ffffff; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; border-bottom: 1px solid var(--card-border); }
    .product-img-wrap img { width: 95%; height: 95%; object-fit: contain; transition: transform 0.3s; }
    .product-img-wrap:hover img { transform: scale(1.08); }
    .img-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
    .img-overlay span { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: white; text-transform: uppercase; background: rgba(79,172,254,0.3); border: 1px solid rgba(79,172,254,0.5); padding: 8px 16px; border-radius: 8px; }
    .product-img-wrap:hover .img-overlay { opacity: 1; }
    .img-overlay.copied span { background: rgba(0,230,118,0.3); border-color: rgba(0,230,118,0.5); color: var(--green); }

    /* INFO AREA */
    .product-info { padding: 18px 14px 10px; cursor: pointer; position: relative; flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px; }
    .product-info:hover { background: rgba(255,255,255,0.02); }
    .copy-hint { position: absolute; top: 10px; right: 10px; font-size: 8px; font-weight: 900; color: rgba(79,172,254,0.6); letter-spacing: 1px; text-transform: uppercase; opacity: 0; transition: 0.2s; z-index: 5; }
    .product-info:hover .copy-hint { opacity: 1; }
    .product-info.copied .copy-hint { opacity: 1; color: var(--green); content: "COPIADO!"; }

    .product-title { font-size: 15px; font-weight: 800; color: #ffffff; line-height: 1.3; margin-bottom: 14px; text-align: center; display: flex; align-items: center; justify-content: center; width: 100%; overflow-wrap: break-word; word-break: break-word; }
    .prices-wrap { display: flex; flex-direction: column; gap: 6px; align-items: center; width: 100%; text-align: center; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04); }
    
    .price-vista { font-size: 20px; font-weight: 900; color: #00e676; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; text-align: center; text-shadow: 0 0 12px rgba(0,230,118,0.2); }
    .discount-badge { font-size: 10px; font-weight: 800; color: #00e676; background: rgba(0,230,118,0.12); border: 1px solid rgba(0,230,118,0.3); padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap; }
    
    .price-install { font-size: 12px; color: #a1a1aa; font-weight: 600; text-align: center; line-height: 1.4; }

    /* BOTAO LINK */
    .card-footer { padding: 10px 14px 14px; }
    .btn-link { display: block; width: 100%; padding: 9px; border-radius: 10px; background: linear-gradient(135deg, rgba(79,172,254,0.12), rgba(167,139,250,0.12)); border: 1px solid rgba(79,172,254,0.25); color: var(--blue); font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; text-align: center; cursor: pointer; transition: all 0.2s; font-family: "Outfit", sans-serif; }
    .btn-link:hover { background: linear-gradient(135deg, rgba(79,172,254,0.25), rgba(167,139,250,0.25)); border-color: rgba(79,172,254,0.5); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,172,254,0.15); }

    @media (max-width: 768px) {
      .container { padding: 60px 14px 80px; }
      .tipo-btn { width: 100%; flex-direction: row; }
      .tipo-btn img { width: 90px; }
      .option-btn { padding: 12px 18px; font-size: 11px; }
      .products-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .product-title { font-size: 13px; }
      .price-vista { font-size: 17px; }
      .discount-badge { font-size: 9px; }
      .price-install { font-size: 11px; }
      #selection-summary { padding: 12px 16px; }
      .filter-row { gap: 8px; }
      .filter-btn { font-size: 10px; padding: 6px 12px; }
    }
    @media (max-width: 480px) { .products-grid { grid-template-columns: 1fr 1fr; gap: 8px; } .option-btn { width: auto; } }
    @media (max-width: 360px) { .products-grid { grid-template-columns: 1fr; } }

    /* SUMMARY BAR */
    #selection-summary { width: 100%; background: var(--card-bg); border: 1px solid var(--card-border); padding: 16px 24px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; backdrop-filter: blur(12px); flex-wrap: wrap; gap: 14px; }
    .summary-text { font-size: 13px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; display: flex; gap: 12px; flex-wrap: wrap; }
    .summary-text span { background: rgba(79,172,254,0.15); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(79,172,254,0.3); color: var(--blue); }
    .btn-reset { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px; color: #fff; font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .btn-reset:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); border-color: rgba(255,255,255,0.3); }

    /* FILTERS */
    #filters-section { width: 100%; display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; background: rgba(18,18,28,0.5); padding: 24px; border-radius: 12px; border: 1px solid var(--card-border); }
    .filter-group h3 { font-size: 11px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; text-align: left; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .filter-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #a1a1aa; padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .filter-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .filter-btn.active { background: rgba(79,172,254,0.2); border-color: rgba(79,172,254,0.5); color: var(--blue); box-shadow: 0 0 10px rgba(79,172,254,0.2); }
    .filter-btn.store-frigelar.active { background: rgba(0,230,118,0.2); border-color: rgba(0,230,118,0.5); color: var(--green); box-shadow: 0 0 10px rgba(0,230,118,0.2); }
    .filter-btn.store-leveros.active { background: rgba(255,107,0,0.2); border-color: rgba(255,107,0,0.5); color: #ff6b00; box-shadow: 0 0 10px rgba(255,107,0,0.2); }
    .filter-btn.store-webcontinental.active { background: rgba(34,211,238,0.18); border-color: rgba(34,211,238,0.5); color: #22d3ee; box-shadow: 0 0 10px rgba(34,211,238,0.2); }
    .filter-btn.store-webcontinental.active { background: rgba(0,86,179,0.2); border-color: rgba(0,86,179,0.5); color: #00aaff; box-shadow: 0 0 10px rgba(0,86,179,0.2); }

    /* SYNC STATUS */
    .sync-status { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: rgba(18,18,28,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); padding: 10px 18px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: all 0.4s ease; cursor: default; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
    .sync-status.loading .sync-dot { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; animation: pulse-dot 1s infinite alternate; }
    .sync-status.success .sync-dot { background: #00e676; box-shadow: 0 0 10px #00e676; }
    .sync-status.error .sync-dot { background: #ff5252; box-shadow: 0 0 10px #ff5252; }
    @keyframes pulse-dot { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
  </style>
</head>
<body>
  <div id="sync-status" class="sync-status loading">
    <div class="sync-dot"></div>
    <div style="display:flex; flex-direction:column; gap:2px;">
      <span id="sync-text">Conectando</span>
      <span id="update-text" style="font-size:8px; opacity:0.5; letter-spacing:0.5px; white-space:nowrap;">Atualizado: --/--/--</span>
    </div>
  </div>
  <div style="position:fixed;inset:0;background:#050505;z-index:-2;pointer-events:none;"></div>
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>
  <a href="index.html" class="btn-back">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Menu Principal
  </a>
  <div class="container">
    <div class="page-header">
      <h1>Scraper de Ar Condicionado</h1>
      <p>Comparação de preços em tempo real entre múltiplas lojas</p>
    </div>
    <div id="step-tipo" class="step-section active">
      <h2>Selecione o Tipo</h2>
      <div class="options-grid" id="tipo-options"></div>
    </div>
    <div id="step-btus" class="step-section">
      <h2>Selecione os BTUs</h2>
      <div class="options-grid" id="btu-options"></div>
    </div>
    <div id="step-ciclo" class="step-section">
      <h2>Selecione o Ciclo</h2>
      <div class="options-grid" id="ciclo-options"></div>
    </div>
    <div id="loading-results">
      <div class="spinner"></div>
      <p id="loading-msg">Consultando Lojas...</p>
    </div>
    <div id="step-resultados" class="step-section" style="width:100%;">
      <div id="selection-summary" style="display:none;">
        <div class="summary-text" id="summary-text"></div>
        <button class="btn-reset" onclick="resetScraper()">🔄 Refazer Busca</button>
      </div>
      
      <div id="filters-section" style="display:none;">
        <div class="filter-group">
          <h3>Lojas Encontradas</h3>
          <div class="filter-row" id="filter-lojas"></div>
        </div>
        <div class="filter-group">
          <h3>Marcas Encontradas</h3>
          <div class="filter-row" id="filter-marcas"></div>
        </div>
        <div class="filter-group">
          <h3>BTUs</h3>
          <div class="filter-row" id="filter-btus"></div>
        </div>
        <div class="filter-group">
          <h3>Ciclo</h3>
          <div class="filter-row" id="filter-ciclos"></div>
        </div>
      </div>

      <div class="products-grid" id="results-grid"></div>
    </div>
  </div>
  <script>
    const LAST_UPDATE = "24/04/2026 15:30";
    const IMAGES = {"Hiwall":"img/hi_wall.png","Hi Wall":"img/hi_wall.png","Piso Teto":"img/piso_teto.png","Cassete":"img/cassete.png"};
    let sheetData = [], selection = {tipo:"",btu:"",ciclo:""};
    const CACHE_KEY = "scraper_sheet_data_v1";

    let allFetchedProducts = [];
    let activeFilters = { lojas: [], marcas: [], btus: [], ciclos: [] };
    const LISTA_MARCAS = ["Agratto", "Aiwa", "Aufit", "Britânia", "Carrier", "Comfee", "Consul", "Daikin", "Electrolux", "Elgin", "EOS", "Fujitsu", "Gree", "Hisense", "Hitachi", "HQ", "Komeco", "LG", "Midea", "Philco", "Samsung", "Springer Midea", "TCL", "Trane", "Vix", "York"];
    
    const TIPOS_PADRAO = ["Hiwall", "Piso Teto", "Cassete"];
    const BTUS_PADRAO = ["9000", "12000", "18000", "24000", "30000", "36000", "48000", "60000"];
    const CICLOS_PADRAO = ["Frio", "Quente/Frio"];
    let sheetLoadPromise = null;

    async function loadData() {
      // 1. Renderiza os botões imediatamente para o usuário não esperar
      renderTipos();
      
      const syncStatus = document.getElementById("sync-status");
      const syncText = document.getElementById("sync-text");
      document.getElementById("update-text").innerText = "Atualizado: " + LAST_UPDATE;

      // 2. Carrega a planilha em segundo plano
      sheetLoadPromise = (async () => {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          try { sheetData = JSON.parse(cached); } catch(e) {}
        }

        try {
          const r = await fetch("https://opensheet.elk.sh/1ml7XpwZfzM4ElRJb4G62b93VMqUw3jeprTtgxdigiD8/Sheet1");
          const freshData = await r.json();
          if (JSON.stringify(sheetData) !== JSON.stringify(freshData)) {
            sheetData = freshData;
            localStorage.setItem(CACHE_KEY, JSON.stringify(sheetData));
          }
          
          syncStatus.className = "sync-status success";
          syncText.innerText = "Conectado";
          
          setTimeout(() => {
            syncStatus.style.opacity = "0.5";
            syncStatus.style.transform = "scale(0.95)";
          }, 3000);
          
          syncStatus.onmouseenter = () => { syncStatus.style.opacity = "1"; syncStatus.style.transform = "scale(1)"; };
          syncStatus.onmouseleave = () => { syncStatus.style.opacity = "0.5"; syncStatus.style.transform = "scale(0.95)"; };
          
        } catch(e) {
          console.error("Erro ao carregar planilha", e);
          syncStatus.className = "sync-status error";
          syncText.innerText = "Falha ao Conectar";
        }
      })();
    }

    function renderTipos() {
      const c = document.getElementById("tipo-options"); c.innerHTML = "";
      const tipos = sheetData && sheetData.length > 0 ? [...new Set(sheetData.map(i=>i.Tipo))] : ["Hiwall", "Piso Teto", "Cassete"];
      tipos.forEach(t => {
        const b = document.createElement("button"); 
        b.className = "option-btn tipo-btn" + (selection.tipo === t ? " selected" : "");
        
        let imgName = t;
        if (t === "Hiwall" || t === "Hi Wall") imgName = "Hi Wall";
        b.innerHTML = "<img src='"+(IMAGES[imgName]||"img/hi_wall.png")+"' onerror=\"this.src='https://placehold.co/80';\"><span>"+t+"</span>";
        
        b.onclick = () => selectTipo(t); c.appendChild(b);
      });
    }

    function formatBTU(btu) { 
      return String(btu).replace(/\b(\d+)\b/g, (match) => {
        if(match.length >= 4) return match.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return match;
      }); 
    }
    function formatCiclo(ciclo) { return String(ciclo).toLowerCase().trim() === "frio" ? "Só Frio" : ciclo; }

    async function selectTipo(t) { 
      selection.tipo = t; 
      selection.btu = ""; 
      selection.ciclo = "";
      renderTipos();
      
      document.getElementById("step-ciclo").classList.remove("active");
      document.getElementById("step-resultados").classList.remove("active");
      document.getElementById("loading-results").style.display = "none";
      
      if (sheetLoadPromise) {
          await sheetLoadPromise;
      }
      
      const sortBTUs = (a, b) => {
        const getVal = (s) => parseInt(String(s).replace(/[.,]/g, "").match(/\d+/) || [0], 10);
        return getVal(a) - getVal(b);
      };
      
      const btus = [...new Set(sheetData.filter(i=>i.Tipo===t).map(i=>i.BTUs))].sort(sortBTUs);
      renderOptions("btu-options", btus, selectBTU, selection.btu, formatBTU); 
      document.getElementById("step-btus").classList.add("active");
      
      setTimeout(() => document.getElementById("step-btus").scrollIntoView({behavior: 'smooth', block: 'center'}), 100);
    }

    function selectBTU(b) { 
      selection.btu = b; 
      selection.ciclo = "";
      
      const sortBTUs = (a, b) => {
        const getVal = (s) => parseInt(String(s).replace(/[.,]/g, "").match(/\d+/) || [0], 10);
        return getVal(a) - getVal(b);
      };
      
      const btus = [...new Set(sheetData.filter(i=>i.Tipo===selection.tipo).map(i=>i.BTUs))].sort(sortBTUs);
      renderOptions("btu-options", btus, selectBTU, selection.btu, formatBTU);
      
      document.getElementById("step-resultados").classList.remove("active");
      document.getElementById("loading-results").style.display = "none";
      
      const ciclos = [...new Set(sheetData.filter(i=>i.Tipo===selection.tipo&&i.BTUs===selection.btu).map(i=>i.Ciclo))];
      renderOptions("ciclo-options", ciclos, selectCiclo, selection.ciclo, formatCiclo); 
      document.getElementById("step-ciclo").classList.add("active");
      
      setTimeout(() => document.getElementById("step-ciclo").scrollIntoView({behavior: 'smooth', block: 'center'}), 100);
    }

    function renderOptions(id, opts, cb, currentSelection, formatter) {

      opts.forEach(o => {

        b.className = "option-btn" + (currentSelection === o ? " selected" : "");

    // --- FORMATO DE COPIA (igual extensao) ---
    const HYPER_BRANDS = ["daikin","fujitsu","hitachi","trane","lg","samsung","gree","carrier","midea","hisense"];
    function boldBrand(title) {
      for (const b of HYPER_BRANDS) {
        const rx = b==="lg" ? new RegExp("\\b("+b+")\\b","i") : new RegExp("("+b+")","i");
        if (rx.test(title)) return title.replace(rx,"*$1*");
      }
      return title;
    }
    function getCycleEmoji(title) {
      const t = title.toLowerCase();
      if (t.includes("quente/frio")||t.includes("quente e frio")||t.includes("quente frio")||t.includes("q/f")) return "🔥❄️";
      return "❄️";
    }
    function formatCopyText(title,spot,install) {
      return getCycleEmoji(title)+" "+boldBrand(title)+"\n💰 "+spot+"\n💳 "+install;
    }

    // --- SCRAPING DUFRIO ---
    function parseDufrioFilters(url) {
      const p = new URL(url), caps = [];
      p.searchParams.forEach((v,k) => { if(k.startsWith("ec_capacidade")) caps.push(v.trim()); });
      const ciclo = p.searchParams.get("ec_ciclo") || null;
      const path = p.pathname;
      let cat = "ar-condicionado-split-inverter";
      if(path.includes("piso-teto")) cat = "ar-condicionado-split-piso-teto";
      else if(path.includes("cassete")) cat = "ar-condicionado-split-cassete";
      return { capacidades: caps, ciclo, categoria: cat };
    }

    async function scrapeDufrio(url) {
      try {
        const f = parseDufrioFilters(url);
        let categoryUrl = "https://www.dufrio.com.br/ar-condicionado/" + f.categoria;
        let queryParams = [];
        if (f.capacidades.length > 0) {
            f.capacidades.forEach((c, idx) => queryParams.push(`ec_capacidade[${idx}]=${encodeURIComponent(c)}`));
        }
        if (f.ciclo) queryParams.push(`ec_ciclo=${encodeURIComponent(f.ciclo)}`);
        queryParams.push('product_list_dir=asc');
        queryParams.push('product_list_order=price');
        
        const fullUrl = categoryUrl + "?" + queryParams.join("&");
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(fullUrl);
        
        const resp = await fetch(proxyUrl, { cache: 'no-store' });
        const html = await resp.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        
        const items = Array.from(doc.querySelectorAll('.product-item'));
        return items.map(card => {
           const titleEl = card.querySelector('a.product-item-link');
           if (!titleEl) return null;
           const title = titleEl.innerText.trim();
           
           const imgEl = card.querySelector('img.product-image-photo, img.product-image');
           let image = "";
           if (imgEl) {
               image = imgEl.getAttribute('src') || imgEl.getAttribute('data-src') || "";
               if (image.includes('data:image')) {
                   const sourceEl = card.querySelector('source');
                   if (sourceEl && sourceEl.srcset) image = sourceEl.srcset.split(',')[0].split(' ')[0];
               }
           }
           
           let spotLine = "";
           const spotPriceEl = card.querySelector('.spot-price');
           if (spotPriceEl) spotLine = spotPriceEl.innerText.replace(/\s+/g, ' ').trim();
           if (!spotLine) {
               let realPriceEl = card.querySelector('#cash_down');
               if (!realPriceEl) {
                   const allWrappers = card.querySelectorAll('.price-wrapper');
                   if (allWrappers.length > 0) realPriceEl = allWrappers[allWrappers.length - 1];
               }
               if (realPriceEl) {
                   spotLine = realPriceEl.innerText.replace(/\s+/g, ' ').trim();
                   const labelToUse = (realPriceEl.parentElement && realPriceEl.parentElement.querySelector('.price-label')) || card.querySelector('.price-label');
                   if (labelToUse) spotLine += ' ' + labelToUse.innerText.replace(/\s+/g, ' ').trim();
               }
           }
           
           let installLine = "";
           const ps = card.querySelectorAll('p');
           ps.forEach(p => {
               const pText = p.innerText.toLowerCase();
               if (pText.includes('ou r$') && (pText.includes('em') || pText.includes('x'))) {
                   installLine = p.innerText.replace(/\s+/g, ' ').replace(/\u00A0/g, ' ').trim();
               }
           });
           
           if (!spotLine) return null; // Filtra produtos esgotados (Avise-me)
           
           let linkHref = titleEl.getAttribute('href');
           if(!linkHref) linkHref = "";
           const finalLink = linkHref.startsWith('http') ? linkHref : "https://www.dufrio.com.br" + linkHref;
           
           return { title, image, spot: spotLine, install: installLine, link: finalLink, discount: 0 };
        }).filter(Boolean);
      } catch(e) { console.error("Dufrio erro:", e); return []; }
    }

    async function scrapeFrigelar(url) {
      try {
        // Frigelar usa Oracle Commerce Cloud. O HTML inicial não tem os produtos (Client-Side Rendering).
        // Precisamos interceptar a API interna substituindo /searchresults por /ccstoreui/v1/search
        let apiUrl = url;
        if (url.includes('/searchresults')) {
            apiUrl = url.replace('/searchresults', '/ccstoreui/v1/search');
            // Limpa parâmetros malformados ("?&&&=undefined") usando a API URL nativa
            // A regex antiga estava cortando parte do N= - agora usamos URLSearchParams para remover apenas a chave vazia
            try {
                const urlObj = new URL(apiUrl);
                urlObj.searchParams.delete(''); // remove o "=undefined" que tem chave vazia
                apiUrl = urlObj.toString();
            } catch(e) {
                // fallback se URL for inválida por algum motivo
                apiUrl = apiUrl.replace(/[?&]+=*undefined/gi, '').replace(/&&+/g, '&').replace(/\?&/g, '?');
            }
        } else {
            return []; // Se não for um link de busca padrão, ignora
        }

        // Usa o nosso Cloudflare Worker dedicado como proxy CORS para a Frigelar
        // Worker em: https://frigelar-proxy.crftwo.workers.dev/
        const FRIGELAR_PROXY = "https://frigelar-proxy.crftwo.workers.dev/?url=";
        
        let json = null;
        try {
          const proxyUrl = FRIGELAR_PROXY + encodeURIComponent(apiUrl);
          const resp = await fetch(proxyUrl, { cache: 'no-store' });
          if (resp.ok) {
            const text = await resp.text();
            if (text.includes('resultsList')) {
              json = JSON.parse(text);
            }
          }
        } catch(e) { console.error("Frigelar Worker erro:", e); }
        
        if (!json) return [];
        
        if (!json.resultsList || !json.resultsList.records) {
            return [];
        }

        const items = json.resultsList.records;
        
        return items.map(agg => {
           if (!agg.records || agg.records.length === 0) return null;
           const attr = agg.records[0].attributes;
           if (!attr) return null;
           
           // Filtra produtos FORA DE ESTOQUE — a Frigelar ainda os retorna na API mas não os mostra no site
           const availability = attr['sku.availabilityStatus'] ? attr['sku.availabilityStatus'][0] : '';
           if (availability !== 'INSTOCK') return null;
           
           const title = attr['product.displayName'] ? attr['product.displayName'][0] : "";
           
           let image = "";
           if (attr['product.primaryMediumImageURL']) {
               image = "https://www.frigelar.com.br" + attr['product.primaryMediumImageURL'][0];
           }
           
           const spotPriceNum = attr['sku.activePrice'] ? parseFloat(attr['sku.activePrice'][0]) : 0;
           const listPriceNum = attr['sku.listPrice'] ? parseFloat(attr['sku.listPrice'][0]) : 0;
           
           if (!spotPriceNum) return null;
           
           // Calcula desconto PIX (ex: "Com 7% OFF no PIX")
           // A Frigelar usa: listPrice = preço cheio parcelado, activePrice = preço à vista com desconto
           let spotLine = "R$ " + spotPriceNum.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
           if (listPriceNum > spotPriceNum) {
               const descontoPct = Math.round((listPriceNum - spotPriceNum) / listPriceNum * 100);
               if (descontoPct > 0) spotLine += ` Com ${descontoPct}% OFF no PIX`;
           }
           
           // Frigelar sempre parcelada em 8x sem juros
           let installLine = "";
           if (listPriceNum > spotPriceNum) {
               const totalParcelado = listPriceNum.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
               const valorParcela = (listPriceNum / 8).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
               installLine = `ou R$ ${totalParcelado} em 8x de R$ ${valorParcela} sem juros`;
           }
           
           const linkSlug = attr['product.route'] ? attr['product.route'][0] : "";
           const finalLink = linkSlug ? "https://www.frigelar.com.br" + linkSlug : "";
           
           return { title, image, spot: spotLine, install: installLine, link: finalLink, discount: 0 };
        }).filter(Boolean);
      } catch(e) { console.error("Frigelar erro:", e); return []; }
    }

    async function scrapeLeveros(url) {
      try {
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(url);
        const resp = await fetch(proxyUrl, { cache: 'no-store' });
        const html = await resp.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        
        const items = Array.from(doc.querySelectorAll('.products__item.product-card'));
        return items.map(card => {
          const titleEl = card.querySelector('.product-card__bottom__name');
          if (!titleEl) return null;
          const title = titleEl.innerText.trim();
          
          const imgEl = card.querySelector('.product-card__img-container img');
          const image = imgEl ? (imgEl.getAttribute('data-src') || imgEl.getAttribute('src') || "") : "";
          
          const spotEl = card.querySelector('.prices__price');
          const spotSupportEl = card.querySelector('.prices__support-text');
          let spotLine = spotEl ? spotEl.innerText.trim() : "";
          if (spotSupportEl && spotSupportEl.innerText.includes('à vista')) {
            spotLine += " à vista";
          }
          
          const installEl = card.querySelector('.installment');
          let installLine = "";
          if (installEl) {
            const rawInstall = installEl.innerText.replace(/\s+/g, ' ').trim();
            // Tenta capturar o número de parcelas e o valor de cada uma
            const match = rawInstall.match(/(\d+)x\s+de\s+R\$\s*([\d.,]+)/i);
            if (match) {
              const parcelas = parseInt(match[1]);
              const valorParcelaStr = match[2].replace('.', '').replace(',', '.');
              const valorParcela = parseFloat(valorParcelaStr);
              const total = (parcelas * valorParcela).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
              installLine = `ou R$ ${total} em ${parcelas}x de R$ ${match[2]}`;
            } else {
              installLine = rawInstall;
            }
          }
          
          const linkEl = card.querySelector('.product-card__bottom a');
          let finalLink = linkEl ? linkEl.getAttribute('href') : "";
          if (finalLink && !finalLink.startsWith('http')) finalLink = "https://www.leveros.com.br" + finalLink;
          
          if (!spotLine) return null;
          return { title, image, spot: spotLine, install: installLine, link: finalLink, discount: 0 };
        }).filter(Boolean);
      } catch(e) { console.error("Leveros erro:", e); return []; }
    }

    async function scrapeWebContinental(url) {
      // WebContinental usa VTEX IO (renderizado client-side, HTML inicial vem vazio).
      // Em vez de parsear HTML, batemos direto na API legada do catálogo VTEX:
      // /api/catalog_system/pub/products/search{path}?map=c,c,...&O=order&_from=&_to=
      // O `map` precisa ter 1 "c" por segmento de path + 1 (do initialMap=c).
      try {
        const u = new URL(url);
        const pathSegments = u.pathname.split('/').filter(Boolean);
        if (pathSegments.length === 0) return [];
        const mapStr = Array(pathSegments.length + 1).fill('c').join(',');
        const order = u.searchParams.get('order') || u.searchParams.get('O') || 'OrderByPriceASC';
        const apiUrl = `https://www.webcontinental.com.br/api/catalog_system/pub/products/search${u.pathname}?map=${mapStr}&O=${encodeURIComponent(order)}&_from=0&_to=49`;

        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(apiUrl + "&t=" + Date.now());
        const resp = await fetch(proxyUrl, { cache: 'no-store' });
        if (!resp.ok) return [];
        const products = await resp.json();
        if (!Array.isArray(products)) return [];

        const fmtBR = (v) => "R$ " + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        return products.map(p => {
          const item = p.items && p.items[0];
          if (!item) return null;
          const seller = item.sellers && item.sellers[0];
          const offer = seller && seller.commertialOffer;
          if (!offer) return null;
          // Filtra esgotado — VTEX devolve mesmo sem estoque
          if (typeof offer.AvailableQuantity === 'number' && offer.AvailableQuantity <= 0) return null;

          const spotPriceNum = offer.Price;
          const listPriceNum = offer.ListPrice;
          if (!spotPriceNum) return null;

          // Linha de preço à vista + badge de desconto (igual aos outros scrapers)
          let spotLine = fmtBR(spotPriceNum);
          if (listPriceNum > spotPriceNum) {
            const pct = Math.round((listPriceNum - spotPriceNum) / listPriceNum * 100);
            if (pct > 0) spotLine += ` ${pct}% OFF`;
          }

          // Melhor opção de parcelamento sem juros (maior número de parcelas)
          const noInterest = (offer.Installments || []).filter(i => i.InterestRate === 0 && i.NumberOfInstallments > 1);
          let best = null;
          for (const inst of noInterest) {
            if (!best || inst.NumberOfInstallments > best.NumberOfInstallments) best = inst;
          }

          let installLine = "";
          if (best) {
            const totalNum = best.Value * best.NumberOfInstallments;
            installLine = `ou ${fmtBR(totalNum)} em ${best.NumberOfInstallments}x de ${fmtBR(best.Value)} sem juros`;
          }

          const image = (item.images && item.images[0] && (item.images[0].imageUrl || item.images[0].imageUrlOriginal)) || "";
          const link = p.link || (p.linkText ? `https://www.webcontinental.com.br/${p.linkText}/p` : "");
          const title = p.productName || "";

          return { title, image, spot: spotLine, install: installLine, link, discount: 0 };
        }).filter(Boolean);
      } catch(e) { console.error("WebContinental erro:", e); return []; }
    }

    async function startScraping() {
      try {
        document.getElementById("selection-summary").style.display = "none";
        document.getElementById("filters-section").style.display = "none";
        
        allFetchedProducts = [];
        activeFilters = { lojas: [], marcas: [], btus: [], ciclos: [] };

        if (sheetLoadPromise) {
          document.getElementById("loading-msg").innerText = "SINCRONIZANDO PLANILHA...";
          await sheetLoadPromise;
        }
        
        const links = sheetData.filter(i => 
          i.Tipo === selection.tipo && 
          i.BTUs === selection.btu && 
          i.Ciclo === selection.ciclo
        );
        
        const dufrioLink = links.find(l => l.Site && String(l.Site).toLowerCase().trim() === "dufrio");
        const frigelarLink = links.find(l => l.Site && String(l.Site).toLowerCase().trim() === "frigelar");
        const leverosLink = links.find(l => l.Site && String(l.Site).toLowerCase().trim() === "leveros");
        const webContinentalLink = links.find(l => l.Site && String(l.Site).toLowerCase().trim().replace(/\s+/g,'') === "webcontinental");
        
        document.getElementById("loading-msg").innerText = "BUSCANDO LOJAS...";
        
        const scrapePromises = [];
        
        if (dufrioLink && dufrioLink.Link) {
          scrapePromises.push(
            scrapeDufrio(dufrioLink.Link).then(products => {
              return products.map(p => ({...p, storeName: "Dufrio"}));
            })
          );
        }
        
        if (frigelarLink && frigelarLink.Link) {
          scrapePromises.push(
            scrapeFrigelar(frigelarLink.Link).then(products => {
              return products.map(p => ({...p, storeName: "Frigelar"}));
            })
          );
        }

        if (leverosLink && leverosLink.Link) {
          scrapePromises.push(
            scrapeLeveros(leverosLink.Link).then(products => {
              return products.map(p => ({...p, storeName: "Leveros"}));
            })
          );
        }

        if (webContinentalLink && webContinentalLink.Link) {
          scrapePromises.push(
            scrapeWebContinental(webContinentalLink.Link).then(products => {
              return products.map(p => ({...p, storeName: "WebContinental"}));
            })
          );
        }


        const resultsArrays = await Promise.all(scrapePromises);
        
        resultsArrays.forEach(products => {
            products.forEach(p => {
                allFetchedProducts.push(extractProductInfo(p));
            });
        });
        
        // Ordenar todos os produtos pelo preço à vista
        allFetchedProducts.sort((a, b) => {
            const getPrice = (str) => parseFloat(str.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
            return getPrice(a.spot) - getPrice(b.spot);
        });
        
        document.getElementById("loading-results").style.display = "none";
        
        if (allFetchedProducts.length > 0) {
          generateFilters();
          applyFilters();
        } else {
          document.getElementById("results-grid").innerHTML="<p style=\"grid-column:1/-1;color:var(--muted);font-size:13px;text-transform:uppercase;font-weight:800;text-align:center;padding:40px 0;\">Nenhum produto encontrado para esta combinação.</p>";
        }
      } catch (err) {
        console.error("Erro no scraping:", err);
        document.getElementById("loading-results").style.display = "none";
        document.getElementById("results-grid").innerHTML="<p style=\"grid-column:1/-1;color:#ff5252;font-size:13px;text-transform:uppercase;font-weight:800;text-align:center;padding:40px 0;\">Erro ao processar dados. Verifique a planilha.</p>";
      }
    }

    function extractProductInfo(p) {
      let marca = "Outras";
      for (const m of LISTA_MARCAS) {
        if (p.title.toLowerCase().includes(m.toLowerCase())) {
          marca = m; break;
        }
      }
      let btu = "Outros";
      const btuMatch = p.title.match(/\b(\d{4,5})\s*BTU/i) || p.title.match(/\b(\d{4,5})\b/);
      if (btuMatch) {
        let bNum = btuMatch[1];
        btu = bNum.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " BTUs";
      }
      let ciclo = "Só Frio";
      if (p.title.toLowerCase().includes("quente")) ciclo = "Quente/Frio";
      p.marca = marca; p.btu = btu; p.ciclo = ciclo;
      return p;
    }

    function generateFilters() {
      const lojas = [...new Set(allFetchedProducts.map(p=>p.storeName))].sort();
      const marcas = [...new Set(allFetchedProducts.map(p=>p.marca))].sort();
      const btus = [...new Set(allFetchedProducts.map(p=>p.btu))].sort((a,b)=>parseInt(a)-parseInt(b));
      const ciclos = [...new Set(allFetchedProducts.map(p=>p.ciclo))].sort();
      renderFilterRow("filter-lojas", lojas, "lojas");
      renderFilterRow("filter-marcas", marcas, "marcas");
      renderFilterRow("filter-btus", btus, "btus");
      renderFilterRow("filter-ciclos", ciclos, "ciclos");
      document.getElementById("filters-section").style.display = (allFetchedProducts.length > 0) ? "flex" : "none";
    }

    function renderFilterRow(id, items, type) {
      const c = document.getElementById(id); c.innerHTML = "";
      if (items.length <= 1 && type !== "marcas" && type !== "lojas") {
          c.parentElement.style.display = "none";
          return;
      }
      c.parentElement.style.display = "block";
      items.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "filter-btn"; 
        if (type === "lojas") {
            if (item.toLowerCase() === "frigelar") btn.classList.add("store-frigelar");
            if (item.toLowerCase() === "dufrio") btn.classList.add("store-dufrio");
            if (item.toLowerCase() === "leveros") btn.classList.add("store-leveros");
            if (item.toLowerCase() === "webcontinental") btn.classList.add("store-webcontinental");
            if (item.toLowerCase() === "webcontinental") btn.classList.add("store-webcontinental");
        }
        btn.innerText = item;
        btn.onclick = () => toggleFilter(btn, type, item);
        c.appendChild(btn);
      });
    }

    function toggleFilter(btn, type, value) {
      const idx = activeFilters[type].indexOf(value);
      if (idx > -1) { activeFilters[type].splice(idx, 1); btn.classList.remove("active"); }
      else { activeFilters[type].push(value); btn.classList.add("active"); }
      applyFilters();
    }

    function applyFilters() {
      const grid = document.getElementById("results-grid"); grid.innerHTML = "";
      const filtered = allFetchedProducts.filter(p => {
        const l = activeFilters.lojas.length === 0 || activeFilters.lojas.includes(p.storeName);
        const m = activeFilters.marcas.length === 0 || activeFilters.marcas.includes(p.marca);
        const b = activeFilters.btus.length === 0 || activeFilters.btus.includes(p.btu);
        const c = activeFilters.ciclos.length === 0 || activeFilters.ciclos.includes(p.ciclo);
        return l && m && b && c;
      });
      if (filtered.length === 0) grid.innerHTML = "<p style=\"grid-column:1/-1;color:var(--muted);font-size:13px;text-transform:uppercase;font-weight:800;text-align:center;padding:40px 0;\">Nenhum produto atende aos filtros atuais.</p>";
      else filtered.forEach(p => grid.appendChild(createCard(p, p.storeName)));
    }

    function resetScraper() {
      selection = {tipo:"",btu:"",ciclo:""};
      allFetchedProducts = [];
      activeFilters = { lojas: [], marcas: [], btus: [], ciclos: [] };
      document.getElementById("results-grid").innerHTML = "";
      document.getElementById("filters-section").style.display = "none";
      document.getElementById("selection-summary").style.display = "none";
      showStep("step-tipo");
    }

    function createCard(p, store) {
      const card = document.createElement("div"); card.className = "product-card";

      const badge = document.createElement("div"); badge.className = "store-badge";
      if (store.toLowerCase() === "frigelar") badge.classList.add("store-frigelar");
      if (store.toLowerCase() === "dufrio") badge.classList.add("store-dufrio");
      if (store.toLowerCase() === "leveros") badge.classList.add("store-leveros");
      if (store.toLowerCase() === "webcontinental") badge.classList.add("store-webcontinental");
      if (store.toLowerCase() === "webcontinental") badge.classList.add("store-webcontinental");
      badge.textContent = store;

      const imgWrap = document.createElement("div"); imgWrap.className = "product-img-wrap";
      const img = document.createElement("img");
      img.src = p.image; img.alt = p.title;
      img.onerror = () => img.src = "https://placehold.co/260x260/111/333?text="+store;
      const overlay = document.createElement("div"); overlay.className = "img-overlay";
      const overlaySpan = document.createElement("span"); overlaySpan.textContent = "📷 Copiar Foto";
      overlay.appendChild(overlaySpan);
      imgWrap.appendChild(img); imgWrap.appendChild(overlay);
      imgWrap.onclick = async () => {
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || ('ontouchstart' in window);
        
        if (isMobile) {
          // Mobile: busca a imagem pelo proxy (resolve CORS) e compartilha o arquivo real
          const PROXY = "https://frigelar-proxy.crftwo.workers.dev/?url=";
          overlaySpan.textContent = "⏳ Aguarde...";
          try {
            const resp = await fetch(PROXY + encodeURIComponent(p.image));
            const rawBlob = await resp.blob();
            // Força o MIME type correto baseado na URL (proteção contra Content-Type errado do proxy)
            const imgUrl = p.image.toLowerCase();
            const mimeType = imgUrl.includes('.png') ? 'image/png' : 'image/jpeg';
            const blob = new Blob([rawBlob], { type: mimeType });
            const ext = mimeType === 'image/png' ? '.png' : '.jpg';
            const fileName = (p.title.substring(0, 40).replace(/[^a-zA-Z0-9]/g, '_') || 'produto') + ext;
            const file = new File([blob], fileName, { type: mimeType });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              // Compartilha o arquivo de imagem real (iOS 15+ e Android Chrome)
              await navigator.share({ files: [file], title: p.title });
            } else if (navigator.share) {
              // Fallback: compartilha só a URL se files não for suportado
              await navigator.share({ title: p.title, url: p.image });
            } else {
              window.open(p.image, '_blank');
            }
            overlay.classList.add("copied"); overlaySpan.textContent = "✅ Compartilhado!";
            setTimeout(()=>{overlay.classList.remove("copied");overlaySpan.textContent="📤 Compartilhar";},1800);
          } catch(e) {
            if (e.name === 'AbortError') {
              overlaySpan.textContent = "📤 Compartilhar"; // usuário cancelou
            } else {
              // fallback final: abre imagem em nova aba
              window.open(p.image, '_blank');
              overlaySpan.textContent = "📤 Compartilhar";
            }
          }
        } else {
          // Desktop: copia imagem para clipboard
          overlaySpan.textContent = "⏳...";
          try {
            const isFrigelar = p.storeName.toLowerCase() === "frigelar";
            let blob;

            if (isFrigelar) {
              // Frigelar sempre via Proxy para evitar Tainted Canvas
              const PROXY = "https://frigelar-proxy.crftwo.workers.dev/?url=";
              const resp = await fetch(PROXY + encodeURIComponent(p.image));
              blob = await resp.blob();
            } else {
              // Dufrio e outras: tenta carregar direto primeiro (mais rápido)
              const tempImg = new Image();
              tempImg.crossOrigin = "anonymous";
              tempImg.src = p.image;
              await new Promise((res, rej) => {
                tempImg.onload = res;
                tempImg.onerror = rej;
              });
              const cv = document.createElement("canvas");
              cv.width = tempImg.naturalWidth; cv.height = tempImg.naturalHeight;
              const ctx = cv.getContext("2d");
              ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,cv.width,cv.height);
              ctx.drawImage(tempImg, 0, 0);
              blob = await new Promise(r => cv.toBlob(r, "image/png"));
            }

            // Se for blob de JPG (da Frigelar por exemplo), converte para PNG antes de copiar
            if (blob.type !== "image/png") {
              const bmp = await createImageBitmap(blob);
              const cv = document.createElement("canvas");
              cv.width = bmp.width; cv.height = bmp.height;
              const ctx = cv.getContext("2d");
              ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,cv.width,cv.height);
              ctx.drawImage(bmp, 0, 0);
              blob = await new Promise(r => cv.toBlob(r, "image/png"));
            }

            await navigator.clipboard.write([
              new ClipboardItem({ "image/png": blob })
            ]);
            overlay.classList.add("copied"); overlaySpan.textContent = "✅ Copiado!";
            setTimeout(()=>{overlay.classList.remove("copied");overlaySpan.textContent="📷 Copiar Foto";},1800);
          } catch(e) {
            console.error("Erro ao copiar imagem:", e);
            await navigator.clipboard.writeText(p.image);
            overlay.classList.add("copied"); overlaySpan.textContent = "🔗 URL Copiada!";
            setTimeout(()=>{overlay.classList.remove("copied");overlaySpan.textContent="📷 Copiar Foto";},1800);
          }
        }
      };
      // Adapta o label do overlay conforme o dispositivo
      const isMobileDevice = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || ('ontouchstart' in window);
      overlaySpan.textContent = isMobileDevice ? "📤 Compartilhar" : "📷 Copiar Foto";

      const info = document.createElement("div"); info.className = "product-info";
      const hint = document.createElement("div"); hint.className = "copy-hint"; hint.textContent = "COPIAR";
      
      const titleDiv = document.createElement("div"); titleDiv.className = "product-title"; 
      titleDiv.innerHTML = "<span>" + p.title + "</span>";
      
      const pricesWrap = document.createElement("div"); pricesWrap.className = "prices-wrap";
      
      const priceVista = document.createElement("div"); priceVista.className = "price-vista";
      // Separa o valor principal do desconto ("5% de Desconto" / "Com 7% OFF no PIX")
      const spotMatch = p.spot.match(/^(R\$\s*[\d.,]+)(.*)$/);
      const mainPrice = spotMatch ? spotMatch[1].trim() : p.spot;
      const discountBit = spotMatch && spotMatch[2] ? spotMatch[2].trim() : "";
      priceVista.innerHTML = `<span>${mainPrice}</span>`;
      if (discountBit) {
        const badge = document.createElement("span");
        badge.className = "discount-badge";
        badge.textContent = discountBit;
        priceVista.appendChild(badge);
      }
      
      const priceInstall = document.createElement("div"); priceInstall.className = "price-install"; 
      priceInstall.textContent = p.install;
      
      pricesWrap.appendChild(priceVista); 
      pricesWrap.appendChild(priceInstall);
      
      info.appendChild(hint); info.appendChild(titleDiv); info.appendChild(pricesWrap);
      info.onclick = () => {
        const txt = formatCopyText(p.title, p.spot, p.install);
        navigator.clipboard.writeText(txt);
        hint.textContent = "✅ COPIADO!"; info.classList.add("copied");
        setTimeout(()=>{hint.textContent="COPIAR";info.classList.remove("copied");},1800);
      };

      const footer = document.createElement("div"); footer.className = "card-footer";
      const btnLink = document.createElement("button"); btnLink.className = "btn-link"; btnLink.textContent = "🔗 Abrir na Loja";
      btnLink.onclick = () => window.open(p.link,"_blank");
      footer.appendChild(btnLink);

      card.appendChild(badge); card.appendChild(imgWrap); card.appendChild(info); card.appendChild(footer);
      return card;
    }

    window.onload = loadData;
  </script>
</body>
</html>
