<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Scraper de Ar Condicionado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #050505; --card-bg: rgba(20,20,20,0.6); --card-border: rgba(255,255,255,0.07); --green: #00e676; --blue: #4facfe; --text: #ffffff; --muted: #888888; }
    body { font-family: "Outfit", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .aurora { position: fixed; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none; opacity: 0.25; animation: auroraAnim 15s infinite alternate ease-in-out; }
    .a1 { width: 600px; height: 600px; background: #3b82f6; top: -10%; left: -10%; }
    .a2 { width: 600px; height: 600px; background: #8b5cf6; bottom: -10%; right: -5%; animation-duration: 20s; }
    @keyframes auroraAnim { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.3) translate(50px,-50px); } }
    .btn-back { position: fixed; top: 15px; left: 15px; z-index: 999; background: rgba(20,20,20,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 4px 10px; border-radius: 30px; text-decoration: none; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px; transition: 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    .btn-back svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 3; fill: none; }
    .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 60px 20px 80px; text-align: center; }
    .page-header { margin-bottom: 40px; }
    .page-header h1 { font-size: 32px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; font-style: italic; color: var(--blue); margin-bottom: 8px; }
    .page-header p { font-size: 11px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--card-border); padding-bottom: 24px; }
    .step-section { display: none; flex-direction: column; align-items: center; gap: 16px; animation: slideUpFade 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards; margin-top: 16px; }
    .step-section.active { display: flex; }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    h2 { font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; color: var(--text); margin-bottom: 24px; margin-top: 24px; }
    .options-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; width: 100%; }
    .option-btn { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--card-border); padding: 16px 32px; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; color: var(--text); font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .option-btn:hover { border-color: #cbd5e1; transform: translateY(-2px); }
    .tipo-btn { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 24px 16px; width: 180px; }
    .tipo-btn img { width: 160px; transition: transform 0.3s ease; filter: drop-shadow(0 0 10px rgba(79,172,254,0.4)); mix-blend-mode: screen; }
    .tipo-btn:hover img { transform: scale(1.05); }
    #loading-results { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px; margin-top: 20px; }
    .spinner { width: 30px; height: 30px; border: 3px solid rgba(79,172,254,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--blue); }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; margin-top: 30px; width: 100%; max-width: 1400px; }
    .product-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; backdrop-filter: blur(10px); display: flex; flex-direction: column; transition: all 0.2s ease; text-align: left; position: relative; }
    .product-card:hover { border-color: #3b82f6; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .product-img-wrap { width: 100%; aspect-ratio: 4/3; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid var(--card-border); cursor: pointer; }
    .product-img-wrap img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.2s ease; }
    .product-img-wrap:hover img { transform: scale(1.05); }
    .product-img-wrap::after { content: "ABRIR PRODUTO"; position: absolute; bottom: 0; left: 0; right: 0; background: rgba(16,46,130,0.9); color: #fff; font-size: 10px; font-weight: 900; text-align: center; padding: 6px; transform: translateY(100%); transition: 0.2s; letter-spacing: 1px; }
    .product-img-wrap:hover::after { transform: translateY(0); }
    .product-info { padding: 16px; display: flex; flex-direction: column; gap: 6px; cursor: pointer; transition: 0.2s; position: relative; }
    .product-info:hover { background: rgba(255,255,255,0.03); }
    .product-info::before { content: "COPIAR"; position: absolute; top: 10px; right: 10px; font-size: 9px; font-weight: 800; color: var(--blue); opacity: 0; transition: 0.2s; background: rgba(79,172,254,0.1); padding: 4px 8px; border-radius: 4px; letter-spacing: 1px; }
    .product-info:hover::before { opacity: 1; }
    .product-info.copied { background: rgba(0,230,118,0.1); }
    .product-info.copied::before { content: "COPIADO!"; color: var(--green); background: rgba(0,230,118,0.2); opacity: 1; }
    .product-title { font-size: 11px; font-weight: 800; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
    .price-spot { font-size: 18px; font-weight: 900; color: var(--blue); }
    .price-install { font-size: 12px; color: var(--muted); font-weight: 600; }
    .store-badge { position: absolute; top: 10px; left: 10px; z-index: 2; background: rgba(16,46,130,0.9); padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; color: white; letter-spacing: 1px; text-transform: uppercase; }
    .store-logo-area { display: flex; align-items: center; justify-content: center; padding: 8px 16px 0; }
    .store-logo-area img { max-height: 22px; max-width: 100px; object-fit: contain; filter: grayscale(1) brightness(0) invert(1); opacity: 0.7; }
    @media (max-width: 768px) { .tipo-btn { width: 100%; flex-direction: row; justify-content: space-between; padding: 16px; } .tipo-btn img { width: 100px; } .option-btn { width: 100%; } .products-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div style="position:fixed;inset:0;background:#050505;z-index:-2;pointer-events:none;"></div>
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>
  <a href="index.html" class="btn-back">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Menu Principal
  </a>
  <div class="container">
    <div class="page-header">
      <h1>Scraper de Ar Condicionado</h1>
      <p>Varredura automatica e em tempo real dos sites concorrentes.</p>
    </div>
    <div id="step-tipo" class="step-section active">
      <h2>Selecione o Tipo</h2>
      <div class="options-grid" id="tipo-options"></div>
    </div>
    <div id="step-btus" class="step-section">
      <h2>Selecione os BTUs</h2>
      <div class="options-grid" id="btu-options"></div>
    </div>
    <div id="step-ciclo" class="step-section">
      <h2>Selecione o Ciclo</h2>
      <div class="options-grid" id="ciclo-options"></div>
    </div>
    <div id="loading-results">
      <div class="spinner"></div>
      <p id="loading-msg">Consultando Lojas...</p>
    </div>
    <div id="step-resultados" class="step-section" style="width:100%;">
      <h2 id="titulo-resultados" style="display:none;margin-bottom:12px;">Resultados da Varredura</h2>
      <div class="products-grid" id="results-grid"></div>
    </div>
  </div>
  <script>
    let sheetData = [], selection = { tipo:'', btu:'', ciclo:'' };
    const IMAGES = { "Hiwall":"img/hi_wall.png","Hi Wall":"img/hi_wall.png","Piso Teto":"img/piso_teto.png","Cassete":"img/cassete.png" };
    const STORE_LOGOS = { "dufrio":"img/logo_dufrio.jpg","centralar":"img/logo_centralar.png","climario":"img/logo_climario.svg","frigelar":"img/logo_frigelar.svg","friopecas":"img/logo_friopecas.png","leveros":"img/logo_leveros.svg","poloar":"img/logo_poloar.png","str":"img/logo_str.svg","webcontinental":"img/logo_webcontinental.png" };
    function getStoreLogo(name) { const k = name.toLowerCase(); for (const [key,url] of Object.entries(STORE_LOGOS)) { if (k.includes(key)) return url; } return ''; }

    async function loadData() {
      const r = await fetch("https://opensheet.elk.sh/1ml7XpwZfzM4ElRJb4G62b93VMqUw3jeprTtgxdigiD8/Sheet1");
      sheetData = await r.json();
      renderTipos();
    }
    function renderTipos() {
      const tipos = [...new Set(sheetData.map(i => i.Tipo))];
      const c = document.getElementById("tipo-options"); c.innerHTML = "";
      tipos.forEach(t => { const b = document.createElement("button"); b.className = "option-btn tipo-btn"; b.innerHTML = "<img src='" + (IMAGES[t]||"img/hi_wall.png") + "' onerror=\"this.src='https://placehold.co/80';\"> <span>" + t + "</span>"; b.onclick = () => selectTipo(t); c.appendChild(b); });
    }
    function selectTipo(t) { selection.tipo=t; const btus=[...new Set(sheetData.filter(i=>i.Tipo===t).map(i=>i.BTUs))]; renderOptions("btu-options",btus,selectBTU); showStep("step-btus"); }
    function selectBTU(b) { selection.btu=b; const ciclos=[...new Set(sheetData.filter(i=>i.Tipo===selection.tipo&&i.BTUs===b).map(i=>i.Ciclo))]; renderOptions("ciclo-options",ciclos,selectCiclo); showStep("step-ciclo"); }
    function selectCiclo(c) { selection.ciclo=c; showStep("results"); startScraping(); }
    function renderOptions(id,opts,cb) { const c=document.getElementById(id); c.innerHTML=""; opts.forEach(o=>{ const b=document.createElement("button"); b.className="option-btn"; b.innerText=o; b.onclick=()=>cb(o); c.appendChild(b); }); }
    function showStep(id) {
      document.querySelectorAll(".step-section").forEach(s=>s.classList.remove("active"));
      if (id==="results") { document.getElementById("loading-results").style.display="flex"; document.getElementById("step-resultados").classList.add("active"); document.getElementById("results-grid").innerHTML=""; document.getElementById("titulo-resultados").style.display="none"; }
      else { document.getElementById(id).classList.add("active"); document.getElementById("loading-results").style.display="none"; }
    }

    async function startScraping() {
      const links = sheetData.filter(i=>i.Tipo===selection.tipo&&i.BTUs===selection.btu&&i.Ciclo===selection.ciclo);
      const grid = document.getElementById("results-grid");
      let foundAny = false;
      const dufrioLink = links.find(l=>l.Site.toLowerCase()==="dufrio");
      if (dufrioLink) {
        document.getElementById("loading-msg").innerText = "BUSCANDO DUFRIO...";
        const products = await scrapeDufrio(dufrioLink.Link);
        products.forEach(p => { grid.appendChild(createCard(p,"Dufrio")); foundAny=true; });
      }
      document.getElementById("loading-results").style.display="none";
      document.getElementById("titulo-resultados").style.display="block";
      if (!foundAny) grid.innerHTML = "<p style=\"grid-column:1/-1;color:var(--muted);font-size:14px;text-transform:uppercase;font-weight:800;text-align:center;\">Nenhum produto encontrado.</p>";
    }

    function parseDufrioFilters(url) {
      const parsed = new URL(url), params = parsed.searchParams, caps = [];
      params.forEach((v,k) => { if (k.startsWith("ec_capacidade")) caps.push(v.trim()); });
      const ciclo = params.get("ec_ciclo") || null;
      const path = parsed.pathname;
      let cat = "ar-condicionado-split-inverter";
      if (path.includes("piso-teto")) cat = "ar-condicionado-split-piso-teto";
      else if (path.includes("cassete")) cat = "ar-condicionado-split-cassete";
      return { capacidades: caps, ciclo, categoria: cat };
    }

    async function scrapeDufrio(url) {
      try {
        const f = parseDufrioFilters(url);
        let capFilter = f.capacidades.length > 0 ? "ec_capacidade: { in: [" + f.capacidades.map(c=>"\""+c+"\"").join(",") + "] }," : "";
        let cicloFilter = f.ciclo ? "ec_ciclo: { eq: \"" + f.ciclo + "\" }," : "";
        let catFilter = "category_url_path: { eq: \"ar-condicionado/" + f.categoria + "\" },";
        const query = "{ products( filter: {" + catFilter + capFilter + cicloFilter + "}, pageSize: 24, sort: { price: ASC } ) { items { name url_key sku image { url } price_range { minimum_price { final_price { value } } } } } }";
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent("https://www.dufrio.com.br/graphql"); const resp = await fetch(proxyUrl, { method:"POST", headers:{"Content-Type":"application/json","x-requested-with":"XMLHttpRequest"}, body:JSON.stringify({query}) });
        const json = await resp.json();
        const items = (json.data && json.data.products && json.data.products.items) || [];
        console.log("Dufrio GraphQL items:", items.length, items[0]);
        return items.map(item => ({
          title: item.name,
          image: item.image ? item.image.url : "",
          spot: "R$ " + item.price_range.minimum_price.final_price.value.toLocaleString("pt-BR",{minimumFractionDigits:2}),
          install: "—",
          link: "https://www.dufrio.com.br/" + item.url_key + ".html"
        }));
      } catch(e) { console.error("Dufrio GraphQL erro:", e); return []; }
    }

    function createCard(p, store) {
      const card = document.createElement("div"); card.className = "product-card";
      const textToCopy = "Loja: " + store + "\n" + p.title + "\nA vista: " + p.spot + "\nParcelado: " + p.install;
      const logo = getStoreLogo(store);
      card.innerHTML = "<div class='store-badge'>" + store + "</div>" +
        (logo ? "<div class='store-logo-area'><img src='" + logo + "' alt='" + store + "'></div>" : "") +
        "<div class='product-img-wrap' onclick=\"window.open('" + p.link + "','_blank')\">" +
          "<img src='" + p.image + "' onerror=\"this.src='https://placehold.co/250x250?text=" + store + "';\">" +
        "</div>" +
        "<div class='product-info'>" +
          "<div class='product-title'>" + p.title + "</div>" +
          "<div class='price-spot'>" + p.spot + "</div>" +
          "<div class='price-install'>" + p.install + "</div>" +
        "</div>";
      card.querySelector(".product-info").onclick = (e) => {
        navigator.clipboard.writeText(textToCopy);
        const info = e.currentTarget; info.classList.add("copied");
        setTimeout(()=>info.classList.remove("copied"),1500);
      };
      return card;
    }
    window.onload = loadData;
  </script>
</body>
</html>
