<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Scraper ClimaRio - Oficial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --card-bg: rgba(18, 18, 28, 0.9);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #f59e0b;
      --green: #00e676;
      --text: #ffffff;
      --muted: #7a7a9a;
      --radius: 24px;
    }
    body {
      font-family: "Outfit", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .aurora {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.15;
      animation: auroraAnim 20s infinite alternate ease-in-out;
    }
    .a1 { width: 800px; height: 800px; background: #f59e0b; top: -20%; left: -10%; }
    .a2 { width: 700px; height: 700px; background: #3b82f6; bottom: -20%; right: -10%; animation-duration: 30s; }
    @keyframes auroraAnim { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.3) translate(100px,-100px); } }

    .btn-back {
      position: fixed; top: 20px; left: 20px; z-index: 1000;
      background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); color: #fff;
      padding: 10px 20px; border-radius: 40px; text-decoration: none;
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; display: flex; align-items: center; gap: 10px; transition: 0.3s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.15); transform: translateX(-5px); }

    .container {
      position: relative; z-index: 1; max-width: 1300px; margin: 0 auto;
      padding: 100px 24px 120px;
    }

    .header-area { text-align: center; margin-bottom: 60px; }
    .header-area h1 {
      font-size: 48px; font-weight: 900; letter-spacing: -2px;
      text-transform: uppercase; font-style: italic;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .header-area p {
      font-size: 14px; color: var(--muted); font-weight: 700;
      text-transform: uppercase; letter-spacing: 3px;
    }

    .search-box {
      background: var(--card-bg); border: 1px solid var(--card-border);
      padding: 40px; border-radius: var(--radius); backdrop-filter: blur(30px);
      margin-bottom: 50px; display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    }
    .input-group { position: relative; }
    .url-input {
      width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--card-border);
      padding: 20px 24px; border-radius: 16px; color: #fff; font-family: inherit;
      font-size: 15px; outline: none; transition: 0.3s;
    }
    .url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1); }
    
    .btn-action {
      background: var(--accent); color: #000; border: none; padding: 20px;
      border-radius: 16px; font-weight: 900; font-size: 16px; text-transform: uppercase;
      letter-spacing: 1px; cursor: pointer; transition: 0.4s;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .btn-action:hover { background: #fbbf24; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(245, 158, 11, 0.3); }
    .btn-action:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

    .results-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    .card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: var(--radius); overflow: hidden; backdrop-filter: blur(20px);
      display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .card:hover { transform: translateY(-8px) scale(1.02); border-color: rgba(245, 158, 11, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

    .card-img {
      width: 100%; aspect-ratio: 1; background: #fff;
      display: flex; align-items: center; justify-content: center; padding: 30px;
      position: relative; border-bottom: 1px solid var(--card-border);
    }
    .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 0.5s; }
    .card:hover .card-img img { transform: scale(1.1); }

    .card-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
    .card-title {
      font-size: 16px; font-weight: 700; line-height: 1.5; color: #fff;
      margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden; height: 72px;
    }
    
    .price-box {
      margin-top: auto; background: rgba(255,255,255,0.03);
      padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
    }
    .price-cash { font-size: 26px; font-weight: 900; color: var(--green); letter-spacing: -1px; }
    .price-label { font-size: 11px; color: var(--green); text-transform: uppercase; font-weight: 800; margin-left: 4px; }
    .price-parc { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 6px; }

    .card-btn {
      display: block; width: 100%; padding: 14px; background: rgba(255,255,255,0.06);
      border: 1px solid var(--card-border); border-radius: 12px; color: #fff;
      text-decoration: none; text-align: center; font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.5px; margin-top: 18px; transition: 0.3s;
    }
    .card-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    .loading-area { display: none; text-align: center; padding: 60px; }
    .spin {
      width: 50px; height: 50px; border: 5px solid rgba(245, 158, 11, 0.1);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
      margin: 0 auto 25px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 18px; font-weight: 600; }
  </style>
</head>
<body>

  <div class="aurora a1"></div>
  <div class="aurora a2"></div>

  <a href="index.html" class="btn-back">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Painel Dufrio
  </a>

  <div class="container">
    <div class="header-area">
      <h1>Scraper ClimaRio</h1>
      <p>Extração Inteligente de Dados</p>
    </div>

    <div class="search-box">
      <div class="input-group">
        <input type="text" id="urlInput" class="url-input" placeholder="Cole o link da ClimaRio aqui..." value="https://www.climario.com.br/ar-condicionado?initialMap=c&initialQuery=ar-condicionado&map=category-1,category-2,category-3&order=OrderByPriceASC&query=/ar-condicionado/ar-condicionado-hi-wall-inverter/9-000-btu-h&searchState">
      </div>
      <button id="renderBtn" class="btn-action">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        Renderizar Ofertas
      </button>
    </div>

    <div id="loader" class="loading-area">
      <div class="spin"></div>
      <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 12px; color: var(--accent); font-weight: 800;">Consultando Inventário ClimaRio...</p>
    </div>

    <div id="results" class="results-grid"></div>
    <div id="status" class="msg">Pronto para extrair. Insira a URL e clique no botão.</div>
  </div>

  <script>
    // Proxies sugeridos para evitar bloqueios
    const PROXIES = [
      "https://api.codetabs.com/v1/proxy?quest=",
      "https://api.allorigins.win/get?url=",
      "https://frigelar-proxy.crftwo.workers.dev/?url="
    ];

    async function tryFetch(targetUrl) {
      // Tenta primeiro o CodeTabs (muito estável para VTEX)
      try {
        const resp = await fetch(PROXIES[0] + encodeURIComponent(targetUrl));
        if (resp.ok) return await resp.text();
      } catch(e) {}

      // Fallback para AllOrigins
      try {
        const resp = await fetch(PROXIES[1] + encodeURIComponent(targetUrl));
        const json = await resp.json();
        if (json && json.contents) return json.contents;
      } catch(e) {}

      // Fallback para Worker
      try {
        const resp = await fetch(PROXIES[2] + encodeURIComponent(targetUrl));
        if (resp.ok) return await resp.text();
      } catch(e) {}

      throw new Error("Falha em todos os proxies.");
    }

    async function runScraper() {
      const url = document.getElementById('urlInput').value.trim();
      const results = document.getElementById('results');
      const loader = document.getElementById('loader');
      const status = document.getElementById('status');
      const btn = document.getElementById('renderBtn');

      if (!url) return;

      btn.disabled = true;
      loader.style.display = 'block';
      results.innerHTML = '';
      status.style.display = 'none';

      try {
        const html = await tryFetch(url);
        
        let products = [];

        // 1. EXTRAÇÃO VIA REGEX (RAW HTML) - Solução definitiva para arquivos grandes do VTEX IO
        const stateMatch = html.match(/__STATE__\s*=\s*(\{.*?\});/s) || html.match(/__STATE__\s*=\s*(\{.*?\})<\/script>/s);
        
        if (stateMatch && stateMatch[1]) {
          try {
            const state = JSON.parse(stateMatch[1]);
            const productKeys = Object.keys(state).filter(k => k.startsWith('Product:') && state[k].productName);
            
            products = productKeys.map(k => {
              const p = state[k];
              const productId = p.productId;
              const skuKey = Object.keys(state).find(sk => sk.includes(`Product:${productId}`) && sk.includes('items.0'));
              const sku = state[skuKey] || {};
              
              let img = '';
              if (sku.images?.[0]?.id) img = state[sku.images[0].id]?.imageUrl;

              const sellerKey = Object.keys(state).find(sk => sk.includes(skuKey || productId) && sk.includes('sellers.0'));
              const offer = state[state[sellerKey]?.commertialOffer?.id] || {};
              
              let cash = 'Consulte o site';
              if (offer.SpotPrice || offer.Price) {
                cash = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(offer.SpotPrice || offer.Price);
              }

              let parc = '';
              if (offer.Installments?.length > 0) {
                const best = offer.Installments.reduce((a, b) => (a.NumberOfInstallments > b.NumberOfInstallments) ? a : b);
                parc = `ou ${new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(best.TotalValuePlusInterestRate)} em ${best.NumberOfInstallments}x de ${new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(best.Value)}`;
              }

              return {
                name: p.productName,
                img: img,
                cash: cash,
                parc: parc,
                link: 'https://www.climario.com.br/' + p.linkText + '/p'
              };
            });
          } catch (e) {
            console.error("Erro ao parsear JSON do Estado:", e);
          }
        }

        // 2. FALLBACK VIA DOM (Caso a regex falhe por algum motivo raro)
        if (products.length === 0) {
          const doc = new DOMParser().parseFromString(html, 'text/html');
          const items = doc.querySelectorAll('a[class*="vtex-product-summary-2-x-clearLink"]');
          items.forEach(item => {
            const name = item.querySelector('[class*="vtex-product-summary-2-x-productBrand"]')?.innerText;
            const img = item.querySelector('img[class*="vtex-product-summary-2-x-imageNormal"]')?.src || item.querySelector('img[class*="vtex-product-summary-2-x-image"]')?.src;
            const cash = item.querySelector('[class*="vtex-product-price-1-x-spotPriceValue"]')?.innerText;
            const parc = item.querySelector('[class*="vtex-product-price-1-x-installments"]')?.innerText;
            const link = item.href;
            if (name && cash) products.push({ name, img, cash, parc, link });
          });
        }

        if (products.length === 0) {
          status.innerText = "Nenhum produto detectado. O site pode ter bloqueado a requisição.";
          status.style.display = 'block';
        } else {
          // Remove duplicatas por nome
          const unique = products.reduce((acc, current) => {
            const x = acc.find(item => item.name === current.name);
            if (!x) return acc.concat([current]);
            else return acc;
          }, []);

          unique.forEach(p => {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
              <div class="card-img"><img src="${p.img}" onerror="this.src='https://placehold.co/300?text=ClimaRio'"></div>
              <div class="card-body">
                <div class="card-title" title="${p.name}">${p.name}</div>
                <div class="price-box">
                  <div class="price-cash">${p.cash}<span class="price-label">à vista</span></div>
                  <div class="price-parc">${p.parc}</div>
                </div>
                <a href="${p.link}" target="_blank" class="card-btn">Ver na Loja</a>
              </div>
            `;
            results.appendChild(el);
          });
        }

      } catch(e) {
        console.error(e);
        status.innerText = "Erro crítico ao acessar o site. Tente novamente em instantes.";
        status.style.display = 'block';
      } finally {
        loader.style.display = 'none';
        btn.disabled = false;
      }
    }

    document.getElementById('renderBtn').addEventListener('click', runScraper);
  </script>
</body>
</html>
