<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Scraper ClimaRio - Extrator de Produtos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --card-bg: rgba(18, 18, 28, 0.85);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #f59e0b; /* Laranja ClimaRio */
      --green: #00e676;
      --blue: #4facfe;
      --text: #ffffff;
      --muted: #7a7a9a;
      --radius: 20px;
    }
    body {
      font-family: "Outfit", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .aurora {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.22;
      animation: auroraAnim 18s infinite alternate ease-in-out;
    }
    .a1 { width: 700px; height: 700px; background: #f59e0b; top: -15%; left: -15%; }
    .a2 { width: 600px; height: 600px; background: #7c3aed; bottom: -15%; right: -10%; animation-duration: 24s; }
    @keyframes auroraAnim {
      0% { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.4) translate(60px,-60px); }
    }

    .btn-back {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 999;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      padding: 8px 16px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .btn-back:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 24px 100px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .page-header h1 {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -1.5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .page-header p {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Input Area */
    .input-wrap {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 30px;
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      margin-bottom: 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .input-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
    }
    .input-field {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--card-border);
      padding: 16px;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-field:focus {
      border-color: var(--accent);
    }
    .btn-render {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-render:hover {
      background: #fbbf24;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
    }
    .btn-render:disabled {
      background: #444;
      color: #888;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Grid Area */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      transition: 0.3s;
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: rgba(245, 158, 11, 0.4);
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }

    .img-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .img-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-info {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .product-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 16px;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      height: 63px;
    }
    .price-wrap {
      margin-top: auto;
      background: rgba(0,0,0,0.3);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .price-spot {
      font-size: 22px;
      font-weight: 900;
      color: var(--green);
      margin-bottom: 4px;
    }
    .price-installments {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .btn-view {
      display: block;
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 16px;
      transition: 0.2s;
    }
    .btn-view:hover {
      background: rgba(245, 158, 11, 0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Loading / Messages */
    .loader {
      display: none;
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(245, 158, 11, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg {
      text-align: center;
      padding: 100px 20px;
      color: var(--muted);
      font-weight: 600;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .container { padding: 60px 16px; }
      .page-header h1 { font-size: 28px; }
      .results-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .product-name { font-size: 13px; height: 55px; }
      .price-spot { font-size: 18px; }
    }
    @media (max-width: 480px) {
      .results-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="aurora a1"></div>
  <div class="aurora a2"></div>

  <a href="index.html" class="btn-back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Voltar ao Hub
  </a>

  <div class="container">
    <div class="page-header">
      <h1>Scraper ClimaRio</h1>
      <p>Extração automática de produtos e preços</p>
    </div>

    <div class="input-wrap">
      <div class="input-label">URL da Busca ClimaRio</div>
      <input type="text" id="urlInput" class="input-field" placeholder="Cole o link da busca aqui..." value="https://www.climario.com.br/ar-condicionado?initialMap=c&initialQuery=ar-condicionado&map=category-1,category-2,category-3&order=OrderByPriceASC&query=/ar-condicionado/ar-condicionado-hi-wall-inverter/9-000-btu-h&searchState">
      <button id="renderBtn" class="btn-render">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        Renderizar Produtos
      </button>
    </div>

    <div id="loader" class="loader">
      <div class="spinner"></div>
      <p style="font-weight: 800; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; font-size: 11px;">Processando site da ClimaRio...</p>
    </div>

    <div id="resultsGrid" class="results-grid"></div>
    <div id="emptyMsg" class="empty-msg">Insira uma URL e clique em renderizar para ver os resultados.</div>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const renderBtn = document.getElementById('renderBtn');
    const resultsGrid = document.getElementById('resultsGrid');
    const loader = document.getElementById('loader');
    const emptyMsg = document.getElementById('emptyMsg');

    const PROXY = "https://frigelar-proxy.crftwo.workers.dev/?url=";

    async function fetchClimaRio() {
      const url = urlInput.value.trim();
      if (!url) return;

      renderBtn.disabled = true;
      loader.style.display = 'block';
      resultsGrid.innerHTML = '';
      emptyMsg.style.display = 'none';

      try {
        const response = await fetch(PROXY + encodeURIComponent(url));
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        let products = [];

        // TENTATIVA 1: Seletores de DOM (caso o proxy renderize ou o HTML venha populado)
        const items = Array.from(doc.querySelectorAll('.vtex-product-summary-2-x-container'));
        if (items.length > 0) {
          products = items.map(item => {
            const name = item.querySelector('.vtex-product-summary-2-x-productNameContainer span')?.innerText || '';
            const img = item.querySelector('img.vtex-product-summary-2-x-imageNormal')?.src || '';
            const cashPrice = item.querySelector('.vtex-product-price-1-x-spotPrice')?.innerText || '';
            const installments = item.querySelector('.vtex-product-price-1-x-installments')?.innerText || '';
            let link = item.querySelector('a.vtex-product-summary-2-x-clearLink')?.getAttribute('href') || '#';
            return { name, img, cashPrice, installments, link };
          });
        }

        // TENTATIVA 2: Extração via __STATE__ (VTEX IO Standard)
        if (products.length === 0) {
          const scripts = Array.from(doc.querySelectorAll('script'));
          const stateScript = scripts.find(s => s.innerText.includes('window.__STATE__'));
          if (stateScript) {
            const jsonText = stateScript.innerText.split('window.__STATE__ = ')[1].split(';')[0];
            const state = JSON.parse(jsonText);
            
            // Filtra chaves que começam com Product:
            const productKeys = Object.keys(state).filter(k => k.startsWith('Product:'));
            products = productKeys.map(k => {
              const p = state[k];
              const name = p.productName;
              const link = '/' + p.linkText + '/p';
              
              // Busca imagem e preço no estado (objetos relacionados)
              // Em VTEX IO, as imagens e preços costumam estar em chaves separadas referenciadas por ID
              let img = '';
              let cashPrice = 'Sob consulta';
              let installments = '';

              // Tenta achar a imagem
              const itemsRef = p.items?.[0]?.id;
              if (itemsRef) {
                const itemData = state[`Product:${p.productId}.items(null).0`];
                if (itemData && itemData.images?.[0]?.id) {
                   const imgData = state[itemData.images[0].id];
                   img = imgData?.imageUrl || '';
                }
                
                // Tenta achar o preço no seller
                const sellerRef = state[`$Product:${p.productId}.items(null).0.sellers.0`];
                if (sellerRef && sellerRef.commertialOffer?.id) {
                   const offer = state[sellerRef.commertialOffer.id];
                   if (offer) {
                     cashPrice = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(offer.SpotPrice || offer.Price);
                     if (offer.Installments && offer.Installments.length > 0) {
                        // Pega a maior parcela (geralmente a última do array)
                        const inst = offer.Installments.reduce((prev, current) => (prev.NumberOfInstallments > current.NumberOfInstallments) ? prev : current);
                        installments = `ou ${new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(inst.TotalValuePlusInterestRate)} em ${inst.NumberOfInstallments}x de ${new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(inst.Value)}`;
                     }
                   }
                }
              }

              return { name, img, cashPrice, installments, link };
            });
          }
        }
        
        if (products.length === 0) {
          emptyMsg.innerText = 'Nenhum produto encontrado. O site pode estar bloqueando o acesso ou a estrutura mudou.';
          emptyMsg.style.display = 'block';
          return;
        }

        products.forEach(p => {
          if (!p.name) return;
          
          let finalLink = p.link;
          if (finalLink.startsWith('/') || !finalLink.startsWith('http')) {
            finalLink = 'https://www.climario.com.br' + (finalLink.startsWith('/') ? '' : '/') + finalLink.replace(/^\//, '');
          }

          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `
            <div class="img-wrap">
              <img src="${p.img}" alt="${p.name}" onerror="this.src='https://placehold.co/400x400?text=Sem+Imagem'">
            </div>
            <div class="card-info">
              <div class="product-name" title="${p.name}">${p.name}</div>
              <div class="price-wrap">
                <div class="price-spot">${p.cashPrice}</div>
                <div class="price-installments">${p.installments}</div>
              </div>
              <a href="${finalLink}" target="_blank" class="btn-view">Ver no Site</a>
            </div>
          `;
          resultsGrid.appendChild(card);
        });

      } catch (error) {
        console.error('Erro ao buscar dados:', error);
        emptyMsg.innerText = 'Ocorreu um erro ao tentar acessar o site. Tente novamente mais tarde.';
        emptyMsg.style.display = 'block';
      } finally {
        renderBtn.disabled = false;
        loader.style.display = 'none';
      }
    }

    renderBtn.addEventListener('click', fetchClimaRio);
  </script>
</body>
</html>
