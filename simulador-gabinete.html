<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Gabinete 3D</title>
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        :root {
            --primary: #4facfe;
            --primary-hover: #3b82f6;
            --bg-dark: #050505;
            --bg-sidebar: rgba(10, 10, 10, 0.7);
            --card-bg: rgba(20, 20, 20, 0.6);
            --text-main: #ffffff;
            --text-secondary: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', 'Inter', sans-serif; }

        body {
            background: #050505 !important;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            font-feature-settings: "cv01", "cv02";
        }

        /* Sidebar Control */
        #sidebar {
            width: 400px;
            height: 100vh;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 30px;
            overflow-y: auto;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            color: var(--primary);
            letter-spacing: -1px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        /* Card System */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .card:hover { border-color: rgba(79, 172, 254, 0.3); }

        .hidden { display: none !important; }

        /* Inputs */
        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }

        input, select {
            width: 100%;
            background: rgba(15, 15, 15, 0.9) !important;
            border: 1.5px solid var(--border) !important;
            border-radius: 12px;
            padding: 12px 16px;
            color: white !important;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            height: 48px;
        }
        select option { background-color: #050505 !important; color: #fff !important; }

        input:focus, select:focus { outline: none; border-color: var(--primary) !important; background: rgba(255, 255, 255, 0.08); }

        /* Toggle Button */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .toggle-label {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .toggle-container.active .label-int { color: var(--primary); }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Button */
        #btn-calcular {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Legends */
        .canvas-overlay {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .legend-item {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Relatorio UI */
        #lista-pecas { margin-top: 15px; }
        .peca-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
        }
        .peca-label { font-size: 12px; color: var(--text-secondary); }
        .peca-value { font-size: 13px; font-weight: 800; color: #fff; }

        .relatorio-resumo {
            margin-top: 20px;
            padding: 15px;
            background: rgba(79, 172, 254, 0.05);
            border-left: 3px solid var(--primary);
            font-size: 12px;
            line-height: 1.6;
        }

        .formato-corte {
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border-radius: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #10b981;
            white-space: pre-wrap;
            cursor: pointer;
            position: relative;
        }

        .formato-corte.copiado::after {
            content: 'COPIADO!';
            position: absolute;
            inset: 0 ;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        /* 3D Container */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: transparent !important;
        }
        
        /* Esconder Spinners de campos numéricos */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div style="position:fixed; inset:0; background: #050505 !important; z-index:-2; pointer-events:none;"></div>
    <div class="aurora" style="position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(120px);z-index:-1;opacity:0.25;background:#3b82f6;top:-10%;left:-10%;pointer-events:none;"></div>
    <div class="aurora" style="position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(120px);z-index:-1;opacity:0.25;background:#8b5cf6;bottom:-10%;right:-5%;pointer-events:none;"></div>

    <aside id="sidebar">
        <div class="header">
            <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; color: #fff; text-decoration: none; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 25px; opacity: 0.8;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Menu Principal
            </a>
            <h1>Gabinete 3D</h1>
            <p>Simulador 3D (Câmaras-frias)</p>
        </div>

        <div class="toggle-container active" id="toggle-medidas">
            <span class="toggle-label label-ext">Externas</span>
            <label class="switch">
                <input type="checkbox" id="tipo-medida" checked onchange="atualizarAutomaticoConfirmado()">
                <span class="slider"></span>
            </label>
            <span class="toggle-label label-int">Internas</span>
        </div>

        <div class="card" id="card-medidas">
            <div class="row">
                <div class="input-group">
                    <label>Comprimento (C)</label>
                    <input type="number" id="comp" placeholder="0.00" step="0.01" oninput="verificarMedidas()" min="0.01">
                </div>
                <div class="input-group">
                    <label>Largura (L)</label>
                    <input type="number" id="larg" placeholder="0.00" step="0.01" oninput="verificarMedidas()" min="0.01">
                </div>
            </div>
            <div class="input-group">
                <label>Altura (H)</label>
                <input type="number" id="alt" placeholder="0.00" step="0.01" oninput="verificarMedidas()" min="0.01">
            </div>
        </div>

        <div class="card hidden" id="card-isolamento">
            <div class="input-group">
                <label>Tipo de Isolamento</label>
                <select id="tipo" onchange="aoMudarTipo(); gerarProjeto(false)">
                    <option value="PIR">PIR (Poliisocianurato)</option>
                    <option value="EPS">EPS (Isopor)</option>
                </select>
            </div>
            <div class="row">
                <div class="input-group">
                    <label>Espessura</label>
                    <select id="espessura" onchange="gerarProjeto(false)"></select>
                </div>
                <div class="input-group">
                    <label>Fabricante</label>
                    <select id="marca" onchange="gerarProjeto(false)"></select>
                </div>
            </div>
            <div class="input-group">
                <label>Piso da Câmara</label>
                <select id="temPiso" onchange="gerarProjeto(false)">
                    <option value="nao">Sem Piso Painel (Concreto)</option>
                    <option value="sim">Com Piso Painel</option>
                </select>
            </div>
        </div>

        <button id="btn-calcular" class="hidden" onclick="gerarProjeto(true)">Gerar Relatório de Peças</button>

        <div id="resultado" class="card hidden">
            <div id="lista-pecas"></div>
        </div>
    </aside>

    <main id="canvas-container">
        <div class="canvas-overlay">
            <div class="legend-item"><span class="dot" style="background: #3182ce;"></span> Paredes</div>
            <div class="legend-item"><span class="dot" style="background: #ffffff;"></span> Teto</div>
            <div class="legend-item"><span class="dot" style="background: #64748b;"></span> Piso</div>
        </div>
    </main>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
        mainLight.position.set(20, 40, 20);
        scene.add(mainLight);

        camera.position.set(8, 6, 8);

        const wallMat = new THREE.MeshPhysicalMaterial({ color: 0x3182ce, metalness: 0.1, roughness: 0.2, clearcoat: 1.0 });
        const roofMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1 });
        const floorMat = new THREE.MeshPhysicalMaterial({ color: 0x64748b, roughness: 0.4 });

        function aoMudarTipo() {
            const tipo = document.getElementById("tipo").value;
            const espCombo = document.getElementById("espessura");
            const marcaCombo = document.getElementById("marca");
            espCombo.innerHTML = ""; marcaCombo.innerHTML = "";

            if(tipo === "PIR") {
                const options = [
                    { v: 70, t: "-10°C" }, { v: 100, t: "-20°C" }, { v: 120, t: "-24°C" }, { v: 150, t: "-30°C" }
                ];
                options.forEach(optData => {
                    const opt = new Option(`${optData.v}mm`, optData.v / 1000);
                    if(optData.v === 70) opt.selected = true;
                    espCombo.add(opt);
                });
                marcaCombo.add(new Option("Brastelha (1.10m)", "1.10"));
                marcaCombo.add(new Option("MPB / Isoblock (1.15m)", "1.15"));
            } else {
                const options = [
                    { v: 50, t: "+5°C" }, { v: 100, t: "-10°C" }, { v: 150, t: "-20°C" }, { v: 200, t: "-24°C" }
                ];
                options.forEach(optData => {
                    const opt = new Option(`${optData.v}mm`, optData.v / 1000);
                    if(optData.v === 100) opt.selected = true;
                    espCombo.add(opt);
                });
                marcaCombo.add(new Option("Brastelha (1.15m)", "1.15"));
                marcaCombo.add(new Option("MPB / Isoblock (1.15m)", "1.15"));
            }
        }

        let debounceTimeout = null;
        function verificarMedidas() {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(() => {
                const getVal = (id) => parseFloat(document.getElementById(id).value.toString().replace(',', '.') || 0);
                const c = getVal('comp');
                const l = getVal('larg');
                const h = getVal('alt');
                
                if (c > 0 && l > 0 && h > 0) {
                    document.getElementById('card-isolamento').classList.remove('hidden');
                    document.getElementById('btn-calcular').classList.remove('hidden');
                    gerarProjeto(false);
                } else {
                    document.getElementById('card-isolamento').classList.add('hidden');
                    document.getElementById('btn-calcular').classList.add('hidden');
                    document.getElementById('resultado').classList.add('hidden');
                }
            }, 300);
        }

        function criarPainel3D(w, h, d, material, x, y, z, rotationY = 0) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z); mesh.rotation.y = rotationY;
            mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geometry), new THREE.LineBasicMaterial({ color: 0x1e293b, transparent: true, opacity: 0.3 })));
            if(window.chamberGroup) window.chamberGroup.add(mesh); else scene.add(mesh);
        }

        function fitCameraToRoom() {
            if (!window.chamberGroup) return;
            const box = new THREE.Box3().setFromObject(window.chamberGroup);
            const center = new THREE.Vector3(); box.getCenter(center);
            const size = new THREE.Vector3(); box.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            const distance = Math.abs(maxDim / (2 * Math.tan(fov / 2))) * 1.5;
            camera.position.copy(center).add(new THREE.Vector3(1, 0.8, 1).normalize().multiplyScalar(distance));
            if (window.controls) { controls.target.copy(center); controls.update(); }
        }

        function gerarProjeto(exibirRelatorio = false) {
            const C = parseFloat(document.getElementById('comp').value || 0);
            const L = parseFloat(document.getElementById('larg').value || 0);
            const H = parseFloat(document.getElementById('alt').value || 0);
            if (C <= 0 || L <= 0 || H <= 0) return;

            if (window.chamberGroup) scene.remove(window.chamberGroup);
            window.chamberGroup = new THREE.Group(); scene.add(window.chamberGroup);

            const E = parseFloat(document.getElementById('espessura').value || 0.1);
            const LU = parseFloat(document.getElementById('marca').value || 1.15);
            const temPiso = document.getElementById('temPiso').value === "sim";
            const isInternas = document.getElementById('tipo-medida').checked;

            const maxDim = Math.max(C, L);
            const isWidthSmallest = L <= C;
            let numTeto = Math.ceil(maxDim / LU);
            
            let altP = H; if (!isInternas) { altP = H - E; if(temPiso) altP -= E; }
            const yP = (isInternas && !temPiso) ? (altP / 2) : (temPiso ? (altP / 2) + E : (altP / 2));
            const zT = isInternas ? altP + (E/2) : H - (E/2);

            let Lef = L - (2 * E);
            let totalP = Math.ceil(((C * 2) + (Lef * 2)) / LU);

            const loop = (n, m, z, mat) => {
                for(let i=0; i<n; i++) {
                    let w = (i === n-1) ? (m % LU || LU) : LU;
                    let off = (i * LU) + (w/2) - (m/2);
                    if(isWidthSmallest) criarPainel3D(w, E, L, mat, off, z, 0);
                    else criarPainel3D(C, E, w, mat, 0, z, off);
                }
            };
            loop(numTeto, maxDim, zT, roofMat);
            if(temPiso) loop(numTeto, maxDim, E/2, floorMat);

            const wallSide = (len, rot) => {
                let n = Math.ceil(len / LU);
                for(let i=0; i<n; i++) {
                    let w = (i === n-1) ? (len % LU || LU) : LU;
                    let off = (i * LU) + (w/2) - (len/2);
                    if(!rot) {
                        criarPainel3D(w, altP, E, wallMat, off, yP, -(L/2) + E/2);
                        criarPainel3D(w, altP, E, wallMat, off, yP, (L/2) - E/2);
                    } else {
                        criarPainel3D(E, altP, w, wallMat, -(C/2) + E/2, yP, off);
                        criarPainel3D(E, altP, w, wallMat, (C/2) - E/2, yP, off);
                    }
                }
            };
            wallSide(C, false); wallSide(Lef, true);

            fitCameraToRoom();
            if (exibirRelatorio) atualizarRelatorio(numTeto, totalP, L, C, altP, temPiso, Lef);
        }

        function atualizarRelatorio(nT, totalP, L, C, aP, temP, Lef) {
            const res = document.getElementById("resultado");
            res.classList.remove("hidden");
            const tipo = document.getElementById("tipo").value;
            const marcaNome = document.getElementById("marca").options[document.getElementById("marca").selectedIndex].text.split("(")[0].trim();
            const esp = (parseFloat(document.getElementById("espessura").value)*1000).toFixed(0);
            const numTP = temP ? (nT*2) : nT;
            const labelT = temP ? "(Teto e Piso)" : "(Teto)";
            const compT = L <= C ? L : C;
            const fmt = (v) => v.toFixed(2).replace(".", ",");
            const altU = document.getElementById("alt").value.replace(",", ".");
            
            const txt = `${numTP.toString().padStart(2,"0")} PAINEL | ${fmt(compT)} | ${tipo} | ${esp}mm\n${totalP.toString().padStart(2,"0")} PAINEL | ${fmt(aP)} | ${tipo} | ${esp}mm`;

            document.getElementById("lista-pecas").innerHTML = `
                <div class="peca-item" style="border-bottom: 2px solid var(--primary); padding-bottom: 8px; margin-bottom: 12px;">
                    <span class="peca-label" style="font-weight: 900; color: var(--primary); text-transform: uppercase; font-size: 10px; letter-spacing: 1px;">Relatório Detalhado</span>
                </div>
                
                <div class="relatorio-resumo" style="background: rgba(255,255,255,0.03); padding: 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); border-left: 4px solid var(--primary); margin-bottom: 20px; color: #fff; font-size: 13px; line-height: 1.6;">
                    Para este gabinete de <strong>${fmt(C)}m x ${fmt(L)}m x ${fmt(parseFloat(altU))}m</strong>, será necessária a aquisição de <strong>${numTP + totalP} painéis</strong> isolantes <strong>${tipo} (${marcaNome})</strong> com espessura de <strong>${esp}mm</strong>.<br><br>
                    <div style="display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: #ccc;">
                        <span>• <strong>${numTP} peças</strong> de ${fmt(compT)}m ${labelT}</span>
                        <span>• <strong>${totalP} peças</strong> de ${fmt(aP)}m (Paredes)</span>
                    </div>
                </div>

                <div class="formato-corte" data-label="FORMATO PLANO DE CORTE" onclick="navigator.clipboard.writeText(this.innerText); this.classList.add('copiado'); setTimeout(()=>this.classList.remove('copiado'),2000)">${txt}</div>
                
                <button onclick="window.open('plano-corte.html?dados=' + encodeURIComponent(txt), '_blank')" style="background:#10b981; color:white; margin-top:20px; width:100%; border:none; border-radius:12px; padding:16px; font-weight:800; cursor:pointer; font-family:inherit; font-size:12px; text-transform:uppercase; letter-spacing: 0.5px;">🚀 Enviar para Plano de Corte</button>
            `;
        }

        function atualizarAutomaticoConfirmado() {
            document.getElementById('toggle-medidas').classList.toggle('active');
            verificarMedidas();
            if (!document.getElementById('resultado').classList.contains('hidden')) gerarProjeto(true);
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        window.addEventListener('resize', () => { camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight); });
        aoMudarTipo(); animate();
    </script>
</body>
</html>
