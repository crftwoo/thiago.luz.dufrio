<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lab: Clima Rio - Extração Direta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #050505;
      --card-bg: rgba(20, 20, 20, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent-color: #e30613;
      --text-main: #ffffff;
      --text-muted: #888888;
      --font-outfit: 'Outfit', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-outfit);
      background: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .aurora {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      opacity: 0.15;
    }
    .a1 { background: var(--accent-color); top: -10%; left: -10%; }
    .a2 { background: #3b82f6; bottom: -10%; right: -10%; }

    .container { width: 100%; max-width: 1200px; }

    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 { font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 10px; }
    .page-header p { color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

    .search-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
      margin-bottom: 30px;
    }

    .search-box label { display: block; color: var(--text-muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    
    .input-group { display: flex; gap: 15px; }
    input[type="text"] {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 18px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }
    input[type="text"]:focus { border-color: var(--accent-color); background: rgba(255,255,255,0.08); }

    .btn-extract {
      background: var(--accent-color);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0 35px;
      font-weight: 900;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 1px;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(227, 6, 19, 0.3);
    }
    .btn-extract:hover { transform: translateY(-2px); filter: brightness(1.1); }

    .source-info {
      display: none;
      background: rgba(227, 6, 19, 0.1);
      border-left: 4px solid var(--accent-color);
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      font-size: 14px;
      animation: fadeIn 0.5s ease;
    }
    .source-info a { color: #fff; text-decoration: underline; word-break: break-all; opacity: 0.8; transition: 0.3s; }
    .source-info a:hover { opacity: 1; color: var(--accent-color); }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 25px;
      width: 100%;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: 0.3s;
    }
    .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
    
    .card-img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #fff; padding: 15px; }
    
    .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 15px; height: 3.2em; overflow: hidden; }
    .card-price-spot { font-size: 20px; font-weight: 900; color: #00e676; margin-bottom: 5px; }
    .card-price-install { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
    
    .btn-site {
      display: block;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      transition: 0.3s;
    }
    .btn-site:hover { background: var(--accent-color); border-color: var(--accent-color); }

    .loader { display: none; flex-direction: column; align-items: center; gap: 20px; margin-top: 50px; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    .btn-back { position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; z-index: 100; }
    .btn-back:hover { background: rgba(255,255,255,0.1); border-color: var(--accent-color); }
  </style>
</head>
<body>
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>

  <a href="scraper-ar.html" class="btn-back">
    <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none;"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Voltar para Oficial
  </a>

  <div class="container">
    <div class="page-header">
      <h1>Laboratório: Clima Rio</h1>
      <p>Extração Direta • Sem Planilha</p>
    </div>

    <div class="search-box">
      <label>Cole o link da listagem da Clima Rio abaixo:</label>
      <div class="input-group">
        <input type="text" id="url-input" placeholder="Ex: https://www.climario.com.br/ar-condicionado/hi-wall-inverter">
        <button class="btn-extract" onclick="handleExtraction()">Extrair Cards</button>
      </div>
    </div>

    <div id="source-banner" class="source-info">
      <strong>Extraído de:</strong> <a id="source-link" href="#" target="_blank">link-da-origem</a>
    </div>

    <div id="loading" class="loader">
      <div class="spinner"></div>
      <p>Consultando site e processando dados...</p>
    </div>

    <div class="products-grid" id="grid"></div>
  </div>

  <script>
    async function handleExtraction() {
      const url = document.getElementById('url-input').value.trim();
      const grid = document.getElementById('grid');
      const loader = document.getElementById('loading');
      const banner = document.getElementById('source-banner');
      const sourceLink = document.getElementById('source-link');

      if (!url || !url.startsWith('http')) {
        alert("Cole um link válido da Clima Rio.");
        return;
      }

      // UI Reset
      grid.innerHTML = '';
      banner.style.display = 'none';
      loader.style.display = 'flex';

      try {
        const products = await scrapeClimaRio(url);
        
        loader.style.display = 'none';
        if (products.length > 0) {
          sourceLink.href = url;
          sourceLink.innerText = url;
          banner.style.display = 'block';
          renderProducts(products);
        } else {
          grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:50px; color:var(--accent-color);">Nenhum produto encontrado neste link. Verifique se a URL está correta.</p>';
        }
      } catch (e) {
        loader.style.display = 'none';
        grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:50px; color:var(--accent-color);">Erro fatal na extração. Verifique sua conexão.</p>';
      }
    }

    async function scrapeClimaRio(url) {
      const proxies = [
        "https://frigelar-proxy.crftwo.workers.dev/?url=",
        "https://api.allorigins.win/get?url=",
        "https://corsproxy.io/?"
      ];
      
      let html = "";
      try {
        const finalUrl = url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
        const resp = await fetch(proxies[0] + encodeURIComponent(finalUrl));
        html = await resp.text();
        
        if (html.startsWith('{') && html.includes('"contents":')) {
            html = JSON.parse(html).contents;
        }

        const products = [];
        const seenLinks = new Set();

        // Extração JSON-LD
        const scripts = html.match(/<script type="application\/ld\+json">([\s\S]*?)<\/script>/g);
        if (scripts) {
            scripts.forEach(tag => {
                try {
                    const json = JSON.parse(tag.replace(/<script.*?>|<\/script>/g, ''));
                    if (json['@type'] === 'ItemList' && json.itemListElement) {
                        json.itemListElement.forEach(item => {
                            const p = item.item;
                            if (p && p.url && !seenLinks.has(p.url)) {
                                seenLinks.add(p.url);
                                const lowPrice = p.offers?.lowPrice || 0;
                                const highPrice = p.offers?.highPrice || lowPrice;
                                if(lowPrice > 0) {
                                    products.push({
                                        title: p.name,
                                        image: Array.isArray(p.image) ? p.image[0] : p.image,
                                        spotText: "R$ " + lowPrice.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) + " à vista",
                                        installText: `ou R$ ${highPrice.toLocaleString('pt-BR', { minimumFractionDigits: 2 })} em até 10x de R$ ${(highPrice/10).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`,
                                        link: p.url.startsWith('http') ? p.url : "https://www.climario.com.br" + p.url
                                    });
                                }
                            }
                        });
                    }
                } catch(e) {}
            });
        }

        if (products.length > 0) return products;

        // Fallback API Catálogo
        const pathMatch = url.match(/climario\.com\.br([^?#]*)/);
        if (pathMatch) {
            const path = pathMatch[1];
            const apiUrl = `https://www.climario.com.br/api/catalog_system/pub/products/search${path}?O=OrderByPriceASC&_from=0&_to=19`;
            const apiResp = await fetch(proxies[0] + encodeURIComponent(apiUrl));
            const results = await apiResp.json();
            
            if (Array.isArray(results)) {
                results.forEach(p => {
                    const item = p.items[0];
                    const comm = item.sellers[0].commertialOffer;
                    if (comm && comm.Price > 0 && !seenLinks.has(p.link)) {
                        seenLinks.add(p.link);
                        const priceParcelado = comm.Price;
                        const priceAvista = priceParcelado * 0.9;
                        products.push({
                            title: p.productName,
                            image: item.images[0].imageUrl,
                            spotText: "R$ " + priceAvista.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) + " à vista",
                            installText: `ou R$ ${priceParcelado.toLocaleString('pt-BR', { minimumFractionDigits: 2 })} em até 10x de R$ ${(priceParcelado/10).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`,
                            link: p.link
                        });
                    }
                });
            }
        }
        return products;
      } catch(e) { return []; }
    }

    function renderProducts(products) {
      const grid = document.getElementById('grid');
      grid.innerHTML = products.map(p => `
        <div class="card">
          <img src="${p.image}" class="card-img" alt="${p.title}">
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <div class="card-price-spot">${p.spotText}</div>
            <div class="card-price-install">${p.installText}</div>
            <a href="${p.link}" target="_blank" class="btn-site">Ver no Site</a>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
