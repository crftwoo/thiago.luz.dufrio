<!DOCTYPE html>
<html>
<body>
  <div id="status">Testing...</div>
  <div id="results"></div>
  <script>
    async function test() {
      const url = "https://www.climario.com.br/ar-condicionado?initialMap=c&initialQuery=ar-condicionado&map=category-1,category-2,category-3&order=OrderByPriceASC&query=/ar-condicionado/ar-condicionado-hi-wall-inverter/9-000-btu-h&searchState";
      const proxy = "https://frigelar-proxy.crftwo.workers.dev/?url=";
      
      try {
        const resp = await fetch(proxy + encodeURIComponent(url));
        const html = await resp.text();
        document.getElementById('status').innerText = "HTML fetched (" + html.length + " bytes). Parsing...";
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // Check for products in DOM
        const items = doc.querySelectorAll('.vtex-product-summary-2-x-container');
        document.getElementById('status').innerText += " Found " + items.length + " DOM items.";
        
        // Check for __STATE__
        const stateScript = Array.from(doc.querySelectorAll('script')).find(s => s.textContent.includes('__STATE__'));
        if (stateScript) {
          document.getElementById('status').innerText += " Found __STATE__ script.";
          try {
            const jsonText = stateScript.textContent.split('window.__STATE__ = ')[1].split(';')[0];
            const state = JSON.parse(jsonText);
            const productObjects = Object.keys(state).filter(k => state[k] && state[k].productName);
            document.getElementById('status').innerText += " Found " + productObjects.length + " products in state.";
          } catch(e) {
            document.getElementById('status').innerText += " JSON Parse Error: " + e.message;
          }
        } else {
          document.getElementById('status').innerText += " __STATE__ not found.";
        }
      } catch(e) {
        document.getElementById('status').innerText = "Fetch Error: " + e.message;
      }
    }
    test();
  </script>
</body>
</html>
