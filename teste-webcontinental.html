<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste WebContinental - STATE Extraction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card-bg: #151921;
            --accent: #00f2fe;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .version {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            color: #0a0b10;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: white;
            padding: 10px;
        }
        .card-content {
            padding: 15px;
        }
        .card-title {
            font-size: 0.9rem;
            height: 40px;
            overflow: hidden;
            margin-bottom: 10px;
            color: var(--text-dim);
        }
        .card-price {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .card-install {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent);
            font-weight: bold;
        }
        #debug-console {
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Renderizador WebContinental</h1>
        <div class="version" id="version-tag">ÚLTIMA ATUALIZAÇÃO: 25/04/2026 01:22</div>
        <div class="input-group">
            <input type="text" id="link-input" placeholder="Cole o link da WebContinental aqui..." value="https://www.webcontinental.com.br/climatizacao/ar-condicionado/ar-condicionado-split-hi-wall/9000-btus/inverter?initialMap=c&initialQuery=climatizacao&map=category-1,category-2,category-3,capacidade-btus,tecnologia&order=OrderByPriceASC">
            <button onclick="renderCards()">RENDERIZAR CARDS</button>
        </div>
        <div id="status" class="status"></div>
        <div id="results-grid" class="results-grid"></div>
        <div id="debug-console"></div>
    </div>

    <script>
        function log(msg, color = "#0f0") {
            const console = document.getElementById('debug-console');
            console.style.display = "block";
            const line = document.createElement('div');
            line.style.color = color;
            line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        async function renderCards() {
            const url = document.getElementById('link-input').value;
            const grid = document.getElementById('results-grid');
            const status = document.getElementById('status');
            const debug = document.getElementById('debug-console');
            
            if (!url) return alert("Cole um link!");
            
            grid.innerHTML = "";
            debug.innerHTML = "";
            status.innerText = "INICIANDO CAPTURA...";
            status.style.color = "#00f2fe";

            try {
                const PROXY = "https://frigelar-proxy.crftwo.workers.dev/?url=";
                log("Buscando HTML via Proxy...");
                const resp = await fetch(PROXY + encodeURIComponent(url), { cache: 'no-store' });
                if (!resp.ok) throw new Error("Falha no Proxy (Status " + resp.status + ")");
                
                const html = await resp.text();
                log(`HTML recebido (${Math.round(html.length/1024)} KB)`);

                const marker = '__STATE__">';
                const idx = html.indexOf(marker);
                if (idx === -1) throw new Error("Marcador __STATE__ não encontrado no HTML!");

                log("Extraindo JSON do estado...");
                let jsonStr = html.substring(idx);
                const scriptStart = jsonStr.indexOf('<script>');
                const scriptEnd = jsonStr.indexOf('</' + 'script>');
                if (scriptStart === -1 || scriptEnd === -1) throw new Error("Erro na estrutura de scripts");

                jsonStr = jsonStr.substring(scriptStart + 8, scriptEnd).trim();
                const stateObj = JSON.parse(jsonStr);
                const allKeys = Object.keys(stateObj);
                log(`Estado carregado (${allKeys.length} chaves)`);

                // SUPER BUSCA: Procura por qualquer chave de produto ou busca
                const searchKey = allKeys.find(k => k.includes('productSearch('));
                if (!searchKey) {
                    log("ERRO: Não encontrei a chave 'productSearch' no STATE.", "red");
                    log("Primeiras 20 chaves do site: " + allKeys.slice(0, 20).join(', '), "yellow");
                    throw new Error("Chave de busca não encontrada");
                }
                log("Chave de busca encontrada: " + searchKey.substring(0, 50) + "...");

                const searchResult = stateObj[searchKey];
                const products = searchResult.products || [];
                if (products.length === 0) throw new Error("A lista de produtos retornou vazia.");

                log(`Encontrados ${products.length} produtos. Processando dados individuais...`);

                const fmtBR = (v) => "R$ " + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                const processedProducts = products.map((pRef, index) => {
                    try {
                        const product = stateObj[pRef.id];
                        if (!product) return null;

                        // Localizar Itens (SKUs) - Busca recursiva nas chaves
                        const itemKeys = allKeys.filter(k => k.startsWith(pRef.id + ".items") || k.startsWith("$" + pRef.id + ".items"));
                        if (itemKeys.length === 0) return null;
                        
                        let item = null;
                        const firstItemRef = stateObj[itemKeys[0]];
                        
                        // Formato de referência ou objeto direto
                        if (firstItemRef && firstItemRef.id) item = stateObj[firstItemRef.id];
                        else if (Array.isArray(firstItemRef) && firstItemRef[0]?.id) item = stateObj[firstItemRef[0].id];
                        else if (firstItemRef && firstItemRef.itemId) item = firstItemRef;

                        if (!item) return null;

                        // Imagem
                        let image = "";
                        if (item.images && item.images.length > 0) {
                            const imgRef = item.images[0];
                            const imgObj = imgRef.id ? stateObj[imgRef.id] : imgRef;
                            if (imgObj) image = imgObj.imageUrl || imgObj.imageTag;
                        }

                        // Preços e Vendedores
                        const sellersKey = allKeys.find(k => k.startsWith(item.id + ".sellers") || k.startsWith("$" + item.id + ".sellers") || k.startsWith(itemKeys[0] + ".sellers"));
                        if (!sellersKey) return null;
                        
                        const sellersList = stateObj[sellersKey];
                        const sellerRef = Array.isArray(sellersList) ? sellersList[0] : sellersList;
                        const seller = sellerRef.id ? stateObj[sellerRef.id] : sellerRef;
                        
                        if (!seller || !seller.commertialOffer) return null;
                        const offerRef = seller.commertialOffer;
                        const offer = offerRef.id ? stateObj[offerRef.id] : offerRef;
                        if (!offer) return null;

                        let spotPrice = offer.spotPrice || offer.Price;
                        let best = null;
                        
                        if (offer.Installments) {
                            offer.Installments.forEach(instRef => {
                                const inst = instRef.id ? stateObj[instRef.id] : instRef;
                                if (!inst) return;
                                if (inst.NumberOfInstallments === 1 && inst.Value < spotPrice) spotPrice = inst.Value;
                                if (inst.InterestRate === 0 && inst.NumberOfInstallments > 1) {
                                    if (!best || inst.NumberOfInstallments > best.NumberOfInstallments) best = inst;
                                }
                            });
                        }

                        return {
                            name: product.productName || product.name,
                            image: image,
                            priceCash: spotPrice,
                            priceFull: offer.Price,
                            installments: best ? best.NumberOfInstallments : 0,
                            link: `https://www.webcontinental.com.br/${product.linkText}/p?skuId=${item.itemId}`
                        };
                    } catch (e) {
                        return null;
                    }
                }).filter(p => p !== null);

                log(`Processamento concluído. ${processedProducts.length} cards prontos.`);

                // Ordenação: Menor preço à vista
                processedProducts.sort((a, b) => a.priceCash - b.priceCash);

                status.innerText = `SUCESSO! EXIBINDO ${processedProducts.length} PRODUTOS ORDENADOS`;

                processedProducts.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${p.image}" alt="">
                        <div class="card-content">
                            <div class="card-title">${p.name}</div>
                            <div class="card-price">${fmtBR(p.priceCash)}</div>
                            <div class="card-install">${p.installments > 0 ? 'ou ' + fmtBR(p.priceFull) + ' em ' + p.installments + 'x' : ''}</div>
                            <a href="${p.link}" target="_blank" style="display:block; margin-top:10px; color:var(--accent); text-decoration:none; font-size:0.8rem;">Ver no site</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                log("ERRO FATAL: " + error.message, "red");
                status.innerText = "ERRO: " + error.message;
                status.style.color = "#ff5252";
            }
        }
    </script>
</body>
</html>
