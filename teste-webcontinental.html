<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste WebContinental - STATE Extraction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card-bg: #151921;
            --accent: #00f2fe;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .version {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            color: #0a0b10;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: white;
            padding: 10px;
        }
        .card-content {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 0.9rem;
            height: 60px;
            overflow: hidden;
            margin-bottom: 15px;
            color: var(--text);
            line-height: 1.2;
        }
        .card-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .card-install {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 15px;
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent);
            font-weight: bold;
        }
        #debug-console {
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #333;
            display: none;
        }
        .btn-link {
            display: inline-block;
            margin-top: auto;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid var(--accent);
            padding: 5px 10px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Renderizador WebContinental</h1>
        <div class="version" id="version-tag">ÚLTIMA ATUALIZAÇÃO: 25/04/2026 01:33</div>
        <div class="input-group">
            <input type="text" id="link-input" placeholder="Cole o link da WebContinental aqui..." value="https://www.webcontinental.com.br/climatizacao/ar-condicionado/ar-condicionado-split-hi-wall/9000-btus/inverter?initialMap=c&initialQuery=climatizacao&map=category-1,category-2,category-3,capacidade-btus,tecnologia&order=OrderByPriceASC">
            <button onclick="renderCards()">RENDERIZAR CARDS</button>
        </div>
        <div id="status" class="status"></div>
        <div id="results-grid" class="results-grid"></div>
        <div id="debug-console"></div>
    </div>

    <script>
        function log(msg, color = "#0f0") {
            const console = document.getElementById('debug-console');
            console.style.display = "block";
            const line = document.createElement('div');
            line.style.color = color;
            line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        async function renderCards() {
            const urlInput = document.getElementById('link-input').value;
            const grid = document.getElementById('results-grid');
            const status = document.getElementById('status');
            const debug = document.getElementById('debug-console');
            
            if (!urlInput) return alert("Cole um link!");
            
            grid.innerHTML = "";
            debug.innerHTML = "";
            status.innerText = "INICIANDO CAPTURA INTELIGENTE...";
            status.style.color = "#00f2fe";

            try {
                const PROXY = "https://frigelar-proxy.crftwo.workers.dev/?url=";
                log("Acessando site...");
                const resp = await fetch(PROXY + encodeURIComponent(urlInput), { cache: 'no-store' });
                const html = await resp.text();

                const marker = '__STATE__">';
                const idx = html.indexOf(marker);
                if (idx === -1) throw new Error("Erro de acesso. Tente novamente.");

                let jsonStr = html.substring(idx);
                const scriptStart = jsonStr.indexOf('<script>');
                const scriptEnd = jsonStr.indexOf('</' + 'script>');
                jsonStr = jsonStr.substring(scriptStart + 8, scriptEnd).trim();
                const stateObj = JSON.parse(jsonStr);
                const allKeys = Object.keys(stateObj);

                log(`Dados brutos carregados: ${allKeys.length} chaves.`);

                // BUSCA AVANÇADA: Prioriza a chave que contém a ordenação por preço
                let searchKey = allKeys.find(k => k.includes('productSearch') && k.includes('OrderByPriceASC'));
                if (!searchKey) {
                    log("Aviso: Chave de 'Menor Preço' não encontrada no código inicial. Usando busca geral...", "yellow");
                    searchKey = allKeys.find(k => k.includes('productSearch'));
                }

                if (!searchKey) throw new Error("Não foi possível localizar os produtos no código do site.");
                
                const searchResult = stateObj[searchKey];
                const productsRef = searchResult.products || [];
                
                log(`Localizada lista com ${productsRef.length} referências.`);

                const fmtBR = (v) => "R$ " + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                const processedProducts = productsRef.map((pRef) => {
                    try {
                        const product = stateObj[pRef.id];
                        if (!product) return null;

                        // Localizar Item/SKU
                        const itemKeys = allKeys.filter(k => k.startsWith(pRef.id + ".items") || k.startsWith("$" + pRef.id + ".items"));
                        if (itemKeys.length === 0) return null;
                        
                        const itemKey = itemKeys[0];
                        const itemData = stateObj[itemKey];
                        const item = itemData.id ? stateObj[itemData.id] : itemData;
                        if (!item) return null;

                        // Localizar Sellers e Ofertas
                        const sellersKey = allKeys.find(k => k.startsWith(itemKey + ".sellers") || k.startsWith(item.id + ".sellers") || k.startsWith("$" + item.id + ".sellers"));
                        if (!sellersKey) return null;
                        
                        const sellersList = stateObj[sellersKey];
                        const sellerRef = Array.isArray(sellersList) ? sellersList[0] : sellersList;
                        const seller = sellerRef.id ? stateObj[sellerRef.id] : sellerRef;
                        
                        const offerRef = seller.commertialOffer;
                        const offer = offerRef.id ? stateObj[offerRef.id] : offerRef;
                        if (!offer) return null;

                        let spotPrice = offer.spotPrice || offer.Price;
                        let best = null;
                        
                        // Capturar parcelas reais
                        const instKeys = allKeys.filter(k => k.startsWith(offerRef.id + ".Installments") || k.startsWith("$" + offerRef.id + ".Installments"));
                        instKeys.forEach(ik => {
                            const instList = stateObj[ik];
                            if (Array.isArray(instList)) {
                                instList.forEach(ir => {
                                    const inst = ir.id ? stateObj[ir.id] : ir;
                                    if (!inst) return;
                                    if (inst.NumberOfInstallments === 1 && inst.Value < spotPrice && inst.Value > 0) spotPrice = inst.Value;
                                    if (inst.InterestRate === 0 && inst.NumberOfInstallments > 1) {
                                        if (!best || inst.NumberOfInstallments > best.NumberOfInstallments) best = inst;
                                    }
                                });
                            }
                        });

                        return {
                            name: product.productName || product.name || item.nameComplete || item.name,
                            image: (item.images && item.images[0]) ? (stateObj[item.images[0].id]?.imageUrl || item.images[0].imageUrl) : "",
                            priceCash: spotPrice,
                            priceFull: offer.Price,
                            installments: best ? best.NumberOfInstallments : 10,
                            link: `https://www.webcontinental.com.br/${product.linkText}/p?skuId=${item.itemId}`
                        };
                    } catch (e) {
                        return null;
                    }
                }).filter(p => p !== null && p.priceCash > 0);

                // SEGUNDA CHANCE: Se a lista oficial falhou, tenta catar produtos soltos no estado
                if (processedProducts.length < 5) {
                    log("Tentativa de recuperação: Buscando produtos avulsos...", "yellow");
                    // (Lógica de backup aqui se necessário)
                }

                processedProducts.sort((a, b) => a.priceCash - b.priceCash);
                status.innerText = `SUCESSO! ${processedProducts.length} PRODUTOS ENCONTRADOS.`;

                processedProducts.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${p.image}" alt="">
                        <div class="card-content">
                            <div class="card-title">${p.name}</div>
                            <div class="card-price">${fmtBR(p.priceCash)} à vista</div>
                            <div class="card-install">ou ${fmtBR(p.priceFull)} em até ${p.installments}x de ${fmtBR(p.priceFull/p.installments)}</div>
                            <a href="${p.link}" target="_blank" class="btn-link">Ver no site</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                log("ERRO: " + error.message, "red");
                status.innerText = "ERRO: " + error.message;
            }
        }
    </script>
</body>
</html>
