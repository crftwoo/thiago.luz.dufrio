<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste WebContinental - API REST Extraction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card-bg: #151921;
            --accent: #00f2fe;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .version {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            color: #0a0b10;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: white;
            padding: 10px;
        }
        .card-content {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 0.9rem;
            height: 60px;
            overflow: hidden;
            margin-bottom: 15px;
            color: var(--text);
            line-height: 1.2;
        }
        .card-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .card-install {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 15px;
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent);
            font-weight: bold;
        }
        #debug-console {
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #333;
            display: none;
        }
        .btn-link {
            display: inline-block;
            margin-top: auto;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid var(--accent);
            padding: 5px 10px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Renderizador WebContinental</h1>
        <div class="version" id="version-tag">ÚLTIMA ATUALIZAÇÃO: 25/04/2026 01:48</div>
        <div class="input-group">
            <input type="text" id="link-input" placeholder="Cole o link da WebContinental aqui..." value="https://www.webcontinental.com.br/climatizacao/ar-condicionado/ar-condicionado-split-hi-wall/9000-btus/inverter?initialMap=c&initialQuery=climatizacao&map=category-1,category-2,category-3,capacidade-btus,tecnologia&order=OrderByPriceASC">
            <button onclick="renderCards()">RENDERIZAR CARDS</button>
        </div>
        <div id="status" class="status"></div>
        <div id="results-grid" class="results-grid"></div>
        <div id="debug-console"></div>
    </div>

    <script>
        function log(msg, color = "#0f0") {
            const console = document.getElementById('debug-console');
            console.style.display = "block";
            const line = document.createElement('div');
            line.style.color = color;
            line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        async function renderCards() {
            const urlInput = document.getElementById('link-input').value;
            const grid = document.getElementById('results-grid');
            const status = document.getElementById('status');
            const debug = document.getElementById('debug-console');
            
            grid.innerHTML = "";
            debug.innerHTML = "";
            status.innerText = "BUSCANDO PRODUTOS VIA API (PAGINAÇÃO)...";
            status.style.color = "#00f2fe";

            try {
                const PROXY = "https://frigelar-proxy.crftwo.workers.dev/?url=";
                
                let path = "";
                try {
                    const urlObj = new URL(urlInput);
                    path = urlObj.pathname;
                } catch(e) {
                    path = urlInput.split('webcontinental.com.br')[1] || urlInput;
                    path = path.split('?')[0];
                }
                
                log(`Iniciando busca em: ${path}`);
                
                let allProducts = [];
                // Busca até 5 páginas (250 produtos)
                for (let i = 0; i < 5; i++) {
                    const from = i * 50;
                    const to = from + 49;
                    status.innerText = `LENDO PÁGINA ${i + 1} (${from}-${to})...`;
                    
                    const apiUrl = `https://www.webcontinental.com.br/api/catalog_system/pub/products/search${path}?O=OrderByPriceASC&_from=${from}&_to=${to}`;
                    const resp = await fetch(PROXY + encodeURIComponent(apiUrl));
                    if (!resp.ok) {
                        log(`Falha ao ler página ${i+1}`, "red");
                        break;
                    }
                    
                    const data = await resp.json();
                    if (!data || data.length === 0) break;
                    
                    allProducts = allProducts.concat(data);
                    log(`Página ${i+1} carregada: +${data.length} produtos.`);
                    if (data.length < 50) break;
                }

                if (allProducts.length === 0) throw new Error("Nenhum produto encontrado na API.");

                const fmtBR = (v) => "R$ " + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                const processed = allProducts.map(p => {
                    try {
                        const item = p.items[0];
                        const seller = item.sellers[0];
                        const offer = seller.commertialOffer;
                        
                        // Busca o melhor preço à vista nas parcelas
                        let price = offer.spotPrice || offer.Price || 0;
                        let fullPrice = offer.Price || price;
                        let installments = 10;
                        
                        if (offer.Installments) {
                            offer.Installments.forEach(inst => {
                                if (inst.InterestRate === 0 && inst.NumberOfInstallments > 1) {
                                    installments = Math.max(installments, inst.NumberOfInstallments);
                                }
                                if (inst.NumberOfInstallments === 1 && inst.Value < price && inst.Value > 0) {
                                    price = inst.Value;
                                }
                            });
                        }
                        
                        return {
                            name: p.productName,
                            image: item.images[0]?.imageUrl || "",
                            priceCash: price,
                            priceFull: fullPrice,
                            installments: installments,
                            link: p.link
                        };
                    } catch (e) { return null; }
                }).filter(p => p !== null && p.priceCash > 0);

                // Reordena final pelo preço à vista real
                processed.sort((a, b) => a.priceCash - b.priceCash);
                
                status.innerText = `SUCESSO! ${processed.length} PRODUTOS RENDERIZADOS.`;

                processed.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${p.image}" alt="">
                        <div class="card-content">
                            <div class="card-title">${p.name}</div>
                            <div class="card-price">${fmtBR(p.priceCash)} à vista</div>
                            <div class="card-install">ou ${fmtBR(p.priceFull)} em até ${p.installments}x de ${fmtBR(p.priceFull/p.installments)}</div>
                            <a href="${p.link}" target="_blank" class="btn-link">Ver no site</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                log("ERRO: " + error.message, "red");
                status.innerText = "ERRO: " + error.message;
            }
        }
    </script>
</body>
</html>
